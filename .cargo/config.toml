# Cross-platform compilation configuration for Sicario CLI

# ── Linux musl (fully static) ─────────────────────────────────────────────────
[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "target-feature=+crt-static"]

# ── Linux glibc (dynamic, for local dev) ─────────────────────────────────────
[target.x86_64-unknown-linux-gnu]
# No extra flags needed; glibc is linked dynamically by default

# ── macOS x86-64 ──────────────────────────────────────────────────────────────
[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-mmacosx-version-min=10.15"]

# ── macOS ARM64 (Apple Silicon) ───────────────────────────────────────────────
[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-mmacosx-version-min=11.0"]

# ── Windows MSVC (static CRT) ─────────────────────────────────────────────────
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]

# ── Windows GNU ───────────────────────────────────────────────────────────────
[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
rustflags = ["-C", "target-feature=+crt-static"]
