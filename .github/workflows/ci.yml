name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-check-

      - name: Install Linux dependencies
        run: sudo apt-get update -y && sudo apt-get install -y libsecret-1-dev pkg-config

      - run: cargo check --workspace --locked

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-clippy-

      - name: Install Linux dependencies
        run: sudo apt-get update -y && sudo apt-get install -y libsecret-1-dev pkg-config

      - run: cargo clippy --workspace --locked -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y libsecret-1-dev pkg-config

      - run: cargo test --workspace --locked

  vuln-sandbox-smoke-test:
    name: Vuln-Sandbox Smoke Test
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-smoke-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-smoke-

      - name: Install Linux dependencies
        run: sudo apt-get update -y && sudo apt-get install -y libsecret-1-dev pkg-config jq

      - name: Build sicario CLI
        run: cargo build --release --locked --package sicario-cli

      - name: Install sicario to PATH
        run: echo "${{ github.workspace }}/target/release" >> "$GITHUB_PATH"

      - name: Run vuln-sandbox smoke test
        run: |
          # Capture output — use || true so bash -e doesn't abort on non-zero
          # exit from sicario (exit 1 = findings found, which is expected here)
          OUTPUT=$(sicario scan vuln-sandbox/ --format json || true)

          # Validate output is parseable JSON array
          ACTUAL=$(echo "$OUTPUT" | jq 'length' 2>/dev/null || echo "")
          if [ -z "$ACTUAL" ] || ! echo "$ACTUAL" | grep -qE '^[0-9]+$'; then
            echo "✗ Smoke test FAILED: output is not valid JSON"
            echo "--- Raw output (first 1000 chars) ---"
            echo "$OUTPUT" | head -c 1000
            exit 1
          fi

          # Must find at least one finding per vuln-sandbox file (79 files)
          MIN_EXPECTED=79
          if [ "$ACTUAL" -lt "$MIN_EXPECTED" ]; then
            echo "✗ Smoke test FAILED: $ACTUAL findings (expected at least $MIN_EXPECTED)"
            echo ""
            echo "Breakdown by severity:"
            echo "$OUTPUT" | jq 'group_by(.severity) | map({severity: .[0].severity, count: length}) | sort_by(.severity)'
            exit 1
          fi

          echo "✓ Smoke test passed: $ACTUAL findings (minimum $MIN_EXPECTED)"
          echo ""
          echo "Breakdown by severity:"
          echo "$OUTPUT" | jq 'group_by(.severity) | map({severity: .[0].severity, count: length}) | sort_by(.severity)'
