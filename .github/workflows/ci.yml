name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-check-

      - name: Install Linux dependencies
        run: sudo apt-get update -y && sudo apt-get install -y libsecret-1-dev pkg-config

      - run: cargo check --workspace --locked

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-clippy-

      - name: Install Linux dependencies
        run: sudo apt-get update -y && sudo apt-get install -y libsecret-1-dev pkg-config

      - run: cargo clippy --workspace --locked -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y libsecret-1-dev pkg-config

      - run: cargo test --workspace --locked

  vuln-sandbox-smoke-test:
    name: Vuln-Sandbox Smoke Test
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-smoke-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-smoke-

      - name: Install Linux dependencies
        run: sudo apt-get update -y && sudo apt-get install -y libsecret-1-dev pkg-config jq

      - name: Build sicario CLI
        run: cargo build --release --locked --package sicario-cli

      - name: Install sicario to PATH
        run: echo "${{ github.workspace }}/target/release" >> "$GITHUB_PATH"

      - name: Run vuln-sandbox smoke test
        run: |
          EXPECTED=79
          ACTUAL=$(sicario scan vuln-sandbox/ --format json | jq 'length')
          if [ "$ACTUAL" -eq "$EXPECTED" ]; then
            echo "✓ Smoke test passed: $ACTUAL findings (expected $EXPECTED)"
          else
            echo "✗ Smoke test FAILED: $ACTUAL findings (expected $EXPECTED)"
            echo ""
            echo "Breakdown by severity:"
            sicario scan vuln-sandbox/ --format json \
              | jq 'group_by(.severity) | map({severity: .[0].severity, count: length}) | sort_by(.severity)'
            exit 1
          fi
