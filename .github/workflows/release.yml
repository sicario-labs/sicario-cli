name: Release

# Builds release binaries for all four targets from a single ubuntu-latest
# runner using cargo-zigbuild. No macOS or Windows runners are required.
#
# Targets:
#   • x86_64-unknown-linux-gnu   — Linux (glibc, most servers)
#   • x86_64-pc-windows-gnu      — Windows (64-bit)
#   • x86_64-apple-darwin        — macOS Intel
#   • aarch64-apple-darwin       — macOS Apple Silicon
#
# Triggered on any version tag (e.g. v0.1.9, 1.2.3).

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0)'
        required: true
        default: 'v0.2.0'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Binary name as declared in Cargo.toml [[bin]]
  BIN: sicario

jobs:
  release:
    name: Cross-compile & release (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Rust toolchain + all four targets ────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            x86_64-unknown-linux-gnu
            x86_64-pc-windows-gnu
            x86_64-apple-darwin
            aarch64-apple-darwin

      # ── Zig (provides the cross-compilation C toolchain) ─────────────────────
      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.13.0"

      # ── cargo-zigbuild ───────────────────────────────────────────────────────
      - name: Install cargo-zigbuild
        run: pip install cargo-zigbuild

      # ── Build cache ──────────────────────────────────────────────────────────
      - name: Cache Cargo registry + build artefacts
        uses: swatinem/rust-cache@v2
        with:
          key: zigbuild-cross-all

      # ── Linux (x86_64-unknown-linux-gnu) ─────────────────────────────────────
      - name: Build — Linux x86_64
        run: |
          cargo zigbuild --release --target x86_64-unknown-linux-gnu -p sicario-cli

      - name: Package — Linux x86_64
        run: |
          cp target/x86_64-unknown-linux-gnu/release/${{ env.BIN }} \
             ${{ env.BIN }}-linux-amd64
          tar -czf ${{ env.BIN }}-linux-amd64.tar.gz ${{ env.BIN }}-linux-amd64
          sha256sum ${{ env.BIN }}-linux-amd64.tar.gz \
            > ${{ env.BIN }}-linux-amd64.tar.gz.sha256

      # ── Windows (x86_64-pc-windows-gnu) ──────────────────────────────────────
      - name: Build — Windows x86_64
        run: |
          cargo zigbuild --release --target x86_64-pc-windows-gnu -p sicario-cli

      - name: Package — Windows x86_64
        run: |
          cp target/x86_64-pc-windows-gnu/release/${{ env.BIN }}.exe \
             ${{ env.BIN }}-windows-amd64.exe
          zip ${{ env.BIN }}-windows-amd64.zip ${{ env.BIN }}-windows-amd64.exe
          sha256sum ${{ env.BIN }}-windows-amd64.zip \
            > ${{ env.BIN }}-windows-amd64.zip.sha256

      # ── macOS SDK (required for Apple framework linking via cargo-zigbuild) ───
      # cargo-zigbuild can cross-compile macOS binaries but needs the macOS SDK
      # to resolve Apple frameworks (Security, CoreFoundation, etc.).
      # We download the MacOSX14.0 SDK from the open-source osxcross project.
      - name: Download macOS SDK
        run: |
          curl -fsSL -o MacOSX14.0.sdk.tar.xz \
            "https://github.com/joseluisq/macosx-sdks/releases/download/14.0/MacOSX14.0.sdk.tar.xz"
          sudo mkdir -p /opt/MacOSX14.0.sdk
          sudo tar -xJf MacOSX14.0.sdk.tar.xz -C /opt/MacOSX14.0.sdk --strip-components=1
          echo "SDKROOT=/opt/MacOSX14.0.sdk" >> "$GITHUB_ENV"

      # ── macOS Intel (x86_64-apple-darwin) ────────────────────────────────────
      - name: Build — macOS Intel
        run: |
          cargo zigbuild --release --target x86_64-apple-darwin -p sicario-cli

      - name: Package — macOS Intel
        run: |
          cp target/x86_64-apple-darwin/release/${{ env.BIN }} \
             ${{ env.BIN }}-darwin-amd64
          tar -czf ${{ env.BIN }}-darwin-amd64.tar.gz ${{ env.BIN }}-darwin-amd64
          sha256sum ${{ env.BIN }}-darwin-amd64.tar.gz \
            > ${{ env.BIN }}-darwin-amd64.tar.gz.sha256

      # ── macOS Apple Silicon (aarch64-apple-darwin) ────────────────────────────
      - name: Build — macOS Apple Silicon
        run: |
          cargo zigbuild --release --target aarch64-apple-darwin -p sicario-cli

      - name: Package — macOS Apple Silicon
        run: |
          cp target/aarch64-apple-darwin/release/${{ env.BIN }} \
             ${{ env.BIN }}-darwin-arm64
          tar -czf ${{ env.BIN }}-darwin-arm64.tar.gz ${{ env.BIN }}-darwin-arm64
          sha256sum ${{ env.BIN }}-darwin-arm64.tar.gz \
            > ${{ env.BIN }}-darwin-arm64.tar.gz.sha256

      # ── Create GitHub Release and upload all artifacts ────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ env.BIN }}-linux-amd64.tar.gz
            ${{ env.BIN }}-linux-amd64.tar.gz.sha256
            ${{ env.BIN }}-windows-amd64.zip
            ${{ env.BIN }}-windows-amd64.zip.sha256
            ${{ env.BIN }}-darwin-amd64.tar.gz
            ${{ env.BIN }}-darwin-amd64.tar.gz.sha256
            ${{ env.BIN }}-darwin-arm64.tar.gz
            ${{ env.BIN }}-darwin-arm64.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Bump Homebrew formula ────────────────────────────────────────────────
      # Requires HOMEBREW_TAP_TOKEN secret with `repo` write access on sicario-labs/homebrew-sicario-cli
      - name: Bump Homebrew formula
        if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # The tag is e.g. "v1.2.3". We need the version without the 'v' for the formula.
          VERSION=${TAG_NAME#v}
          
          # Read SHA256 checksums from the generated files
          ARM64_SHA=$(awk '{print $1}' ${{ env.BIN }}-darwin-arm64.tar.gz.sha256)
          AMD64_SHA=$(awk '{print $1}' ${{ env.BIN }}-darwin-amd64.tar.gz.sha256)
          LINUX_SHA=$(awk '{print $1}' ${{ env.BIN }}-linux-amd64.tar.gz.sha256)
          
          # Clone the tap repo
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/sicario-labs/homebrew-sicario-cli.git tap-repo
          cd tap-repo
          
          # Update the version and SHA256 placeholders
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/sicario.rb
          sed -i "s/PLACEHOLDER_ARM64_SHA256/${ARM64_SHA}/" Formula/sicario.rb
          sed -i "s/PLACEHOLDER_AMD64_SHA256/${AMD64_SHA}/" Formula/sicario.rb
          sed -i "s/PLACEHOLDER_LINUX_AMD64_SHA256/${LINUX_SHA}/" Formula/sicario.rb
          
          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/sicario.rb
          git commit -m "Bump formula to ${TAG_NAME}"
          git push origin main
