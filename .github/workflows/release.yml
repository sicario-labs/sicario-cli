name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # CI: run tests on every push / PR (non-tag runs)
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      # libsecret is required by the `keyring` crate on Linux
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libsecret-1-dev pkg-config

      - name: Run tests
        run: cargo test --workspace --locked

  # ─────────────────────────────────────────────────────────────────────────────
  # Build: cross-compile statically linked release binaries
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: test
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86-64 (fully static via musl) ──────────────────────────
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact_name: sicario
            asset_name: sicario-linux-x86_64
            use_cross: true

          # ── macOS x86-64 ──────────────────────────────────────────────────
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: sicario
            asset_name: sicario-macos-x86_64
            use_cross: false

          # ── macOS ARM64 (Apple Silicon) ────────────────────────────────────
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: sicario
            asset_name: sicario-macos-aarch64
            use_cross: false

          # ── Windows x86-64 (MSVC, static CRT) ────────────────────────────
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: sicario.exe
            asset_name: sicario-windows-x86_64.exe
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-release-

      # ── Linux: install cross for musl builds ──────────────────────────────
      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      # ── macOS: no extra deps needed (Xcode CLT ships with the linker) ──────

      # ── Windows: nothing extra needed (MSVC is pre-installed on the runner) ─

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build release binary (cross)
        if: matrix.use_cross == true
        run: |
          cross build --release --locked --target ${{ matrix.target }} -p sicario-cli

      - name: Build release binary (cargo)
        if: matrix.use_cross == false
        run: |
          cargo build --release --locked --target ${{ matrix.target }} -p sicario-cli

      # ── Verify binary size < 50 MB ─────────────────────────────────────────
      - name: Check binary size (Unix)
        if: runner.os != 'Windows'
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ matrix.artifact_name }}"
          SIZE=$(stat -c%s "$BINARY" 2>/dev/null || stat -f%z "$BINARY")
          echo "Binary size: $SIZE bytes"
          MAX=$((50 * 1024 * 1024))
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "ERROR: binary exceeds 50 MB limit ($SIZE > $MAX)"
            exit 1
          fi

      - name: Check binary size (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binary = "target\${{ matrix.target }}\release\${{ matrix.artifact_name }}"
          $size = (Get-Item $binary).Length
          Write-Host "Binary size: $size bytes"
          $max = 50 * 1024 * 1024
          if ($size -gt $max) {
            Write-Error "Binary exceeds 50 MB limit ($size > $max)"
            exit 1
          }

      # ── Stage artifact ─────────────────────────────────────────────────────
      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} \
             dist/${{ matrix.asset_name }}

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.artifact_name }}" `
                    "dist\${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Release: create GitHub Release and attach binaries
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List artifacts
        run: find dist -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Homebrew: update Formula/sicario.rb with new version + SHA256 digests
  # ─────────────────────────────────────────────────────────────────────────────
  homebrew:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Need a token with write access to push the formula update.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Compute SHA256 digests
        id: sha
        run: |
          SHA_LINUX=$(sha256sum dist/sicario-linux-x86_64/sicario-linux-x86_64 | awk '{print $1}')
          SHA_MACOS_X86=$(sha256sum dist/sicario-macos-x86_64/sicario-macos-x86_64 | awk '{print $1}')
          SHA_MACOS_ARM=$(sha256sum dist/sicario-macos-aarch64/sicario-macos-aarch64 | awk '{print $1}')
          echo "sha_linux=$SHA_LINUX"       >> "$GITHUB_OUTPUT"
          echo "sha_macos_x86=$SHA_MACOS_X86" >> "$GITHUB_OUTPUT"
          echo "sha_macos_arm=$SHA_MACOS_ARM" >> "$GITHUB_OUTPUT"

      - name: Update Formula/sicario.rb
        env:
          VERSION: ${{ github.ref_name }}
          SHA_LINUX: ${{ steps.sha.outputs.sha_linux }}
          SHA_MACOS_X86: ${{ steps.sha.outputs.sha_macos_x86 }}
          SHA_MACOS_ARM: ${{ steps.sha.outputs.sha_macos_arm }}
        run: |
          # Strip leading 'v' from tag for the version field.
          VER="${VERSION#v}"

          sed -i "s/^  version \".*\"/  version \"${VER}\"/" Formula/sicario.rb

          # Replace the three placeholder sha256 lines in order:
          # 1st occurrence  → macOS ARM
          # 2nd occurrence  → macOS x86
          # 3rd occurrence  → Linux x86
          python3 - <<'PYEOF'
          import re, os

          formula = open("Formula/sicario.rb").read()
          shas = [
              os.environ["SHA_MACOS_ARM"],
              os.environ["SHA_MACOS_X86"],
              os.environ["SHA_LINUX"],
          ]
          idx = 0
          def replacer(m):
              global idx
              result = f'      sha256 "{shas[idx]}"'
              idx += 1
              return result

          formula = re.sub(r'      sha256 "[0-9a-f]{64}"', replacer, formula)
          open("Formula/sicario.rb", "w").write(formula)
          PYEOF

      - name: Commit and push updated formula
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/sicario.rb
          git commit -m "chore: update Homebrew formula to ${GITHUB_REF_NAME}"
          git push origin HEAD:main
