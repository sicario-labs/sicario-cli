# Basic Go Security Rules
# Covers: hardcoded credentials, dangerous function usage, insecure patterns
#
# These are general-purpose Go security rules. More specific rules for
# SQL injection, command injection, path traversal, and SSRF are in
# the go/ subdirectory.

- id: "go-hardcoded-password"
  name: "Hardcoded Password or Secret"
  description: "Password, secret, or API key assigned as a string literal. Use environment variables or a secrets manager instead."
  severity: High
  languages:
    - Go
  pattern:
    query: "(short_var_declaration left: (expression_list (identifier) @name (#match? @name \"(?i)(password|passwd|secret|apiKey|api_key|token|accessToken|secretKey)\")) right: (expression_list (interpreted_string_literal) @val)) @assign"
    captures:
      - "assign"
  cwe_id: "CWE-798"
  owasp_category: A02_CryptographicFailures
  help_uri: "https://cwe.mitre.org/data/definitions/798.html"
  test_cases:
    - code: "password := \"supersecret123\""
      expected: TruePositive
    - code: "apiKey := \"sk-1234567890abcdef\""
      expected: TruePositive
    - code: "secretKey := \"my-secret-key-value\""
      expected: TruePositive
    - code: "password := os.Getenv(\"DB_PASSWORD\")"
      expected: TrueNegative
    - code: "username := \"admin\""
      expected: TrueNegative
    - code: "count := \"42\""
      expected: TrueNegative

- id: "go-math-rand-security"
  name: "math/rand Used for Security-Sensitive Operation"
  description: "math/rand is not cryptographically secure. Use crypto/rand for security-sensitive random number generation."
  severity: High
  languages:
    - Go
  pattern:
    query: "(call_expression function: (selector_expression operand: (identifier) @pkg (#eq? @pkg \"rand\") field: (field_identifier) @fn (#match? @fn \"^(Intn|Int63|Float64|Read|Int31)$\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-338"
  owasp_category: A02_CryptographicFailures
  help_uri: "https://pkg.go.dev/crypto/rand"
  test_cases:
    - code: "token := rand.Intn(1000000)"
      expected: TruePositive
    - code: "sessionId := rand.Int63()"
      expected: TruePositive
    - code: "nonce := rand.Read(buf)"
      expected: TruePositive
    - code: "n, err := crypto_rand.Read(buf)"
      expected: TrueNegative
    - code: "uuid.New()"
      expected: TrueNegative
    - code: "time.Now().UnixNano()"
      expected: TrueNegative

- id: "go-md5-usage"
  name: "Use of MD5 Hash Function"
  description: "MD5 is cryptographically broken and should not be used for security purposes. Use SHA-256 or stronger hash functions instead."
  severity: High
  languages:
    - Go
  pattern:
    query: "(call_expression function: (selector_expression operand: (identifier) @pkg (#eq? @pkg \"md5\") field: (field_identifier) @fn (#match? @fn \"^(New|Sum)$\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-328"
  owasp_category: A02_CryptographicFailures
  help_uri: "https://pkg.go.dev/crypto/sha256"
  test_cases:
    - code: "h := md5.New()"
      expected: TruePositive
    - code: "hash := md5.Sum(data)"
      expected: TruePositive
    - code: "hasher := md5.New()"
      expected: TruePositive
    - code: "h := sha256.New()"
      expected: TrueNegative
    - code: "hash := sha256.Sum256(data)"
      expected: TrueNegative
    - code: "h := sha512.New()"
      expected: TrueNegative

- id: "go-sha1-usage"
  name: "Use of SHA1 Hash Function"
  description: "SHA1 is cryptographically weak and should not be used for security purposes. Use SHA-256 or stronger hash functions instead."
  severity: Medium
  languages:
    - Go
  pattern:
    query: "(call_expression function: (selector_expression operand: (identifier) @pkg (#eq? @pkg \"sha1\") field: (field_identifier) @fn (#match? @fn \"^(New|Sum)$\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-328"
  owasp_category: A02_CryptographicFailures
  help_uri: "https://pkg.go.dev/crypto/sha256"
  test_cases:
    - code: "h := sha1.New()"
      expected: TruePositive
    - code: "hash := sha1.Sum(data)"
      expected: TruePositive
    - code: "hasher := sha1.New()"
      expected: TruePositive
    - code: "h := sha256.New()"
      expected: TrueNegative
    - code: "hash := sha256.Sum256(data)"
      expected: TrueNegative
    - code: "h := sha512.New()"
      expected: TrueNegative

- id: "go-tls-insecure-skip-verify"
  name: "TLS InsecureSkipVerify Enabled"
  description: "Setting InsecureSkipVerify to true disables TLS certificate validation, enabling man-in-the-middle attacks. Remove this setting or use proper certificate validation."
  severity: Critical
  languages:
    - Go
  pattern:
    query: "(keyed_element (literal_element (identifier) @key (#eq? @key \"InsecureSkipVerify\")) (literal_element (true) @val)) @elem"
    captures:
      - "elem"
  cwe_id: "CWE-295"
  owasp_category: A02_CryptographicFailures
  help_uri: "https://pkg.go.dev/crypto/tls#Config"
  test_cases:
    - code: "tlsConfig := &tls.Config{InsecureSkipVerify: true}"
      expected: TruePositive
    - code: "transport := &http.Transport{TLSClientConfig: &tls.Config{InsecureSkipVerify: true}}"
      expected: TruePositive
    - code: "config := tls.Config{InsecureSkipVerify: true}"
      expected: TruePositive
    - code: "tlsConfig := &tls.Config{MinVersion: tls.VersionTLS12}"
      expected: TrueNegative
    - code: "tlsConfig := &tls.Config{InsecureSkipVerify: false}"
      expected: TrueNegative
    - code: "config := &tls.Config{}"
      expected: TrueNegative
