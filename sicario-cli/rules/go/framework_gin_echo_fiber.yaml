      - "call"
  cwe_id: "CWE-20"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://echo.labstack.com/docs/binding"
  test_cases:
    - code: "c.Bind(&req)"
      expected: TruePositive
    - code: "c.Bind(&form)"
      expected: TruePositive
    - code: "c.Bind(&payload)"
      expected: TruePositive
    - code: "if err := c.Bind(&req); err != nil { return err }"
      expected: TrueNegative
    - code: "c.JSON(200, result)"
      expected: TrueNegative
