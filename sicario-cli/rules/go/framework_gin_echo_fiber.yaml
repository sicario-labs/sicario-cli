- id: "go-echo-missing-secure-middleware"
  name: "Echo Missing Secure Middleware"
  description: "Echo's Secure middleware sets important security headers (X-Frame-Options, X-Content-Type-Options, etc.). Add middleware.Secure() to your Echo instance."
  severity: Low
  languages:
    - Go
  pattern:
    query: "(call_expression function: (selector_expression operand: (identifier) @pkg (#eq? @pkg \"echo\") field: (field_identifier) @fn (#eq? @fn \"New\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-16"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://echo.labstack.com/docs/middleware/secure"
  test_cases:
    - code: "e := echo.New()"
      expected: TruePositive
    - code: "server := echo.New()"
      expected: TruePositive
    - code: "app := echo.New()"
      expected: TruePositive
    - code: "e := echo.New()\ne.Use(middleware.Secure())"
      expected: TrueNegative
    - code: "e.Use(middleware.SecureWithConfig(config))"
      expected: TrueNegative
    - code: "gin.Default()"
      expected: TrueNegative

- id: "go-echo-cors-allow-all"
  name: "Echo CORS Allow All Origins"
  description: "Allowing all origins in Echo CORS middleware permits any website to make cross-origin requests. Restrict to specific trusted origins."
  severity: Medium
  languages:
    - Go
  pattern:
    query: "(keyed_element (literal_element (identifier) @key (#eq? @key \"AllowOrigins\")) (literal_element (composite_literal body: (literal_value (literal_element (interpreted_string_literal) @origin (#eq? @origin \"\\\"*\\\"\")))))) @elem"
    captures:
      - "elem"
  cwe_id: "CWE-942"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://echo.labstack.com/docs/middleware/cors"
  test_cases:
    - code: "middleware.CORSWithConfig(middleware.CORSConfig{AllowOrigins: []string{\"*\"}})"
      expected: TruePositive
    - code: "config := middleware.CORSConfig{AllowOrigins: []string{\"*\"}}"
      expected: TruePositive
    - code: "cors := middleware.CORSConfig{AllowOrigins: []string{\"*\"}, AllowMethods: []string{\"GET\"}}"
      expected: TruePositive
    - code: "middleware.CORSWithConfig(middleware.CORSConfig{AllowOrigins: []string{\"https://example.com\"}})"
      expected: TrueNegative
    - code: "e.Use(middleware.CORS())"
      expected: TrueNegative
    - code: "config := middleware.CORSConfig{AllowOrigins: []string{\"https://app.example.com\"}}"
      expected: TrueNegative

