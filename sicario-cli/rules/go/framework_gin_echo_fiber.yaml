- id: "go-echo-logger-fatal-user-data"
  name: "Echo Logger Fatal with User Data"
  description: "Passing user-controlled data to e.Logger.Fatal can expose sensitive information in logs. Sanitize data before logging."
  severity: Medium
  languages:
    - Go
  pattern:
    query: "(call_expression function: (selector_expression operand: (selector_expression operand: (identifier) @obj (#eq? @obj \"e\") field: (field_identifier) @logger (#eq? @logger \"Logger\")) field: (field_identifier) @fn (#eq? @fn \"Fatal\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-532"
  owasp_category: A09_SecurityLoggingAndMonitoringFailures
  help_uri: "https://cwe.mitre.org/data/definitions/532.html"
  test_cases:
    - code: "e.Logger.Fatal(userInput)"
      expected: TruePositive
    - code: "e.Logger.Fatal(requestBody)"
      expected: TruePositive
    - code: "e.Logger.Fatal(err)"
      expected: TruePositive
    - code: "e.Logger.Info(\"server started\")"
      expected: TrueNegative
    - code: "log.Fatal(\"startup error\")"
      expected: TrueNegative
    - code: "e.Logger.Debug(\"processing request\")"
      expected: TrueNegative

- id: "go-echo-bind-no-validation"
  name: "Echo Bind Without Validation"
  description: "Using Echo's Bind without subsequent validation allows processing of malformed request data. Always validate after binding."
  severity: Medium
  languages:
