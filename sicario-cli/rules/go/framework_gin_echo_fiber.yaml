- id: "go-fiber-missing-rate-limiter"
  name: "Fiber Missing Rate Limiter"
  description: "A Fiber app without rate limiting middleware is vulnerable to denial-of-service attacks. Add limiter.New() middleware."
  severity: Low
  languages:
    - Go
  pattern:
    query: "(call_expression function: (selector_expression operand: (identifier) @pkg (#eq? @pkg \"fiber\") field: (field_identifier) @fn (#eq? @fn \"New\")) arguments: (argument_list (composite_literal))) @call"
    captures:
      - "call"
  cwe_id: "CWE-770"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://docs.gofiber.io/api/middleware/limiter"
  test_cases:
    - code: "app := fiber.New(fiber.Config{Prefork: true})"
      expected: TruePositive
    - code: "server := fiber.New(fiber.Config{ReadTimeout: 10 * time.Second})"
      expected: TruePositive
    - code: "api := fiber.New(fiber.Config{BodyLimit: 4 * 1024 * 1024})"
      expected: TruePositive
    - code: "app := fiber.New()\napp.Use(limiter.New())"
      expected: TrueNegative
    - code: "app.Use(limiter.New(limiter.Config{Max: 100}))"
