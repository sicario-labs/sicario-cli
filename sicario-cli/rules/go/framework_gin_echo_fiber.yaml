      expected: TrueNegative

- id: "go-gin-abort-with-error"
  name: "Gin AbortWithStatusJSON with Internal Error"
  description: "Returning internal error details in AbortWithStatusJSON exposes implementation details. Return generic error messages."
  severity: Medium
  languages:
    - Go
  pattern:
    query: "(call_expression function: (selector_expression operand: (identifier) @obj (#eq? @obj \"c\") field: (field_identifier) @fn (#eq? @fn \"AbortWithStatusJSON\")) arguments: (argument_list (_) (call_expression function: (selector_expression field: (field_identifier) @method (#eq? @method \"Error\")))  )) @call"
    captures:
      - "call"
  cwe_id: "CWE-209"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://cwe.mitre.org/data/definitions/209.html"
  test_cases:
    - code: "c.AbortWithStatusJSON(500, gin.H{\"error\": err.Error()})"
      expected: TruePositive
    - code: "c.AbortWithStatusJSON(403, gin.H{\"msg\": authErr.Error()})"
      expected: TruePositive
    - code: "c.AbortWithStatusJSON(400, gin.H{\"detail\": validErr.Error()})"
      expected: TruePositive
    - code: "c.AbortWithStatusJSON(500, gin.H{\"error\": \"internal server error\"})"
      expected: TrueNegative
    - code: "c.AbortWithStatus(403)"
      expected: TrueNegative
    - code: "c.JSON(200, gin.H{\"status\": \"ok\"})"
      expected: TrueNegative


