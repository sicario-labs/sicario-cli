    captures:
      - "call"
  cwe_id: "CWE-22"
  owasp_category: A03_Injection
  help_uri: "https://cwe.mitre.org/data/definitions/22.html"
  test_cases:
    - code: "return c.File(c.Param(\"filepath\"))"
      expected: TruePositive
    - code: "return c.File(c.QueryParam(\"file\"))"
      expected: TruePositive
    - code: "return c.File(c.FormValue(\"path\"))"
      expected: TruePositive
    - code: "return c.File(\"static/index.html\")"
