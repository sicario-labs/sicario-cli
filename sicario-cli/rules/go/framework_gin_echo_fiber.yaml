  description: "Returning raw error messages in Echo HTTP error handler exposes internal details. Return generic error messages to clients."
  severity: Medium
  languages:
    - Go
  pattern:
    query: "(call_expression function: (selector_expression operand: (identifier) @obj (#eq? @obj \"c\") field: (field_identifier) @fn (#eq? @fn \"String\")) arguments: (argument_list (_) (call_expression function: (selector_expression field: (field_identifier) @method (#eq? @method \"Error\"))))) @call"
    captures:
      - "call"
  cwe_id: "CWE-209"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://cwe.mitre.org/data/definitions/209.html"
  test_cases:
    - code: "return c.String(500, err.Error())"
      expected: TruePositive
    - code: "return c.String(400, validationErr.Error())"
      expected: TruePositive
    - code: "return c.String(503, dbErr.Error())"
      expected: TruePositive
    - code: "return c.String(500, \"internal server error\")"
      expected: TrueNegative
    - code: "return c.JSON(200, result)"
      expected: TrueNegative
    - code: "return c.NoContent(204)"
      expected: TrueNegative

- id: "go-echo-static-user-path"
