# ============================================================================
# PATH TRAVERSAL RULES (6 rules)
# ============================================================================

- id: "go-os-open-sprintf"
  name: "os.Open with fmt.Sprintf Path"
  description: "Using fmt.Sprintf to construct file paths passed to os.Open allows path traversal attacks. Validate and use filepath.Clean or filepath.Abs before opening files."
  severity: High
  languages:
    - Go
  pattern:
    query: "(call_expression function: (selector_expression operand: (identifier) @pkg (#eq? @pkg \"os\") field: (field_identifier) @fn (#match? @fn \"^(Open|OpenFile|Create)$\")) arguments: (argument_list (call_expression function: (selector_expression operand: (identifier) @fmtpkg (#eq? @fmtpkg \"fmt\") field: (field_identifier) @fmtfn (#eq? @fmtfn \"Sprintf\"))))) @call"
    captures:
      - "call"
  cwe_id: "CWE-22"
  owasp_category: A03_Injection
  help_uri: "https://owasp.org/Top10/A03_2021-Injection/"
  test_cases:
    - code: "f, err := os.Open(fmt.Sprintf(\"/uploads/%s\", userFilename))"
      expected: TruePositive
    - code: "f, err := os.OpenFile(fmt.Sprintf(\"./data/%s/%s\", tenantId, fileName), os.O_RDONLY, 0644)"
      expected: TruePositive
    - code: "f, err := os.Create(fmt.Sprintf(\"%s/%s\", baseDir, requestPath))"
      expected: TruePositive
    - code: "f, err := os.Open(\"config/settings.toml\")"
      expected: TrueNegative
    - code: "f, err := os.Open(filepath.Clean(userPath))"
      expected: TrueNegative
    - code: "f, err := os.Create(\"output/results.json\")"
      expected: TrueNegative

- id: "go-os-readfile-sprintf"
