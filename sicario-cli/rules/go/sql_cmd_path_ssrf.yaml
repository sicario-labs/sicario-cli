  pattern:
    query: "(call_expression function: (selector_expression operand: (identifier) @pkg (#eq? @pkg \"syscall\") field: (field_identifier) @fn (#eq? @fn \"Exec\")) arguments: (argument_list (identifier) @prog)) @call"
