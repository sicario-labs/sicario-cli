# SQL Injection, Command Injection, Path Traversal, and SSRF Rules for Go
# Covers: database/sql, GORM, sqlx, ent (SQLi),
# os/exec.Command, os.StartProcess, bash -c (CmdInj),
# os.Open, os.ReadFile, ioutil.ReadFile, filepath.Join, http.ServeFile (Path Traversal),
# http.Get, http.Post, http.NewRequest, resty (SSRF)
#
# CWE-89: SQL Injection
# CWE-78: Command Injection
# CWE-22: Path Traversal
# CWE-918: Server-Side Request Forgery
# OWASP A03:2021 - Injection
# OWASP A10:2021 - Server-Side Request Forgery

# ============================================================================
# SQL INJECTION RULES (7 rules)
# ============================================================================

- id: "go-sql-string-concat"
  name: "SQL Query with String Concatenation"
  description: "Building SQL queries via string concatenation with variables allows SQL injection. Use parameterized queries with placeholder arguments instead."
  severity: High
  languages:
    - Go
  pattern:
    query: "(binary_expression left: (interpreted_string_literal) @left (#match? @left \"(?i)(SELECT|INSERT|UPDATE|DELETE|DROP|ALTER|CREATE|UNION|FROM|WHERE)\") operator: \"+\" right: (_) @right) @sql_concat"
    captures:
      - "sql_concat"
  cwe_id: "CWE-89"
  owasp_category: A03_Injection
  help_uri: "https://owasp.org/Top10/A03_2021-Injection/"
  test_cases:
    - code: "query := \"SELECT * FROM users WHERE id = \" + userId"
      expected: TruePositive
    - code: "query := \"DELETE FROM sessions WHERE token = \" + token"
      expected: TruePositive
    - code: "query := \"INSERT INTO logs VALUES (\" + data + \")\""
      expected: TruePositive
    - code: "query := \"SELECT * FROM users WHERE id = $1\""
      expected: TrueNegative
    - code: "msg := \"Hello \" + name"
      expected: TrueNegative
    - code: "db.Query(\"SELECT * FROM users WHERE id = $1\", userId)"
      expected: TrueNegative

- id: "go-fmt-sprintf-sql"
  name: "fmt.Sprintf in SQL Query Construction"
  description: "Using fmt.Sprintf to build SQL queries allows SQL injection. Use parameterized queries with $1 or ? placeholders instead."
  severity: High
  languages:
    - Go
  pattern:
    query: "(call_expression function: (selector_expression operand: (identifier) @pkg (#eq? @pkg \"fmt\") field: (field_identifier) @fn (#eq? @fn \"Sprintf\")) arguments: (argument_list (interpreted_string_literal) @sql (#match? @sql \"(?i)(SELECT|INSERT|UPDATE|DELETE|DROP|ALTER|CREATE|UNION|FROM|WHERE)\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-89"
  owasp_category: A03_Injection
  help_uri: "https://owasp.org/Top10/A03_2021-Injection/"
  test_cases:
    - code: "query := fmt.Sprintf(\"SELECT * FROM users WHERE id = %d\", userId)"
      expected: TruePositive
    - code: "query := fmt.Sprintf(\"DELETE FROM sessions WHERE token = '%s'\", token)"
      expected: TruePositive
    - code: "query := fmt.Sprintf(\"INSERT INTO logs (msg) VALUES ('%s')\", message)"
      expected: TruePositive
    - code: "msg := fmt.Sprintf(\"Hello %s\", name)"
      expected: TrueNegative
    - code: "url := fmt.Sprintf(\"/api/v1/%s/profile\", userId)"
      expected: TrueNegative
    - code: "db.Query(\"SELECT * FROM users WHERE id = $1\", userId)"
      expected: TrueNegative


- id: "go-database-sql-query-sprintf"
  name: "database/sql Query with fmt.Sprintf"
  description: "Passing fmt.Sprintf output to database/sql Query or Exec allows SQL injection. Use parameterized queries with placeholder arguments instead."
  severity: High
  languages:
    - Go
  pattern:
    query: "(call_expression function: (selector_expression field: (field_identifier) @method (#match? @method \"^(Query|QueryRow|Exec|QueryContext|ExecContext)$\")) arguments: (argument_list (call_expression function: (selector_expression operand: (identifier) @pkg (#eq? @pkg \"fmt\") field: (field_identifier) @fn (#eq? @fn \"Sprintf\"))))) @call"
    captures:
      - "call"
  cwe_id: "CWE-89"
  owasp_category: A03_Injection
  help_uri: "https://pkg.go.dev/database/sql"
  test_cases:
    - code: "db.Query(fmt.Sprintf(\"SELECT * FROM users WHERE id = %d\", userId))"
      expected: TruePositive
    - code: "db.Exec(fmt.Sprintf(\"DELETE FROM sessions WHERE token = '%s'\", token))"
      expected: TruePositive
    - code: "db.QueryRow(fmt.Sprintf(\"SELECT name FROM users WHERE email = '%s'\", email))"
      expected: TruePositive
    - code: "db.Query(\"SELECT * FROM users WHERE id = $1\", userId)"
      expected: TrueNegative
    - code: "db.Exec(\"DELETE FROM sessions WHERE token = $1\", token)"
      expected: TrueNegative
    - code: "db.QueryRow(\"SELECT name FROM users WHERE id = ?\", id)"
      expected: TrueNegative

- id: "go-gorm-raw-sprintf"
  name: "GORM Raw Query with fmt.Sprintf"
  description: "Using fmt.Sprintf to build GORM Raw queries allows SQL injection. Use GORM's built-in parameterized query support instead."
  severity: High
  languages:
    - Go
  pattern:
    query: "(call_expression function: (selector_expression field: (field_identifier) @method (#eq? @method \"Raw\")) arguments: (argument_list (call_expression function: (selector_expression operand: (identifier) @pkg (#eq? @pkg \"fmt\") field: (field_identifier) @fn (#eq? @fn \"Sprintf\"))))) @call"
    captures:
      - "call"
  cwe_id: "CWE-89"
  owasp_category: A03_Injection
  help_uri: "https://gorm.io/docs/sql_builder.html"
  test_cases:
    - code: "db.Raw(fmt.Sprintf(\"SELECT * FROM users WHERE name = '%s'\", name)).Scan(&users)"
      expected: TruePositive
    - code: "db.Raw(fmt.Sprintf(\"DELETE FROM tokens WHERE value = '%s'\", token)).Exec()"
      expected: TruePositive
    - code: "db.Raw(fmt.Sprintf(\"UPDATE users SET role = '%s' WHERE id = %d\", role, id)).Exec()"
      expected: TruePositive
    - code: "db.Raw(\"SELECT * FROM users WHERE name = ?\", name).Scan(&users)"
      expected: TrueNegative
    - code: "db.Where(\"name = ?\", name).Find(&users)"
      expected: TrueNegative
    - code: "db.Raw(\"SELECT count(*) FROM users\").Scan(&count)"
      expected: TrueNegative

- id: "go-gorm-raw-concat"
  name: "GORM Raw Query with String Concatenation"
  description: "Concatenating user input into GORM Raw queries allows SQL injection. Use GORM's parameterized query support with ? placeholders instead."
  severity: High
  languages:
    - Go
  pattern:
    query: "(call_expression function: (selector_expression field: (field_identifier) @method (#eq? @method \"Raw\")) arguments: (argument_list (binary_expression left: (interpreted_string_literal) @sql (#match? @sql \"(?i)(SELECT|INSERT|UPDATE|DELETE|FROM|WHERE)\") operator: \"+\" right: (_) @input))) @call"
    captures:
      - "call"
  cwe_id: "CWE-89"
  owasp_category: A03_Injection
  help_uri: "https://gorm.io/docs/sql_builder.html"
  test_cases:
    - code: "db.Raw(\"SELECT * FROM users WHERE id = \" + userId).Scan(&user)"
      expected: TruePositive
    - code: "db.Raw(\"DELETE FROM sessions WHERE token = '\" + token + \"'\").Exec()"
      expected: TruePositive
    - code: "db.Raw(\"UPDATE users SET name = '\" + name + \"' WHERE id = \" + id).Exec()"
      expected: TruePositive
    - code: "db.Raw(\"SELECT * FROM users WHERE id = ?\", userId).Scan(&user)"
      expected: TrueNegative
    - code: "db.Where(\"id = ?\", userId).First(&user)"
      expected: TrueNegative
    - code: "db.Raw(\"SELECT 1\").Scan(&result)"
      expected: TrueNegative

- id: "go-sqlx-sprintf"
  name: "sqlx Query with fmt.Sprintf"
  description: "Using fmt.Sprintf to build sqlx queries allows SQL injection. Use sqlx's named or positional parameter binding instead."
  severity: High
  languages:
    - Go
  pattern:
    query: "(call_expression function: (selector_expression field: (field_identifier) @method (#match? @method \"^(Get|Select|NamedExec|MustExec|Queryx|QueryRowx)$\")) arguments: (argument_list (call_expression function: (selector_expression operand: (identifier) @pkg (#eq? @pkg \"fmt\") field: (field_identifier) @fn (#eq? @fn \"Sprintf\"))))) @call"
    captures:
      - "call"
  cwe_id: "CWE-89"
  owasp_category: A03_Injection
  help_uri: "https://pkg.go.dev/github.com/jmoiron/sqlx"
  test_cases:
    - code: "db.Get(&user, fmt.Sprintf(\"SELECT * FROM users WHERE id = %d\", id))"
      expected: TruePositive
    - code: "db.Select(&users, fmt.Sprintf(\"SELECT * FROM users WHERE role = '%s'\", role))"
      expected: TruePositive
    - code: "db.MustExec(fmt.Sprintf(\"DELETE FROM tokens WHERE value = '%s'\", token))"
      expected: TruePositive
    - code: "db.Get(&user, \"SELECT * FROM users WHERE id = $1\", id)"
      expected: TrueNegative
    - code: "db.Select(&users, \"SELECT * FROM users WHERE role = ?\", role)"
      expected: TrueNegative
    - code: "db.MustExec(\"DELETE FROM tokens WHERE value = $1\", token)"
      expected: TrueNegative

- id: "go-database-sql-exec-concat"
  name: "database/sql Exec with String Concatenation"
  description: "Concatenating user input into database/sql Exec calls allows SQL injection. Use parameterized queries with placeholder arguments instead."
  severity: High
  languages:
    - Go
  pattern:
    query: "(call_expression function: (selector_expression field: (field_identifier) @method (#match? @method \"^(Exec|ExecContext)$\")) arguments: (argument_list (binary_expression left: (interpreted_string_literal) @sql (#match? @sql \"(?i)(INSERT|UPDATE|DELETE|DROP|ALTER|CREATE)\") operator: \"+\" right: (_) @input))) @call"
    captures:
      - "call"
  cwe_id: "CWE-89"
  owasp_category: A03_Injection
  help_uri: "https://pkg.go.dev/database/sql"
  test_cases:
    - code: "db.Exec(\"INSERT INTO users (name) VALUES ('\" + name + \"')\")"
      expected: TruePositive
    - code: "db.Exec(\"DELETE FROM sessions WHERE user_id = \" + userId)"
      expected: TruePositive
    - code: "db.ExecContext(ctx, \"UPDATE users SET role = '\" + role + \"' WHERE id = \" + id)"
      expected: TruePositive
    - code: "db.Exec(\"INSERT INTO users (name) VALUES ($1)\", name)"
      expected: TrueNegative
    - code: "db.Exec(\"DELETE FROM sessions WHERE user_id = ?\", userId)"
      expected: TrueNegative
    - code: "db.Exec(\"CREATE TABLE IF NOT EXISTS users (id SERIAL PRIMARY KEY)\")"
      expected: TrueNegative


# ============================================================================
# COMMAND INJECTION RULES (7 rules)
# ============================================================================

- id: "go-exec-command-variable"
  name: "exec.Command with Variable Program Name"
  description: "Using a variable as the program name in exec.Command allows command injection if the variable is user-controlled. Use a hardcoded program name or validate against an allowlist."
  severity: High
  languages:
    - Go
  pattern:
    query: "(call_expression function: (selector_expression operand: (identifier) @pkg (#eq? @pkg \"exec\") field: (field_identifier) @fn (#eq? @fn \"Command\")) arguments: (argument_list (identifier) @arg)) @call"
    captures:
      - "call"
  cwe_id: "CWE-78"
  owasp_category: A03_Injection
  help_uri: "https://pkg.go.dev/os/exec#Command"
  test_cases:
    - code: "cmd := exec.Command(userProgram, \"--version\")"
      expected: TruePositive
    - code: "cmd := exec.Command(programName, \"--help\")"
      expected: TruePositive
    - code: "out, err := exec.Command(binary, filename).Output()"
      expected: TruePositive
    - code: "cmd := exec.Command(\"ls\", \"-la\")"
      expected: TrueNegative
    - code: "cmd := exec.Command(\"git\", \"status\")"
      expected: TrueNegative
    - code: "cmd := exec.Command(\"/usr/bin/python3\", \"script.py\")"
      expected: TrueNegative

- id: "go-exec-command-bash-c"
  name: "exec.Command with bash -c Shell Invocation"
  description: "Invoking a shell with -c and a command string via exec.Command allows arbitrary command execution. Avoid shell invocations; use exec.Command with the target binary directly."
  severity: Critical
  languages:
    - Go
  pattern:
    query: "(call_expression function: (selector_expression operand: (identifier) @pkg (#eq? @pkg \"exec\") field: (field_identifier) @fn (#eq? @fn \"Command\")) arguments: (argument_list (interpreted_string_literal) @prog (#match? @prog \"^\\\"(sh|bash|zsh|dash|cmd)\\\"$\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-78"
  owasp_category: A03_Injection
  help_uri: "https://owasp.org/Top10/A03_2021-Injection/"
  test_cases:
    - code: "cmd := exec.Command(\"bash\", \"-c\", userCommand)"
      expected: TruePositive
    - code: "cmd := exec.Command(\"sh\", \"-c\", fmt.Sprintf(\"echo %s\", input))"
      expected: TruePositive
    - code: "out, _ := exec.Command(\"bash\", \"-c\", \"rm -rf \" + path).Output()"
      expected: TruePositive
    - code: "cmd := exec.Command(\"git\", \"status\")"
      expected: TrueNegative
    - code: "cmd := exec.Command(\"ls\", \"-la\")"
      expected: TrueNegative
    - code: "cmd := exec.Command(\"python3\", \"script.py\")"
      expected: TrueNegative

- id: "go-exec-command-sprintf-arg"
  name: "exec.Command with fmt.Sprintf Argument"
  description: "Using fmt.Sprintf to build command arguments allows injection of unexpected flags or values. Pass arguments individually without string interpolation."
  severity: High
  languages:
    - Go
  pattern:
    query: "(call_expression function: (selector_expression operand: (identifier) @pkg (#eq? @pkg \"exec\") field: (field_identifier) @fn (#eq? @fn \"Command\")) arguments: (argument_list (interpreted_string_literal) (call_expression function: (selector_expression operand: (identifier) @fmtpkg (#eq? @fmtpkg \"fmt\") field: (field_identifier) @fmtfn (#eq? @fmtfn \"Sprintf\"))))) @call"
    captures:
      - "call"
  cwe_id: "CWE-78"
  owasp_category: A03_Injection
  help_uri: "https://pkg.go.dev/os/exec#Command"
  test_cases:
    - code: "cmd := exec.Command(\"grep\", fmt.Sprintf(\"%s %s\", pattern, filename))"
      expected: TruePositive
    - code: "cmd := exec.Command(\"curl\", fmt.Sprintf(\"https://example.com/%s\", userPath))"
      expected: TruePositive
    - code: "cmd := exec.Command(\"ffmpeg\", fmt.Sprintf(\"-i %s\", inputFile))"
      expected: TruePositive
    - code: "cmd := exec.Command(\"grep\", pattern, filename)"
      expected: TrueNegative
    - code: "cmd := exec.Command(\"echo\", \"hello\")"
      expected: TrueNegative
    - code: "cmd := exec.Command(\"ls\", \"-la\", \"/tmp\")"
      expected: TrueNegative

- id: "go-os-startprocess-variable"
  name: "os.StartProcess with Variable Program Path"
  description: "Using a variable as the program path in os.StartProcess allows command injection if the variable is user-controlled. Use a hardcoded program path or validate against an allowlist."
  severity: High
  languages:
    - Go
  pattern:
    query: "(call_expression function: (selector_expression operand: (identifier) @pkg (#eq? @pkg \"os\") field: (field_identifier) @fn (#eq? @fn \"StartProcess\")) arguments: (argument_list (identifier) @prog)) @call"
    captures:
      - "call"
  cwe_id: "CWE-78"
  owasp_category: A03_Injection
  help_uri: "https://pkg.go.dev/os#StartProcess"
  test_cases:
    - code: "os.StartProcess(userBinary, args, attr)"
      expected: TruePositive
    - code: "os.StartProcess(programPath, []string{\"--help\"}, &os.ProcAttr{})"
      expected: TruePositive
    - code: "os.StartProcess(cmdPath, argv, procAttr)"
      expected: TruePositive
    - code: "os.StartProcess(\"/usr/bin/git\", []string{\"status\"}, &os.ProcAttr{})"
      expected: TrueNegative
    - code: "os.StartProcess(\"/bin/ls\", []string{\"-la\"}, attr)"
      expected: TrueNegative
    - code: "os.Getenv(\"HOME\")"
      expected: TrueNegative

- id: "go-exec-command-context-variable"
  name: "exec.CommandContext with Variable Program Name"
  description: "Using a variable as the program name in exec.CommandContext allows command injection if the variable is user-controlled. Use a hardcoded program name or validate against an allowlist."
  severity: High
  languages:
    - Go
  pattern:
    query: "(call_expression function: (selector_expression operand: (identifier) @pkg (#eq? @pkg \"exec\") field: (field_identifier) @fn (#eq? @fn \"CommandContext\")) arguments: (argument_list (_) (identifier) @prog)) @call"
    captures:
      - "call"
  cwe_id: "CWE-78"
  owasp_category: A03_Injection
  help_uri: "https://pkg.go.dev/os/exec#CommandContext"
  test_cases:
    - code: "cmd := exec.CommandContext(ctx, userProgram, \"--version\")"
      expected: TruePositive
    - code: "cmd := exec.CommandContext(ctx, binary, args...)"
      expected: TruePositive
    - code: "cmd := exec.CommandContext(ctx, programName)"
      expected: TruePositive
    - code: "cmd := exec.CommandContext(ctx, \"git\", \"status\")"
      expected: TrueNegative
    - code: "cmd := exec.CommandContext(ctx, \"ls\", \"-la\")"
      expected: TrueNegative
    - code: "cmd := exec.CommandContext(ctx, \"/usr/bin/python3\", \"script.py\")"
      expected: TrueNegative

- id: "go-syscall-exec-variable"
  name: "syscall.Exec with Variable Program Path"
  description: "Using a variable as the program path in syscall.Exec allows command injection. Validate the program path against an allowlist before use."
  severity: Critical
  languages:
