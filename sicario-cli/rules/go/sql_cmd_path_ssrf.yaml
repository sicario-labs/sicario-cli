    captures:
      - "call"
  cwe_id: "CWE-22"
  owasp_category: A03_Injection
  help_uri: "https://owasp.org/Top10/A03_2021-Injection/"
  test_cases:
    - code: "data, err := os.ReadFile(fmt.Sprintf(\"/uploads/%s\", userFilename))"
      expected: TruePositive
    - code: "content, err := os.ReadFile(fmt.Sprintf(\"./data/%s/%s\", tenantId, fileName))"
