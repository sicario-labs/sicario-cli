  severity: Medium
  languages:
    - Go
  pattern:
    query: "(call_expression function: (selector_expression field: (field_identifier) @fn (#eq? @fn \"Decode\")) arguments: (argument_list (unary_expression operand: (identifier) @target))) @call"
    captures:
