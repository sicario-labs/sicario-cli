- id: "go-xml-copy-token"
  name: "xml.CopyToken Without Filtering"
  description: "Using xml.CopyToken to process untrusted XML tokens without filtering entity declarations can propagate XXE payloads. Filter out processing instructions and entity declarations."
  severity: Low
  languages:
    - Go
  pattern:
    query: "(call_expression function: (selector_expression operand: (identifier) @pkg (#eq? @pkg \"xml\") field: (field_identifier) @fn (#eq? @fn \"CopyToken\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-611"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://cwe.mitre.org/data/definitions/611.html"
  test_cases:
    - code: "newToken := xml.CopyToken(token)"
      expected: TruePositive
    - code: "copied := xml.CopyToken(t)"
      expected: TruePositive
    - code: "tok := xml.CopyToken(xmlToken)"
      expected: TruePositive
    - code: "xml.NewEncoder(w)"
      expected: TrueNegative
    - code: "xml.Marshal(data)"
      expected: TrueNegative
    - code: "json.NewDecoder(r.Body)"
      expected: TrueNegative
