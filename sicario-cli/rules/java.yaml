# Basic Java Security Rules
# Covers: hardcoded credentials, dangerous function usage, insecure patterns
#
# These are general-purpose Java security rules. More specific rules for
# SQL injection, XSS, command injection, deserialization, path traversal,
# crypto, Spring Boot, SSRF, XXE, LDAP, and logging are in
# the java/ subdirectory.

- id: "java-hardcoded-password"
  name: "Hardcoded Password or Secret"
  description: "Password, secret, or API key assigned as a string literal. Use environment variables or a secrets manager instead."
  severity: High
  languages:
    - Java
  pattern:
    query: "(variable_declarator name: (identifier) @name (#match? @name \"(?i)(password|passwd|secret|apiKey|api_key|token|accessToken|secretKey)\") value: (string_literal) @val) @assign"
    captures:
      - "assign"
  cwe_id: "CWE-798"
  owasp_category: A02_CryptographicFailures
  help_uri: "https://cwe.mitre.org/data/definitions/798.html"
  test_cases:
    - code: "String password = \"supersecret123\";"
      expected: TruePositive
    - code: "String apiKey = \"sk-1234567890abcdef\";"
      expected: TruePositive
    - code: "String secretKey = \"my-secret-key-value\";"
      expected: TruePositive
    - code: "String password = System.getenv(\"DB_PASSWORD\");"
      expected: TrueNegative
    - code: "String username = \"admin\";"
      expected: TrueNegative
    - code: "int count = 42;"
      expected: TrueNegative

- id: "java-system-exit"
  name: "System.exit() Call"
  description: "System.exit() terminates the JVM abruptly and can cause denial of service in server applications. Use proper shutdown hooks or exception handling instead."
  severity: Medium
  languages:
    - Java
  pattern:
    query: "(method_invocation object: (identifier) @obj (#eq? @obj \"System\") name: (identifier) @method (#eq? @method \"exit\")) @call"
    captures:
      - "call"
  cwe_id: "CWE-382"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://cwe.mitre.org/data/definitions/382.html"
  test_cases:
    - code: "System.exit(0);"
      expected: TruePositive
    - code: "System.exit(1);"
      expected: TruePositive
    - code: "System.exit(-1);"
      expected: TruePositive
    - code: "Runtime.getRuntime().addShutdownHook(hook);"
      expected: TrueNegative
    - code: "System.out.println(\"exiting\");"
      expected: TrueNegative
    - code: "throw new RuntimeException(\"fatal error\");"
      expected: TrueNegative

- id: "java-empty-catch-block"
  name: "Empty Catch Block Swallowing Exceptions"
  description: "Empty catch blocks silently swallow exceptions, potentially hiding security-relevant errors. Log or rethrow the exception."
  severity: Medium
  languages:
    - Java
  pattern:
    query: "(catch_clause body: (block) @body (#eq? @body \"{ }\")) @catch"
    captures:
      - "catch"
  cwe_id: "CWE-390"
  owasp_category: A09_SecurityLoggingFailures
  help_uri: "https://cwe.mitre.org/data/definitions/390.html"
  test_cases:
    - code: "try { doSomething(); } catch (Exception e) { }"
      expected: TruePositive
    - code: "try { connect(); } catch (IOException e) { }"
      expected: TruePositive
    - code: "try { parse(); } catch (ParseException e) { }"
      expected: TruePositive
    - code: "try { doSomething(); } catch (Exception e) { logger.error(\"Error\", e); }"
      expected: TrueNegative
    - code: "try { connect(); } catch (IOException e) { throw new RuntimeException(e); }"
      expected: TrueNegative
    - code: "try { parse(); } catch (ParseException e) { e.printStackTrace(); }"
      expected: TrueNegative

- id: "java-thread-sleep-in-loop"
  name: "Thread.sleep() in Loop"
  description: "Using Thread.sleep() in a loop for polling is error-prone and can cause timing-based vulnerabilities. Use ScheduledExecutorService or proper synchronization instead."
  severity: Low
  languages:
    - Java
  pattern:
    query: "(while_statement body: (block (expression_statement (method_invocation object: (identifier) @obj (#eq? @obj \"Thread\") name: (identifier) @method (#eq? @method \"sleep\"))))) @loop"
    captures:
      - "loop"
  cwe_id: "CWE-362"
  owasp_category: A04_InsecureDesign
  help_uri: "https://cwe.mitre.org/data/definitions/362.html"
  test_cases:
    - code: "while (true) { Thread.sleep(1000); checkStatus(); }"
      expected: TruePositive
    - code: "while (running) { Thread.sleep(500); poll(); }"
      expected: TruePositive
    - code: "while (!done) { Thread.sleep(100); retry(); }"
      expected: TruePositive
    - code: "ScheduledExecutorService executor = Executors.newScheduledThreadPool(1);"
      expected: TrueNegative
    - code: "Thread.sleep(1000);"
      expected: TrueNegative
    - code: "while (true) { queue.take(); process(); }"
      expected: TrueNegative
