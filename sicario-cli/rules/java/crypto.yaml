# Insecure Cryptography Rules for Java
# Covers: MD5/SHA1 via MessageDigest, DES/3DES, ECB mode, hardcoded keys,
# java.util.Random for security, weak key sizes, insecure SecureRandom seeds,
# deprecated crypto algorithms
#
# CWE-327: Use of a Broken or Risky Cryptographic Algorithm
# CWE-328: Use of Weak Hash
# CWE-330: Use of Insufficiently Random Values
# OWASP A02:2021 - Cryptographic Failures

# ============================================================================
# Weak Hash Algorithms (3 rules)
# ============================================================================

- id: "java-crypto-md5-messagedigest"
  name: "MessageDigest.getInstance(\"MD5\")"
  description: "MD5 is cryptographically broken and must not be used for password hashing or integrity verification. Use SHA-256 or bcrypt instead."
  severity: High
  languages:
    - Java
  pattern:
    query: "(method_invocation object: (identifier) @obj (#eq? @obj \"MessageDigest\") name: (identifier) @method (#eq? @method \"getInstance\") arguments: (argument_list (string_literal) @algo (#match? @algo \"(?i)MD5\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-328"
  owasp_category: A02_CryptographicFailures
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html"
  test_cases:
    - code: "MessageDigest.getInstance(\"MD5\");"
      expected: TruePositive
    - code: "MessageDigest md = MessageDigest.getInstance(\"MD5\");"
      expected: TruePositive
    - code: "MessageDigest.getInstance(\"md5\");"
      expected: TruePositive
    - code: "MessageDigest.getInstance(\"SHA-256\");"
      expected: TrueNegative
    - code: "MessageDigest.getInstance(\"SHA-512\");"
      expected: TrueNegative
    - code: "MessageDigest.isEqual(a, b);"
      expected: TrueNegative

- id: "java-crypto-sha1-messagedigest"
  name: "MessageDigest.getInstance(\"SHA-1\")"
  description: "SHA-1 is cryptographically weak and must not be used for password hashing or digital signatures. Use SHA-256 or bcrypt instead."
  severity: High
  languages:
    - Java
  pattern:
    query: "(method_invocation object: (identifier) @obj (#eq? @obj \"MessageDigest\") name: (identifier) @method (#eq? @method \"getInstance\") arguments: (argument_list (string_literal) @algo (#match? @algo \"(?i)(SHA-?1|SHA1)\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-328"
  owasp_category: A02_CryptographicFailures
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html"
  test_cases:
    - code: "MessageDigest.getInstance(\"SHA-1\");"
      expected: TruePositive
    - code: "MessageDigest.getInstance(\"SHA1\");"
      expected: TruePositive
    - code: "MessageDigest md = MessageDigest.getInstance(\"SHA-1\");"
      expected: TruePositive
    - code: "MessageDigest.getInstance(\"SHA-256\");"
      expected: TrueNegative
    - code: "MessageDigest.getInstance(\"SHA-512\");"
      expected: TrueNegative
    - code: "MessageDigest.isEqual(a, b);"
      expected: TrueNegative

- id: "java-crypto-md2-messagedigest"
