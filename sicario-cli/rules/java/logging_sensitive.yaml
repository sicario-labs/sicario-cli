- id: "java-log-sysout-exception-sensitive"
  name: "System.out.println with Exception Containing Sensitive Data"
  description: "Printing exception stack traces to stdout may expose sensitive data in error messages. Use a logging framework and sanitize exception messages."
  severity: Medium
  languages:
    - Java
  pattern:
    query: "(method_invocation object: (field_access object: (identifier) @sys (#eq? @sys \"System\") field: (identifier) @field (#eq? @field \"out\")) name: (identifier) @method (#eq? @method \"println\") arguments: (argument_list (method_invocation object: (identifier) @ex name: (identifier) @msg (#match? @msg \"^(getMessage|toString|getStackTrace)$\")))) @call"
    captures:
      - "call"
  cwe_id: "CWE-532"
  owasp_category: A09_SecurityLoggingFailures
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Logging_Cheat_Sheet.html"
  test_cases:
    - code: "System.out.println(e.getMessage());"
      expected: TruePositive
    - code: "System.out.println(ex.toString());"
      expected: TruePositive
    - code: "System.out.println(exception.getMessage());"
      expected: TruePositive
    - code: "logger.error(\"Error occurred\", e);"
      expected: TrueNegative
    - code: "System.out.println(\"Error occurred\");"
      expected: TrueNegative
    - code: "throw new RuntimeException(e);"
      expected: TrueNegative

