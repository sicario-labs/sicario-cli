# ============================================================================
# printStackTrace and Sensitive Exception Logging (2 rules)
# ============================================================================

- id: "java-log-printstacktrace"
  name: "Exception.printStackTrace() Usage"
  description: "printStackTrace() writes to stderr and may expose sensitive internal details. Use a logging framework with appropriate log levels instead."
  severity: Medium
  languages:
    - Java
  pattern:
    query: "(method_invocation object: (identifier) @obj name: (identifier) @method (#eq? @method \"printStackTrace\")) @call"
    captures:
      - "call"
  cwe_id: "CWE-532"
  owasp_category: A09_SecurityLoggingFailures
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Logging_Cheat_Sheet.html"
  test_cases:
    - code: "e.printStackTrace();"
      expected: TruePositive
    - code: "ex.printStackTrace();"
      expected: TruePositive
    - code: "exception.printStackTrace();"
      expected: TruePositive
    - code: "logger.error(\"Error occurred\", e);"
      expected: TrueNegative
    - code: "throw new RuntimeException(e);"
      expected: TrueNegative
    - code: "e.getMessage();"
      expected: TrueNegative

- id: "java-log-exception-message-concat"
  name: "Logging Exception Message with Sensitive Context"
  description: "Logging exception messages that include sensitive variable context may expose secrets. Sanitize exception messages before logging."
  severity: Medium
  languages:
    - Java
  pattern:
    query: "(method_invocation object: (identifier) @obj name: (identifier) @method (#match? @method \"^(info|debug|warn|error|fatal)$\") arguments: (argument_list (binary_expression left: (string_literal) @msg (#match? @msg \"(?i)(password|passwd|secret|token|apiKey|api_key|credential)\") right: (method_invocation name: (identifier) @fn (#eq? @fn \"getMessage\"))))) @call"
    captures:
      - "call"
  cwe_id: "CWE-532"
  owasp_category: A09_SecurityLoggingFailures
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Logging_Cheat_Sheet.html"
  test_cases:
    - code: "logger.error(\"Password validation error: \" + e.getMessage());"
      expected: TruePositive
    - code: "log.warn(\"Token refresh failed: \" + ex.getMessage());"
      expected: TruePositive
    - code: "logger.info(\"Secret rotation error: \" + exception.getMessage());"
      expected: TruePositive
    - code: "logger.error(\"Connection failed: \" + e.getMessage());"
      expected: TrueNegative
    - code: "logger.error(\"Error occurred\", e);"
      expected: TrueNegative
    - code: "logger.info(\"Processing complete\");"
      expected: TrueNegative
