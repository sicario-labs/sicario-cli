# Logging Sensitive Data Rules for Java
# Covers: passwords/tokens/API keys in Logger.info, Logger.debug,
# System.out.println, SLF4J, Log4j, System.err.println,
# exception messages with sensitive data
#
# CWE-532: Insertion of Sensitive Information into Log File
# OWASP A09:2021 - Security Logging and Monitoring Failures

# ============================================================================
# Logger.info / Logger.debug with Sensitive Data (3 rules)
# ============================================================================

- id: "java-log-logger-info-password"
  name: "Logger.info with Password/Secret"
  description: "Logging passwords, secrets, or tokens at INFO level exposes sensitive data in log files. Mask or redact sensitive values before logging."
  severity: High
  languages:
    - Java
  pattern:
    query: "(method_invocation object: (identifier) @obj name: (identifier) @method (#match? @method \"^(info|warn|error|fatal)$\") arguments: (argument_list (binary_expression left: (string_literal) @msg (#match? @msg \"(?i)(password|passwd|secret|token|apiKey|api_key|credential|ssn|credit.?card)\")))) @call"
    captures:
      - "call"
  cwe_id: "CWE-532"
  owasp_category: A09_SecurityLoggingFailures
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Logging_Cheat_Sheet.html"
  test_cases:
    - code: "logger.info(\"User password: \" + password);"
      expected: TruePositive
    - code: "log.info(\"API token: \" + token);"
      expected: TruePositive
    - code: "logger.warn(\"Secret key: \" + secretKey);"
      expected: TruePositive
    - code: "logger.info(\"User logged in: \" + username);"
      expected: TrueNegative
    - code: "logger.info(\"Request processed successfully\");"
      expected: TrueNegative
    - code: "logger.info(\"Processing {} items\", count);"
      expected: TrueNegative

- id: "java-log-logger-debug-password"
  name: "Logger.debug with Password/Secret"
  description: "Logging passwords or secrets at DEBUG level exposes sensitive data when debug logging is enabled. Never log sensitive values at any level."
  severity: High
  languages:
    - Java
  pattern:
    query: "(method_invocation object: (identifier) @obj name: (identifier) @method (#eq? @method \"debug\") arguments: (argument_list (binary_expression left: (string_literal) @msg (#match? @msg \"(?i)(password|passwd|secret|token|apiKey|api_key|credential|ssn|credit.?card)\")))) @call"
    captures:
      - "call"
  cwe_id: "CWE-532"
  owasp_category: A09_SecurityLoggingFailures
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Logging_Cheat_Sheet.html"
  test_cases:
    - code: "logger.debug(\"Password hash: \" + hash);"
      expected: TruePositive
    - code: "log.debug(\"Token value: \" + token);"
      expected: TruePositive
    - code: "logger.debug(\"API key: \" + apiKey);"
      expected: TruePositive
    - code: "logger.debug(\"Processing request for user: \" + userId);"
      expected: TrueNegative
    - code: "logger.debug(\"Cache hit for key: \" + cacheKey);"
      expected: TrueNegative
    - code: "logger.debug(\"Entering method\");"
      expected: TrueNegative

- id: "java-log-slf4j-placeholder-password"
  name: "SLF4J Logger with Password in Placeholder"
  description: "Logging sensitive data via SLF4J placeholders exposes secrets in log files. Mask or redact sensitive values before logging."
  severity: High
  languages:
    - Java
  pattern:
    query: "(method_invocation object: (identifier) @obj name: (identifier) @method (#match? @method \"^(info|debug|warn|error|trace)$\") arguments: (argument_list (string_literal) @msg (#match? @msg \"(?i)(password|passwd|secret|token|apiKey|api_key|credential).*\\\\{\\\\}\") (identifier) @arg)) @call"
    captures:
      - "call"
  cwe_id: "CWE-532"
  owasp_category: A09_SecurityLoggingFailures
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Logging_Cheat_Sheet.html"
  test_cases:
    - code: "logger.info(\"User password: {}\", password);"
      expected: TruePositive
    - code: "log.debug(\"API token: {}\", token);"
      expected: TruePositive
    - code: "logger.warn(\"Secret key: {}\", secretKey);"
      expected: TruePositive
    - code: "logger.info(\"User {} logged in\", username);"
      expected: TrueNegative
    - code: "logger.info(\"Request completed in {} ms\", duration);"
      expected: TrueNegative
    - code: "logger.debug(\"Processing item {}\", itemId);"
      expected: TrueNegative


# ============================================================================
# System.out.println / System.err.println with Sensitive Data (3 rules)
# ============================================================================

- id: "java-log-sysout-password"
  name: "System.out.println with Password/Secret"
  description: "Printing passwords or secrets to stdout exposes sensitive data. Use a proper logging framework with redaction and never log sensitive values."
  severity: High
  languages:
    - Java
  pattern:
    query: "(method_invocation object: (field_access object: (identifier) @sys (#eq? @sys \"System\") field: (identifier) @field (#eq? @field \"out\")) name: (identifier) @method (#match? @method \"^(println|print|printf)$\") arguments: (argument_list (binary_expression left: (string_literal) @msg (#match? @msg \"(?i)(password|passwd|secret|token|apiKey|api_key|credential|ssn|credit.?card)\")))) @call"
    captures:
      - "call"
  cwe_id: "CWE-532"
  owasp_category: A09_SecurityLoggingFailures
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Logging_Cheat_Sheet.html"
  test_cases:
    - code: "System.out.println(\"Password: \" + password);"
      expected: TruePositive
    - code: "System.out.println(\"API token: \" + token);"
      expected: TruePositive
    - code: "System.out.println(\"Secret: \" + secret);"
      expected: TruePositive
    - code: "System.out.println(\"Hello, \" + name);"
      expected: TrueNegative
    - code: "System.out.println(\"Processing complete\");"
      expected: TrueNegative
    - code: "System.out.println(count);"
      expected: TrueNegative

