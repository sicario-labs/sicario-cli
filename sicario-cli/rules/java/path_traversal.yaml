# ============================================================================
# ClassLoader / ServletContext Resource Loading (2 rules)
# ============================================================================

- id: "java-path-classloader-resource-concat"
  name: "ClassLoader.getResource with String Concatenation"
  description: "Concatenating user input into ClassLoader.getResource paths allows path traversal to access arbitrary classpath resources. Validate input against an allowlist."
  severity: Medium
  languages:
    - Java
  pattern:
    query: "(method_invocation name: (identifier) @method (#match? @method \"^(getResource|getResourceAsStream)$\") arguments: (argument_list (binary_expression))) @call"
    captures:
      - "call"
  cwe_id: "CWE-22"
  owasp_category: A01_BrokenAccessControl
  help_uri: "https://owasp.org/www-community/attacks/Path_Traversal"
  test_cases:
    - code: "getClass().getResource(\"/templates/\" + userTemplate);"
      expected: TruePositive
    - code: "classLoader.getResourceAsStream(\"/config/\" + configName);"
      expected: TruePositive
    - code: "Thread.currentThread().getContextClassLoader().getResource(\"/data/\" + fileName);"
      expected: TruePositive
    - code: "getClass().getResource(\"/templates/default.html\");"
      expected: TrueNegative
    - code: "classLoader.getResourceAsStream(\"/config/app.properties\");"
      expected: TrueNegative
    - code: "getClass().getName();"
      expected: TrueNegative

- id: "java-path-servlet-resource-concat"
  name: "ServletContext.getResource with String Concatenation"
  description: "Concatenating user input into ServletContext.getResource paths allows path traversal to access arbitrary web resources. Validate input against an allowlist."
  severity: High
  languages:
    - Java
  pattern:
    query: "(method_invocation object: (identifier) @obj name: (identifier) @method (#match? @method \"^(getResource|getResourceAsStream|getRealPath)$\") arguments: (argument_list (binary_expression left: (string_literal)))) @call"
    captures:
      - "call"
  cwe_id: "CWE-22"
  owasp_category: A01_BrokenAccessControl
  help_uri: "https://owasp.org/www-community/attacks/Path_Traversal"
  test_cases:
    - code: "servletContext.getResource(\"/WEB-INF/\" + userFile);"
      expected: TruePositive
    - code: "context.getResourceAsStream(\"/pages/\" + pageName);"
      expected: TruePositive
    - code: "servletContext.getRealPath(\"/uploads/\" + filename);"
      expected: TruePositive
    - code: "servletContext.getResource(\"/WEB-INF/web.xml\");"
      expected: TrueNegative
    - code: "context.getResourceAsStream(\"/config/app.properties\");"
      expected: TrueNegative
    - code: "servletContext.getContextPath();"
      expected: TrueNegative

# ============================================================================
# Spring Resource Loading (1 rule)
# ============================================================================

- id: "java-path-spring-resource-concat"
  name: "Spring Resource Loading with String Concatenation"
  description: "Concatenating user input into Spring resource paths (classpath:, file:) allows path traversal. Validate and sanitize resource paths."
  severity: High
  languages:
    - Java
  pattern:
    query: "(method_invocation name: (identifier) @method (#eq? @method \"getResource\") arguments: (argument_list (binary_expression left: (string_literal) @prefix (#match? @prefix \"^\\\"(classpath:|file:|http:)\")))) @call"
    captures:
      - "call"
  cwe_id: "CWE-22"
  owasp_category: A01_BrokenAccessControl
  help_uri: "https://docs.spring.io/spring-framework/docs/current/javadoc-api/org/springframework/core/io/ResourceLoader.html"
  test_cases:
    - code: "resourceLoader.getResource(\"classpath:\" + userPath);"
      expected: TruePositive
    - code: "ctx.getResource(\"file:\" + request.getParameter(\"path\"));"
      expected: TruePositive
    - code: "resourceLoader.getResource(\"classpath:/templates/\" + templateName);"
      expected: TruePositive
    - code: "resourceLoader.getResource(\"classpath:application.properties\");"
      expected: TrueNegative
    - code: "ctx.getResource(\"file:/etc/config.yaml\");"
      expected: TrueNegative
    - code: "resourceLoader.getResource(validatedPath);"
      expected: TrueNegative

# ============================================================================
# Path.resolve with User Input (1 rule)
# ============================================================================

- id: "java-path-resolve-variable"
  name: "Path.resolve with Variable Input"
  description: "Resolving paths with user-controlled input may allow path traversal. Validate that the resolved path stays within the expected base directory."
  severity: Medium
  languages:
    - Java
  pattern:
    query: "(method_invocation object: (identifier) @obj name: (identifier) @method (#eq? @method \"resolve\") arguments: (argument_list . (identifier) @arg)) @call"
    captures:
      - "call"
  cwe_id: "CWE-22"
  owasp_category: A01_BrokenAccessControl
  help_uri: "https://owasp.org/www-community/attacks/Path_Traversal"
  test_cases:
    - code: "basePath.resolve(userInput);"
      expected: TruePositive
    - code: "uploadDir.resolve(filename);"
      expected: TruePositive
    - code: "dataDir.resolve(requestedFile);"
      expected: TruePositive
    - code: "basePath.resolve(\"config.yaml\");"
      expected: TrueNegative
    - code: "path.toAbsolutePath();"
      expected: TrueNegative
    - code: "path.getParent();"
      expected: TrueNegative
