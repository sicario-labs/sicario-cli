# Path Traversal Rules for Java
# Covers: new File(), Paths.get(), FileInputStream, Spring Resource loading,
# Files.readAllBytes, Files.write, FileOutputStream, RandomAccessFile,
# ClassLoader.getResource, ServletContext.getResource
#
# CWE-22: Improper Limitation of a Pathname to a Restricted Directory
# OWASP A01:2021 - Broken Access Control

# ============================================================================
# File Constructor Path Traversal (2 rules)
# ============================================================================

- id: "java-path-file-concat"
  name: "new File() with String Concatenation"
  description: "Concatenating user input into File constructor paths allows path traversal. Validate and canonicalize paths against a base directory."
  severity: High
  languages:
    - Java
  pattern:
    query: "(object_creation_expression type: (type_identifier) @type (#eq? @type \"File\") arguments: (argument_list (binary_expression))) @call"
    captures:
      - "call"
  cwe_id: "CWE-22"
  owasp_category: A01_BrokenAccessControl
  help_uri: "https://owasp.org/www-community/attacks/Path_Traversal"
  test_cases:
    - code: "new File(\"/uploads/\" + userFilename);"
      expected: TruePositive
    - code: "new File(baseDir + \"/\" + request.getParameter(\"file\"));"
      expected: TruePositive
    - code: "new File(\"/data/\" + tenantId + \"/\" + fileName);"
      expected: TruePositive
    - code: "new File(\"/etc/config.properties\");"
      expected: TrueNegative
    - code: "new File(\"src/main/resources/app.yaml\");"
      expected: TrueNegative
    - code: "new File(canonicalPath);"
      expected: TrueNegative

- id: "java-path-file-variable"
  name: "new File() with Variable Path"
  description: "Passing a variable directly to the File constructor may allow path traversal if the variable is user-controlled. Validate and canonicalize paths."
  severity: Medium
  languages:
    - Java
  pattern:
    query: "(object_creation_expression type: (type_identifier) @type (#eq? @type \"File\") arguments: (argument_list . (identifier) @arg)) @call"
    captures:
      - "call"
  cwe_id: "CWE-22"
  owasp_category: A01_BrokenAccessControl
  help_uri: "https://owasp.org/www-community/attacks/Path_Traversal"
  test_cases:
    - code: "new File(userPath);"
      expected: TruePositive
    - code: "new File(filename);"
      expected: TruePositive
    - code: "new File(requestedFile);"
      expected: TruePositive
    - code: "new File(\"/etc/config.properties\");"
      expected: TrueNegative
    - code: "new File(\"resources\", \"app.yaml\");"
      expected: TrueNegative
    - code: "file.delete();"
      expected: TrueNegative


# ============================================================================
# Paths.get Path Traversal (2 rules)
# ============================================================================

- id: "java-path-paths-get-concat"
  name: "Paths.get() with String Concatenation"
  description: "Concatenating user input into Paths.get() allows path traversal. Resolve paths against a safe base directory and use Path.normalize()."
  severity: High
  languages:
    - Java
  pattern:
    query: "(method_invocation object: (identifier) @obj (#eq? @obj \"Paths\") name: (identifier) @method (#eq? @method \"get\") arguments: (argument_list (binary_expression))) @call"
    captures:
      - "call"
  cwe_id: "CWE-22"
  owasp_category: A01_BrokenAccessControl
  help_uri: "https://owasp.org/www-community/attacks/Path_Traversal"
  test_cases:
    - code: "Paths.get(\"/uploads/\" + userFilename);"
      expected: TruePositive
    - code: "Paths.get(baseDir + \"/\" + request.getParameter(\"path\"));"
      expected: TruePositive
    - code: "Paths.get(\"/data/\" + tenantId + \"/\" + fileName);"
      expected: TruePositive
    - code: "Paths.get(\"/etc/config.properties\");"
      expected: TrueNegative
    - code: "Paths.get(\"src\", \"main\", \"resources\");"
      expected: TrueNegative
    - code: "Paths.get(System.getProperty(\"user.home\"));"
      expected: TrueNegative

- id: "java-path-paths-get-variable"
  name: "Paths.get() with Variable Path"
  description: "Passing a variable directly to Paths.get() may allow path traversal if the variable is user-controlled. Validate and canonicalize paths."
  severity: Medium
  languages:
    - Java
  pattern:
    query: "(method_invocation object: (identifier) @obj (#eq? @obj \"Paths\") name: (identifier) @method (#eq? @method \"get\") arguments: (argument_list . (identifier) @arg)) @call"
    captures:
      - "call"
  cwe_id: "CWE-22"
  owasp_category: A01_BrokenAccessControl
  help_uri: "https://owasp.org/www-community/attacks/Path_Traversal"
  test_cases:
    - code: "Paths.get(userPath);"
      expected: TruePositive
    - code: "Paths.get(filename);"
      expected: TruePositive
    - code: "Paths.get(requestedFile);"
      expected: TruePositive
    - code: "Paths.get(\"/etc/config.properties\");"
      expected: TrueNegative
    - code: "Paths.get(\"src\", \"main\");"
      expected: TrueNegative
    - code: "path.toAbsolutePath();"
      expected: TrueNegative

