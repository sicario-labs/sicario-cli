# ============================================================================
# Files.readAllBytes / Files.write Path Traversal (2 rules)
# ============================================================================

- id: "java-path-files-read-concat"
  name: "Files.readAllBytes with Concatenated Path"
  description: "Using string concatenation to build paths for Files.readAllBytes allows path traversal. Validate and canonicalize paths."
  severity: High
  languages:
    - Java
  pattern:
    query: "(method_invocation object: (identifier) @obj (#eq? @obj \"Files\") name: (identifier) @method (#match? @method \"^(readAllBytes|readAllLines|readString|read)$\") arguments: (argument_list (method_invocation object: (identifier) @p (#eq? @p \"Paths\") name: (identifier) @g (#eq? @g \"get\") arguments: (argument_list (binary_expression))))) @call"
    captures:
      - "call"
  cwe_id: "CWE-22"
  owasp_category: A01_BrokenAccessControl
  help_uri: "https://owasp.org/www-community/attacks/Path_Traversal"
  test_cases:
    - code: "Files.readAllBytes(Paths.get(\"/uploads/\" + filename));"
      expected: TruePositive
    - code: "Files.readAllLines(Paths.get(baseDir + \"/\" + userFile));"
      expected: TruePositive
    - code: "Files.readString(Paths.get(\"/data/\" + request.getParameter(\"file\")));"
      expected: TruePositive
    - code: "Files.readAllBytes(Paths.get(\"/etc/config.properties\"));"
      expected: TrueNegative
    - code: "Files.readAllBytes(validatedPath);"
      expected: TrueNegative
    - code: "Files.exists(path);"
      expected: TrueNegative

- id: "java-path-files-write-concat"
  name: "Files.write with Concatenated Path"
  description: "Using string concatenation to build paths for Files.write allows path traversal and arbitrary file write. Validate and canonicalize paths."
  severity: High
  languages:
    - Java
  pattern:
    query: "(method_invocation object: (identifier) @obj (#eq? @obj \"Files\") name: (identifier) @method (#match? @method \"^(write|writeString|copy|move)$\") arguments: (argument_list (method_invocation object: (identifier) @p (#eq? @p \"Paths\") name: (identifier) @g (#eq? @g \"get\") arguments: (argument_list (binary_expression))))) @call"
    captures:
      - "call"
  cwe_id: "CWE-22"
  owasp_category: A01_BrokenAccessControl
  help_uri: "https://owasp.org/www-community/attacks/Path_Traversal"
  test_cases:
    - code: "Files.write(Paths.get(\"/uploads/\" + filename), data);"
      expected: TruePositive
    - code: "Files.copy(inputStream, Paths.get(baseDir + \"/\" + userFile));"
      expected: TruePositive
    - code: "Files.writeString(Paths.get(\"/data/\" + name), content);"
      expected: TruePositive
    - code: "Files.write(Paths.get(\"/etc/output.txt\"), data);"
      expected: TrueNegative
    - code: "Files.write(validatedPath, content);"
      expected: TrueNegative
    - code: "Files.delete(path);"
      expected: TrueNegative

