# Server-Side Request Forgery (SSRF) Rules for Java
# Covers: HttpURLConnection, HttpClient, RestTemplate, WebClient,
# URL.openConnection, URL.openStream, URLConnection, OkHttpClient, Apache HttpClient
#
# CWE-918: Server-Side Request Forgery
# OWASP A10:2021 - Server-Side Request Forgery

# ============================================================================
# HttpURLConnection SSRF (2 rules)
# ============================================================================

- id: "java-ssrf-httpurlconnection-concat"
  name: "HttpURLConnection with Concatenated URL"
  description: "Constructing URLs from user input for HttpURLConnection enables SSRF. Validate URLs against an allowlist of permitted hosts."
  severity: High
  languages:
    - Java
  pattern:
    query: "(object_creation_expression type: (type_identifier) @type (#eq? @type \"URL\") arguments: (argument_list (binary_expression))) @call"
    captures:
      - "call"
  cwe_id: "CWE-918"
  owasp_category: A10_SSRF
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Server_Side_Request_Forgery_Prevention_Cheat_Sheet.html"
  test_cases:
    - code: "new URL(\"http://\" + userHost + \"/api\");"
      expected: TruePositive
    - code: "new URL(baseUrl + request.getParameter(\"url\"));"
      expected: TruePositive
    - code: "new URL(\"https://\" + hostname + \":\" + port + \"/path\");"
      expected: TruePositive
    - code: "new URL(\"https://api.example.com/v1/data\");"
      expected: TrueNegative
    - code: "new URL(\"https://localhost:8080/health\");"
      expected: TrueNegative
    - code: "new File(\"/tmp/test\");"
      expected: TrueNegative

- id: "java-ssrf-httpurlconnection-variable"
  name: "HttpURLConnection with Variable URL"
  description: "Passing a variable URL to HttpURLConnection may enable SSRF if the variable is user-controlled. Validate URLs against an allowlist."
  severity: High
  languages:
    - Java
  pattern:
    query: "(method_invocation object: (parenthesized_expression (cast_expression type: (type_identifier) @cast (#eq? @cast \"HttpURLConnection\") value: (method_invocation object: (object_creation_expression type: (type_identifier) @type (#eq? @type \"URL\") arguments: (argument_list (identifier) @url)) name: (identifier) @method (#eq? @method \"openConnection\"))))) @call"
    captures:
      - "call"
  cwe_id: "CWE-918"
  owasp_category: A10_SSRF
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Server_Side_Request_Forgery_Prevention_Cheat_Sheet.html"
  test_cases:
    - code: "((HttpURLConnection) new URL(targetUrl).openConnection()).getResponseCode();"
      expected: TruePositive
    - code: "((HttpURLConnection) new URL(userUrl).openConnection()).getInputStream();"
      expected: TruePositive
    - code: "((HttpURLConnection) new URL(endpoint).openConnection()).connect();"
      expected: TruePositive
    - code: "((HttpURLConnection) new URL(\"https://api.example.com\").openConnection()).getResponseCode();"
      expected: TrueNegative
    - code: "connection.getResponseCode();"
      expected: TrueNegative
    - code: "connection.disconnect();"
      expected: TrueNegative

