# XML External Entity (XXE) Rules for Java
# Covers: DocumentBuilderFactory, SAXParserFactory, XMLInputFactory,
# TransformerFactory, SchemaFactory, XMLReader, SAXReader, Validator
# without disabling external entities
#
# CWE-611: Improper Restriction of XML External Entity Reference
# OWASP A05:2021 - Security Misconfiguration

# ============================================================================
# DocumentBuilderFactory XXE (2 rules)
# ============================================================================

- id: "java-xxe-documentbuilderfactory-newinstance"
  name: "DocumentBuilderFactory.newInstance without XXE Protection"
  description: "DocumentBuilderFactory.newInstance() is vulnerable to XXE by default. Disable external entities and DTDs via setFeature() before parsing untrusted XML."
  severity: High
  languages:
    - Java
  pattern:
    query: "(method_invocation object: (identifier) @obj (#eq? @obj \"DocumentBuilderFactory\") name: (identifier) @method (#eq? @method \"newInstance\")) @call"
    captures:
      - "call"
  cwe_id: "CWE-611"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/XML_External_Entity_Prevention_Cheat_Sheet.html#jaxp-documentbuilderfactory-saxparserfactory-and-dom4j"
  test_cases:
    - code: "DocumentBuilderFactory.newInstance();"
      expected: TruePositive
    - code: "DocumentBuilderFactory dbf = DocumentBuilderFactory.newInstance();"
      expected: TruePositive
    - code: "DocumentBuilderFactory factory = DocumentBuilderFactory.newInstance();"
      expected: TruePositive
    - code: "dbf.setFeature(\"http://apache.org/xml/features/disallow-doctype-decl\", true);"
      expected: TrueNegative
    - code: "dbf.setFeature(XMLConstants.FEATURE_SECURE_PROCESSING, true);"
      expected: TrueNegative
    - code: "dbf.newDocumentBuilder();"
      expected: TrueNegative

- id: "java-xxe-documentbuilder-parse-variable"
  name: "DocumentBuilder.parse with Variable Input"
  description: "Parsing untrusted XML input with DocumentBuilder without disabling external entities enables XXE attacks. Disable DTDs and external entities on the factory."
  severity: High
  languages:
    - Java
  pattern:
    query: "(method_invocation object: (identifier) @obj name: (identifier) @method (#eq? @method \"parse\") arguments: (argument_list (identifier) @input)) @call"
    captures:
      - "call"
  cwe_id: "CWE-611"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/XML_External_Entity_Prevention_Cheat_Sheet.html"
  test_cases:
    - code: "builder.parse(userInput);"
      expected: TruePositive
    - code: "documentBuilder.parse(xmlStream);"
      expected: TruePositive
    - code: "db.parse(inputSource);"
      expected: TruePositive
    - code: "builder.parse(\"config.xml\");"
      expected: TrueNegative
    - code: "builder.parse(new File(\"settings.xml\"));"
      expected: TrueNegative
    - code: "builder.reset();"
      expected: TrueNegative

