# ============================================================================
# XMLInputFactory XXE (1 rule)
# ============================================================================

- id: "java-xxe-xmlinputfactory-newinstance"
  name: "XMLInputFactory.newInstance without XXE Protection"
  description: "XMLInputFactory.newInstance() supports external entities by default. Set IS_SUPPORTING_EXTERNAL_ENTITIES and SUPPORT_DTD to false."
  severity: High
  languages:
    - Java
  pattern:
    query: "(method_invocation object: (identifier) @obj (#eq? @obj \"XMLInputFactory\") name: (identifier) @method (#match? @method \"^(newInstance|newFactory)$\")) @call"
    captures:
      - "call"
  cwe_id: "CWE-611"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/XML_External_Entity_Prevention_Cheat_Sheet.html#stax"
  test_cases:
    - code: "XMLInputFactory.newInstance();"
      expected: TruePositive
    - code: "XMLInputFactory xif = XMLInputFactory.newInstance();"
      expected: TruePositive
    - code: "XMLInputFactory factory = XMLInputFactory.newFactory();"
      expected: TruePositive
    - code: "xif.setProperty(XMLInputFactory.IS_SUPPORTING_EXTERNAL_ENTITIES, false);"
      expected: TrueNegative
    - code: "xif.setProperty(XMLInputFactory.SUPPORT_DTD, false);"
      expected: TrueNegative
    - code: "xif.createXMLStreamReader(reader);"
      expected: TrueNegative

