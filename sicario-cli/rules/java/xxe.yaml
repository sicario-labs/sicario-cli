- id: "java-xxe-validator-validate-variable"
  name: "Validator.validate with Variable Source"
  description: "Validating untrusted XML with a Validator that has not disabled external entities enables XXE. Set ACCESS_EXTERNAL_DTD and ACCESS_EXTERNAL_SCHEMA to empty strings on the SchemaFactory."
  severity: High
  languages:
    - Java
  pattern:
    query: "(method_invocation object: (identifier) @obj name: (identifier) @method (#eq? @method \"validate\") arguments: (argument_list (identifier) @source)) @call"
    captures:
      - "call"
  cwe_id: "CWE-611"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/XML_External_Entity_Prevention_Cheat_Sheet.html"
  test_cases:
    - code: "validator.validate(userSource);"
      expected: TruePositive
    - code: "validator.validate(xmlSource);"
      expected: TruePositive
    - code: "v.validate(inputSource);"
      expected: TruePositive
