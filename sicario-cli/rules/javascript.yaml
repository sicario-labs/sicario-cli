- id: "js-eval-injection"
  name: "Dangerous eval() Usage"
  description: "eval() executes arbitrary code and is a common injection vector"
  severity: Critical
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (identifier) @fn (#eq? @fn \"eval\")) @call"
    captures:
      - "call"
  cwe_id: "CWE-95"
  owasp_category: A03_Injection

- id: "js-innerhtml"
  name: "Dangerous innerHTML Assignment"
  description: "Setting innerHTML with user-controlled data leads to XSS"
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(assignment_expression left: (member_expression property: (property_identifier) @prop (#eq? @prop \"innerHTML\"))) @assign"
    captures:
      - "assign"
  cwe_id: "CWE-79"
  owasp_category: A03_Injection

- id: "js-document-write"
  name: "Dangerous document.write() Usage"
  description: "document.write() with user input causes XSS"
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (member_expression object: (identifier) @obj property: (property_identifier) @prop (#eq? @obj \"document\") (#eq? @prop \"write\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-79"
  owasp_category: A03_Injection

- id: "js-console-log-secret"
  name: "Potential Secret Logged to Console"
  description: "Logging variables named 'password', 'secret', or 'token' to console"
  severity: Medium
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (member_expression object: (identifier) @obj property: (property_identifier) @method (#eq? @obj \"console\") (#eq? @method \"log\")) arguments: (arguments (identifier) @arg (#match? @arg \"(password|secret|token|apiKey|api_key)\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-532"
  owasp_category: A09_SecurityLoggingFailures

- id: "js-hardcoded-password"
  name: "Hardcoded Password in Variable"
  description: "Password or secret assigned as a string literal"
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(variable_declarator name: (identifier) @name (#match? @name \"(password|passwd|secret|api_key|apikey|token)\") value: (string) @val) @decl"
    captures:
      - "decl"
  cwe_id: "CWE-798"
  owasp_category: A02_CryptographicFailures

- id: "js-math-random-crypto"
  name: "Math.random() Used for Security"
  description: "Math.random() is not cryptographically secure"
  severity: Medium
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (member_expression object: (identifier) @obj property: (property_identifier) @prop (#eq? @obj \"Math\") (#eq? @prop \"random\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-338"
  owasp_category: A02_CryptographicFailures
