# Open Redirect and TypeScript Type Safety Security Rules for JavaScript/TypeScript
# Covers: res.redirect with user-controlled URL, window.location assignment,
# window.location.replace, router.push with user input, Location header injection,
# `as any` in security contexts, explicit `any` on user input params,
# type assertion bypassing validation, non-null assertion on user input,
# @ts-ignore before security code, type casting request body without validation
#
# CWE-601: URL Redirection to Untrusted Site (Open Redirect)
# CWE-704: Incorrect Type Conversion or Cast
# CWE-20: Improper Input Validation
# OWASP A01:2021 - Broken Access Control
# OWASP A04:2021 - Insecure Design

- id: "js-open-redirect-res-redirect-query"
  name: "Open Redirect via res.redirect with req.query"
  description: "Using req.query values directly in res.redirect allows open redirect attacks. Validate redirect URLs against an allowlist of trusted domains or use relative paths only."
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (member_expression object: (identifier) @obj (#eq? @obj \"res\") property: (property_identifier) @method (#eq? @method \"redirect\")) arguments: (arguments (member_expression object: (member_expression object: (identifier) @req (#eq? @req \"req\") property: (property_identifier) @prop (#eq? @prop \"query\"))))) @redirect"
    captures:
      - "redirect"
  cwe_id: "CWE-601"
  owasp_category: A01_BrokenAccessControl
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Unvalidated_Redirects_and_Forwards_Cheat_Sheet.html"
  test_cases:
    - code: "res.redirect(req.query.returnUrl);"
      expected: TruePositive
    - code: "res.redirect(req.query.next);"
      expected: TruePositive
    - code: "res.redirect(req.query.redirect);"
      expected: TruePositive
    - code: "res.redirect('/dashboard');"
      expected: TrueNegative
    - code: "res.redirect(validateUrl(req.query.returnUrl));"
      expected: TrueNegative
    - code: "res.redirect(302, '/login');"
      expected: TrueNegative

