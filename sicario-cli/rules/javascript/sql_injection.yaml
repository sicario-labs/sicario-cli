- id: "js-mongodb-where-interpolation"
  name: "MongoDB $where with String Interpolation"
  description: "Using string interpolation in MongoDB $where operator allows NoSQL injection. Use standard query operators instead of $where."
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(pair key: (property_identifier) @key (#eq? @key \"$where\") value: (template_string (template_substitution) @interp)) @pair"
    captures:
      - "pair"
  cwe_id: "CWE-89"
  owasp_category: A03_Injection
  help_uri: "https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/05.6-Testing_for_NoSQL_Injection"
  test_cases:
    - code: "db.users.find({ $where: `this.name == '${userInput}'` });"
      expected: TruePositive
    - code: "collection.find({ $where: `this.role == '${role}'` });"
      expected: TruePositive
    - code: "db.collection('users').find({ $where: `this.age > ${age}` });"
      expected: TruePositive
    - code: "db.users.find({ name: userName });"
      expected: TrueNegative
    - code: "collection.find({ age: { $gt: 18 } });"
      expected: TrueNegative
    - code: "db.users.find({ $where: 'this.active == true' });"
      expected: TrueNegative

