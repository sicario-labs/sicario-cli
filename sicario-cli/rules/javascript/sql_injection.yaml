  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (member_expression object: (identifier) @obj (#match? @obj \"^(client|pool|db|pg|conn|connection)$\") property: (property_identifier) @prop (#eq? @prop \"query\")) arguments: (arguments (binary_expression left: (string) @sql operator: \"+\" right: (_) @input (#match? @sql \"(?i)(SELECT|INSERT|UPDATE|DELETE|FROM|WHERE)\")))) @call"
    captures:
      - "call"
  cwe_id: "CWE-89"
  owasp_category: A03_Injection
  help_uri: "https://node-postgres.com/features/queries"
  test_cases:
    - code: "client.query(\"SELECT * FROM users WHERE id = \" + req.params.id);"
      expected: TruePositive
    - code: "pool.query(\"DELETE FROM sessions WHERE token = '\" + token + \"'\");"
      expected: TruePositive
    - code: "db.query(\"INSERT INTO logs (msg) VALUES ('\" + message + \"')\");"
      expected: TruePositive
    - code: "client.query('SELECT * FROM users WHERE id = $1', [userId]);"
      expected: TrueNegative
    - code: "pool.query({ text: 'SELECT * FROM users WHERE id = $1', values: [userId] });"
      expected: TrueNegative
    - code: "client.query('SELECT NOW()');"
      expected: TrueNegative

