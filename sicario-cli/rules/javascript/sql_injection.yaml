- id: "js-prisma-queryraw-interpolation"
  name: "Prisma $queryRaw with String Interpolation"
  description: "Using string interpolation in Prisma $queryRaw allows SQL injection. Use Prisma.sql tagged template or parameterized queries instead."
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (member_expression property: (property_identifier) @prop (#match? @prop \"^\\$(queryRaw|executeRaw)$\")) arguments: (arguments (template_string (template_substitution) @interp))) @call"
    captures:
      - "call"
  cwe_id: "CWE-89"
  owasp_category: A03_Injection
  help_uri: "https://www.prisma.io/docs/concepts/components/prisma-client/raw-database-access"
  test_cases:
    - code: "prisma.$queryRaw(`SELECT * FROM users WHERE id = ${userId}`);"
      expected: TruePositive
    - code: "prisma.$executeRaw(`DELETE FROM sessions WHERE token = ${token}`);"
      expected: TruePositive
    - code: "prisma.$queryRaw(`UPDATE users SET role = '${role}' WHERE id = ${id}`);"
      expected: TruePositive
    - code: "prisma.$queryRaw`SELECT * FROM users WHERE id = ${userId}`;"
      expected: TrueNegative
    - code: "prisma.user.findMany({ where: { id: userId } });"
      expected: TrueNegative
    - code: "prisma.$queryRaw(Prisma.sql`SELECT * FROM users WHERE id = ${userId}`);"
      expected: TrueNegative

