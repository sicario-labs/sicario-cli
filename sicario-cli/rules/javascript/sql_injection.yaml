# SQL Injection Rules for JavaScript/TypeScript
# Covers: string concatenation in queries, template literal interpolation,
# ORM raw queries (Sequelize, Knex, Prisma, TypeORM, Drizzle),
# database drivers (pg, mysql, better-sqlite3, tedious),
# and framework-specific patterns (Express, GraphQL, MongoDB $where)
#
# CWE-89: Improper Neutralization of Special Elements used in an SQL Command
# OWASP A03:2021 - Injection

- id: "js-sql-string-concat"
  name: "SQL Query with String Concatenation"
  description: "Building SQL queries via string concatenation with variables allows SQL injection. Use parameterized queries instead."
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(binary_expression left: (string) @left (#match? @left \"(?i)(SELECT|INSERT|UPDATE|DELETE|DROP|ALTER|CREATE|EXEC|UNION|FROM|WHERE|SET|INTO|VALUES)\") operator: \"+\" right: (_) @right) @sql_concat"
    captures:
      - "sql_concat"
  cwe_id: "CWE-89"
  owasp_category: A03_Injection
  help_uri: "https://owasp.org/Top10/A03_2021-Injection/"
  test_cases:
    - code: "const query = \"SELECT * FROM users WHERE id = \" + userId;"
      expected: TruePositive
    - code: "const query = \"DELETE FROM sessions WHERE token = \" + token;"
      expected: TruePositive
    - code: "const query = \"INSERT INTO logs VALUES (\" + data + \")\";"
      expected: TruePositive
    - code: "const query = \"SELECT * FROM users WHERE id = ?\";"
      expected: TrueNegative
    - code: "const msg = \"Hello \" + name;"
      expected: TrueNegative
    - code: "db.query(\"SELECT * FROM users WHERE id = $1\", [userId]);"
      expected: TrueNegative

- id: "js-sql-template-literal"
  name: "SQL Query with Template Literal Interpolation"
  description: "Interpolating variables into SQL template literals allows SQL injection. Use parameterized queries instead."
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(template_string (template_substitution) @interp) @tpl (#match? @tpl \"(?i)(SELECT|INSERT|UPDATE|DELETE|DROP|ALTER|CREATE|EXEC|UNION|FROM|WHERE|SET|INTO|VALUES)\")"
    captures:
      - "tpl"
  cwe_id: "CWE-89"
  owasp_category: A03_Injection
  help_uri: "https://owasp.org/Top10/A03_2021-Injection/"
  test_cases:
    - code: "const query = `SELECT * FROM users WHERE id = ${userId}`;"
      expected: TruePositive
    - code: "const query = `DELETE FROM ${table} WHERE id = ${id}`;"
      expected: TruePositive
    - code: "const query = `UPDATE users SET name = '${name}' WHERE id = ${id}`;"
      expected: TruePositive
    - code: "const query = `SELECT * FROM users WHERE id = $1`;"
      expected: TrueNegative
    - code: "const msg = `Hello ${name}`;"
      expected: TrueNegative
    - code: "const url = `https://api.example.com/${path}`;"
      expected: TrueNegative


- id: "js-sequelize-raw-query"
  name: "Sequelize Raw Query with String Interpolation"
  description: "Using string interpolation in Sequelize raw queries allows SQL injection. Use bind parameters or replacements instead."
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (member_expression object: (identifier) @obj property: (property_identifier) @prop (#eq? @prop \"query\")) arguments: (arguments (template_string (template_substitution) @interp))) @call"
    captures:
      - "call"
  cwe_id: "CWE-89"
  owasp_category: A03_Injection
  help_uri: "https://sequelize.org/docs/v6/core-concepts/raw-queries/"
  test_cases:
    - code: "sequelize.query(`SELECT * FROM users WHERE id = ${userId}`);"
      expected: TruePositive
    - code: "sequelize.query(`DELETE FROM ${table} WHERE active = ${status}`);"
      expected: TruePositive
    - code: "db.query(`INSERT INTO logs (msg) VALUES ('${message}')`);"
      expected: TruePositive
    - code: "sequelize.query('SELECT * FROM users WHERE id = ?', { replacements: [userId] });"
      expected: TrueNegative
    - code: "sequelize.query('SELECT * FROM users WHERE id = $id', { bind: { id: userId } });"
      expected: TrueNegative
    - code: "sequelize.query('SELECT * FROM users');"
      expected: TrueNegative

- id: "js-sequelize-raw-query-concat"
  name: "Sequelize Raw Query with String Concatenation"
  description: "Concatenating user input into Sequelize raw queries allows SQL injection. Use bind parameters instead."
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (member_expression object: (identifier) @obj property: (property_identifier) @prop (#eq? @prop \"query\")) arguments: (arguments (binary_expression left: (string) @sql operator: \"+\" right: (_) @input (#match? @sql \"(?i)(SELECT|INSERT|UPDATE|DELETE|FROM|WHERE)\")))) @call"
    captures:
      - "call"
  cwe_id: "CWE-89"
  owasp_category: A03_Injection
  help_uri: "https://sequelize.org/docs/v6/core-concepts/raw-queries/"
  test_cases:
    - code: "sequelize.query(\"SELECT * FROM users WHERE id = \" + req.params.id);"
      expected: TruePositive
    - code: "sequelize.query(\"DELETE FROM users WHERE name = '\" + name + \"'\");"
      expected: TruePositive
    - code: "db.query(\"UPDATE users SET role = \" + role + \" WHERE id = \" + id);"
      expected: TruePositive
    - code: "sequelize.query('SELECT * FROM users WHERE id = ?', { replacements: [id] });"
      expected: TrueNegative
    - code: "sequelize.query('SELECT count(*) FROM users');"
      expected: TrueNegative
    - code: "console.log(\"query\" + \" done\");"
      expected: TrueNegative

