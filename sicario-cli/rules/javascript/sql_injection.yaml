- id: "js-express-inline-sql"
  name: "Express Route Handler with Inline SQL Construction"
  description: "Building SQL queries directly in Express route handlers using request parameters allows SQL injection. Extract database logic and use parameterized queries."
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (member_expression property: (property_identifier) @prop (#match? @prop \"^(query|execute)$\")) arguments: (arguments (binary_expression left: (string) @sql operator: \"+\" right: (member_expression object: (member_expression object: (identifier) @req (#eq? @req \"req\"))) (#match? @sql \"(?i)(SELECT|INSERT|UPDATE|DELETE|FROM|WHERE)\")))) @call"
    captures:
      - "call"
  cwe_id: "CWE-89"
  owasp_category: A03_Injection
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Query_Parameterization_Cheat_Sheet.html"
  test_cases:
    - code: "db.query(\"SELECT * FROM users WHERE id = \" + req.params.id);"
      expected: TruePositive
    - code: "pool.execute(\"DELETE FROM users WHERE name = '\" + req.body.name + \"'\");"
      expected: TruePositive
    - code: "conn.query(\"UPDATE users SET email = '\" + req.query.email + \"'\");"
      expected: TruePositive
    - code: "db.query('SELECT * FROM users WHERE id = $1', [req.params.id]);"
      expected: TrueNegative
    - code: "db.query('SELECT * FROM users WHERE id = ?', [req.params.id]);"
      expected: TrueNegative
    - code: "res.json({ message: \"User \" + req.params.id });"
      expected: TrueNegative

