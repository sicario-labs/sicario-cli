- id: "js-typeorm-querybuilder-raw"
  name: "TypeORM createQueryBuilder with Raw Where Clause"
  description: "Passing interpolated strings to TypeORM query builder where clauses allows SQL injection. Use parameter binding instead."
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (member_expression property: (property_identifier) @prop (#eq? @prop \"where\")) arguments: (arguments (template_string (template_substitution) @interp))) @call"
    captures:
      - "call"
  cwe_id: "CWE-89"
  owasp_category: A03_Injection
  help_uri: "https://typeorm.io/select-query-builder"
  test_cases:
    - code: "repo.createQueryBuilder('user').where(`user.id = ${userId}`).getOne();"
      expected: TruePositive
    - code: "qb.where(`name = '${name}'`).getMany();"
      expected: TruePositive
    - code: "builder.where(`role = ${role} AND active = ${status}`).getMany();"
      expected: TruePositive
    - code: "repo.createQueryBuilder('user').where('user.id = :id', { id: userId }).getOne();"
      expected: TrueNegative
    - code: "qb.where('name = :name', { name }).getMany();"
      expected: TrueNegative
    - code: "repo.createQueryBuilder('user').where('user.active = true').getMany();"
      expected: TrueNegative


- id: "js-drizzle-sql-raw"
  name: "Drizzle sql.raw with User Input"
  description: "Using sql.raw() with user input in Drizzle ORM allows SQL injection. Use the sql tagged template with proper escaping instead."
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (member_expression object: (identifier) @obj (#eq? @obj \"sql\") property: (property_identifier) @prop (#eq? @prop \"raw\")) arguments: (arguments (_) @arg)) @call"
    captures:
      - "call"
  cwe_id: "CWE-89"
  owasp_category: A03_Injection
  help_uri: "https://orm.drizzle.team/docs/sql"
  test_cases:
    - code: "sql.raw(userInput);"
      expected: TruePositive
    - code: "sql.raw(req.query.filter);"
      expected: TruePositive
    - code: "sql.raw(\"DROP TABLE users\");"
      expected: TruePositive
    - code: "sql`SELECT * FROM users WHERE id = ${userId}`;"
      expected: TrueNegative
    - code: "db.select().from(users).where(eq(users.id, userId));"
      expected: TrueNegative
    - code: "sql.placeholder('id');"
      expected: TrueNegative

- id: "js-pg-query-concat"
