    captures:
      - "traversal"
  cwe_id: "CWE-22"
  owasp_category: A01_BrokenAccessControl
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Input_Validation_Cheat_Sheet.html"
  test_cases:
    - code: "fs.readFileSync(userPath);"
      expected: TruePositive
    - code: "fs.readFileSync(filePath, 'utf8');"
      expected: TruePositive
    - code: "fs.readFileSync(requestedFile);"
      expected: TruePositive
    - code: "fs.readFileSync('/etc/config.json');"
      expected: TrueNegative
    - code: "fs.readFileSync('./package.json', 'utf8');"
