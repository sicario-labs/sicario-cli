  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (identifier) @fn (#eq? @fn \"got\") arguments: (arguments (identifier) @url)) @ssrf"
    captures:
      - "ssrf"
  cwe_id: "CWE-918"
  owasp_category: A10_SSRF
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Server_Side_Request_Forgery_Prevention_Cheat_Sheet.html"
  test_cases:
    - code: "got(userUrl);"
      expected: TruePositive
    - code: "got(targetEndpoint);"
      expected: TruePositive
    - code: "got(requestedUrl);"
      expected: TruePositive
    - code: "got('https://api.example.com/data');"
      expected: TrueNegative
    - code: "got('https://api.example.com/health', { timeout: 5000 });"
      expected: TrueNegative
    - code: "const got = require('got');"
