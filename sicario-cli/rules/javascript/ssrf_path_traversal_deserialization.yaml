# SSRF, Path Traversal, and Deserialization Rules for JavaScript/TypeScript
# Covers: SSRF via fetch/axios/http.request/got/node-fetch,
# Path traversal via fs.readFile/readFileSync/createReadStream/writeFile/unlink/path.join/path.resolve,
# Deserialization via JSON.parse/eval/node-serialize/Function constructor/vm.runInNewContext
#
# CWE-918: Server-Side Request Forgery (SSRF)
# CWE-22: Improper Limitation of a Pathname to a Restricted Directory (Path Traversal)
# CWE-502: Deserialization of Untrusted Data
# OWASP A10:2021 - Server-Side Request Forgery
# OWASP A01:2021 - Broken Access Control
# OWASP A08:2021 - Software and Data Integrity Failures

# =============================================================================
# SSRF Rules (CWE-918, OWASP A10)
# =============================================================================

- id: "js-ssrf-fetch-user-url"
  name: "fetch() with User-Controlled URL"
  description: "Passing user-controlled variables directly to fetch() enables SSRF attacks. Validate and allowlist URLs before making requests."
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (identifier) @fn (#eq? @fn \"fetch\") arguments: (arguments (identifier) @url)) @ssrf"
    captures:
      - "ssrf"
  cwe_id: "CWE-918"
  owasp_category: A10_SSRF
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Server_Side_Request_Forgery_Prevention_Cheat_Sheet.html"
  test_cases:
    - code: "fetch(userUrl);"
      expected: TruePositive
    - code: "fetch(targetUrl);"
      expected: TruePositive
    - code: "fetch(requestedEndpoint);"
      expected: TruePositive
    - code: "fetch('https://api.example.com/data');"
      expected: TrueNegative
    - code: "fetch(`https://api.example.com/users`);"
      expected: TrueNegative
    - code: "document.getElementById('fetch');"
      expected: TrueNegative

- id: "js-ssrf-fetch-template-url"
  name: "fetch() with Template Literal URL from User Input"
  description: "Interpolating user input into fetch() URL via template literals enables SSRF. Validate and allowlist the base URL before making requests."
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (identifier) @fn (#eq? @fn \"fetch\") arguments: (arguments (template_string (template_substitution) @interp))) @ssrf"
    captures:
      - "ssrf"
  cwe_id: "CWE-918"
  owasp_category: A10_SSRF
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Server_Side_Request_Forgery_Prevention_Cheat_Sheet.html"
  test_cases:
    - code: "fetch(`${baseUrl}/api/data`);"
      expected: TruePositive
    - code: "fetch(`http://${host}:${port}/endpoint`);"
      expected: TruePositive
    - code: "fetch(`${req.query.url}`);"
      expected: TruePositive
    - code: "fetch('https://api.example.com/data');"
      expected: TrueNegative
    - code: "console.log(`fetching ${url}`);"
      expected: TrueNegative
    - code: "fetch(`https://api.example.com/users`);"
      expected: TrueNegative

- id: "js-ssrf-axios-user-url"
  name: "axios Request with User-Controlled URL"
  description: "Passing user-controlled variables to axios.get/post/put/delete enables SSRF. Validate and allowlist URLs before making requests."
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (member_expression object: (identifier) @obj (#eq? @obj \"axios\") property: (property_identifier) @method (#match? @method \"^(get|post|put|delete|patch|request|head|options)$\")) arguments: (arguments (identifier) @url)) @ssrf"
    captures:
      - "ssrf"
  cwe_id: "CWE-918"
  owasp_category: A10_SSRF
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Server_Side_Request_Forgery_Prevention_Cheat_Sheet.html"
  test_cases:
    - code: "axios.get(userUrl);"
      expected: TruePositive
    - code: "axios.post(targetEndpoint);"
      expected: TruePositive
    - code: "axios.delete(resourceUrl);"
      expected: TruePositive
    - code: "axios.get('https://api.example.com/data');"
      expected: TrueNegative
    - code: "axios.post('https://api.example.com/users', data);"
      expected: TrueNegative
    - code: "console.log(axios);"
      expected: TrueNegative

