- id: "js-path-traversal-fs-writefile"
  name: "fs.writeFile with User Input in Path"
  description: "Passing user-controlled input to fs.writeFile enables path traversal attacks allowing arbitrary file writes. Validate and sanitize file paths before writing."
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (member_expression object: (identifier) @obj (#eq? @obj \"fs\") property: (property_identifier) @method (#match? @method \"^(writeFile|writeFileSync)$\")) arguments: (arguments (identifier) @path)) @traversal"
    captures:
      - "traversal"
  cwe_id: "CWE-22"
  owasp_category: A01_BrokenAccessControl
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Input_Validation_Cheat_Sheet.html"
  test_cases:
    - code: "fs.writeFile(userPath, content, callback);"
      expected: TruePositive
    - code: "fs.writeFileSync(filePath, data);"
      expected: TruePositive
    - code: "fs.writeFile(outputFile, buffer, callback);"
      expected: TruePositive
    - code: "fs.writeFile('/tmp/output.json', data, callback);"
      expected: TrueNegative
    - code: "fs.writeFileSync('./config.json', JSON.stringify(config));"
      expected: TrueNegative
    - code: "console.log('writeFile complete');"
      expected: TrueNegative

- id: "js-path-traversal-fs-unlink"
  name: "fs.unlink / fs.rm with User Input in Path"
  description: "Passing user-controlled input to fs.unlink or fs.rm enables path traversal attacks allowing arbitrary file deletion. Validate and sanitize file paths before deleting."
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (member_expression object: (identifier) @obj (#eq? @obj \"fs\") property: (property_identifier) @method (#match? @method \"^(unlink|unlinkSync|rm|rmSync)$\")) arguments: (arguments (identifier) @path)) @traversal"
    captures:
      - "traversal"
  cwe_id: "CWE-22"
  owasp_category: A01_BrokenAccessControl
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Input_Validation_Cheat_Sheet.html"
  test_cases:
    - code: "fs.unlink(userPath, callback);"
      expected: TruePositive
    - code: "fs.unlinkSync(filePath);"
      expected: TruePositive
    - code: "fs.rm(targetFile, callback);"
      expected: TruePositive
    - code: "fs.unlink('/tmp/session.tmp', callback);"
      expected: TrueNegative
    - code: "fs.rmSync('./cache/old.json');"
      expected: TrueNegative
    - code: "console.log('file deleted');"
      expected: TrueNegative


# =============================================================================
# Deserialization Rules (CWE-502, OWASP A08)
# =============================================================================

- id: "js-deser-json-parse-req-body"
  name: "JSON.parse of Request Body without Schema Validation"
  description: "Using JSON.parse on request body data without schema validation can lead to deserialization attacks. Validate parsed data against a schema using libraries like Joi, Zod, or ajv."
  severity: Medium
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (member_expression object: (identifier) @obj (#eq? @obj \"JSON\") property: (property_identifier) @method (#eq? @method \"parse\")) arguments: (arguments (member_expression object: (identifier) @req (#eq? @req \"req\")))) @deser"
    captures:
      - "deser"
  cwe_id: "CWE-502"
  owasp_category: A08_DataIntegrityFailures
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Deserialization_Cheat_Sheet.html"
  test_cases:
    - code: "JSON.parse(req.body);"
      expected: TruePositive
    - code: "JSON.parse(req.rawBody);"
      expected: TruePositive
    - code: "JSON.parse(req.text);"
      expected: TruePositive
    - code: "JSON.parse('{\"key\": \"value\"}');"
      expected: TrueNegative
    - code: "JSON.stringify(req.body);"
      expected: TrueNegative
    - code: "const data = req.body;"
      expected: TrueNegative

- id: "js-deser-eval-data"
  name: "eval() Used for Deserialization"
  description: "Using eval() to deserialize data allows arbitrary code execution. Use JSON.parse with schema validation instead."
  severity: Critical
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (identifier) @fn (#eq? @fn \"eval\") arguments: (arguments (identifier) @data)) @deser"
    captures:
      - "deser"
  cwe_id: "CWE-502"
  owasp_category: A08_DataIntegrityFailures
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Deserialization_Cheat_Sheet.html"
  test_cases:
    - code: "eval(userData);"
      expected: TruePositive
    - code: "eval(serializedData);"
      expected: TruePositive
    - code: "eval(responseBody);"
      expected: TruePositive
    - code: "JSON.parse(userData);"
      expected: TrueNegative
    - code: "console.log('eval is dangerous');"
      expected: TrueNegative
    - code: "const result = safeEval(expression);"
      expected: TrueNegative

- id: "js-deser-node-serialize"
  name: "node-serialize unserialize with User Input"
  description: "Using node-serialize's unserialize function with user input allows remote code execution via crafted serialized objects. Avoid node-serialize entirely; use JSON.parse with schema validation."
  severity: Critical
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (member_expression object: (identifier) @obj (#match? @obj \"^(serialize|nodeSerialize)$\") property: (property_identifier) @method (#eq? @method \"unserialize\")) arguments: (arguments (_) @input)) @deser"
    captures:
      - "deser"
  cwe_id: "CWE-502"
  owasp_category: A08_DataIntegrityFailures
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Deserialization_Cheat_Sheet.html"
  test_cases:
    - code: "serialize.unserialize(userInput);"
      expected: TruePositive
    - code: "serialize.unserialize(cookieData);"
      expected: TruePositive
    - code: "nodeSerialize.unserialize(req.body.data);"
      expected: TruePositive
    - code: "JSON.parse(userInput);"
      expected: TrueNegative
    - code: "serialize.serialize(data);"
      expected: TrueNegative
    - code: "console.log('unserialize');"
      expected: TrueNegative

- id: "js-deser-function-constructor"
  name: "Function() Constructor with User Input"
  description: "Using the Function constructor with user-controlled input allows arbitrary code execution, similar to eval(). Use safe alternatives like JSON.parse with schema validation."
  severity: Critical
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(new_expression constructor: (identifier) @ctor (#eq? @ctor \"Function\") arguments: (arguments (identifier) @input)) @deser"
    captures:
      - "deser"
  cwe_id: "CWE-502"
  owasp_category: A08_DataIntegrityFailures
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Deserialization_Cheat_Sheet.html"
  test_cases:
    - code: "new Function(userCode);"
      expected: TruePositive
    - code: "new Function(serializedLogic);"
      expected: TruePositive
    - code: "new Function(requestBody);"
      expected: TruePositive
    - code: "new Function('return 42');"
      expected: TrueNegative
    - code: "new Map();"
      expected: TrueNegative
    - code: "Function.prototype.bind(context);"
      expected: TrueNegative

- id: "js-deser-vm-run-user-input"
  name: "vm.runInNewContext / vm.runInThisContext with User Input"
  description: "Using Node.js vm module to execute user-controlled code allows sandbox escape and arbitrary code execution. Avoid running untrusted code; use isolated workers or WebAssembly sandboxes instead."
  severity: Critical
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (member_expression object: (identifier) @obj (#eq? @obj \"vm\") property: (property_identifier) @method (#match? @method \"^(runInNewContext|runInThisContext|runInContext)$\")) arguments: (arguments (identifier) @input)) @deser"
    captures:
      - "deser"
  cwe_id: "CWE-502"
  owasp_category: A08_DataIntegrityFailures
  help_uri: "https://nodejs.org/api/vm.html#vm_vm_runinnewcontext_code_contextobject_options"
  test_cases:
    - code: "vm.runInNewContext(userCode);"
      expected: TruePositive
    - code: "vm.runInThisContext(scriptContent);"
      expected: TruePositive
    - code: "vm.runInContext(untrustedCode, context);"
      expected: TruePositive
    - code: "vm.runInNewContext('1 + 1');"
      expected: TrueNegative
    - code: "vm.createContext({});"
      expected: TrueNegative
    - code: "const vm = require('vm');"
      expected: TrueNegative

