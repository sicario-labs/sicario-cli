- id: "js-path-traversal-path-join"
  name: "path.join with User Input from Request"
  description: "Using user input from req.params, req.query, or req.body in path.join enables path traversal. Validate input and ensure the resolved path stays within the intended directory."
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (member_expression object: (identifier) @obj (#eq? @obj \"path\") property: (property_identifier) @method (#eq? @method \"join\")) arguments: (arguments (_) (member_expression object: (member_expression object: (identifier) @req (#eq? @req \"req\"))))) @traversal"
    captures:
      - "traversal"
  cwe_id: "CWE-22"
  owasp_category: A01_BrokenAccessControl
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Input_Validation_Cheat_Sheet.html"
  test_cases:
    - code: "path.join(uploadDir, req.params.filename);"
      expected: TruePositive
    - code: "path.join('/data', req.query.file);"
      expected: TruePositive
    - code: "path.join(baseDir, req.body.path);"
      expected: TruePositive
    - code: "path.join(__dirname, 'public', 'index.html');"
      expected: TrueNegative
    - code: "path.join(uploadDir, sanitize(filename));"
      expected: TrueNegative
    - code: "path.join('/data', 'config.json');"
      expected: TrueNegative

- id: "js-path-traversal-path-resolve"
  name: "path.resolve with User Input from Request"
  description: "Using user input from req.params, req.query, or req.body in path.resolve enables path traversal. Validate input and ensure the resolved path stays within the intended directory."
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (member_expression object: (identifier) @obj (#eq? @obj \"path\") property: (property_identifier) @method (#eq? @method \"resolve\")) arguments: (arguments (_) (member_expression object: (member_expression object: (identifier) @req (#eq? @req \"req\"))))) @traversal"
    captures:
      - "traversal"
  cwe_id: "CWE-22"
  owasp_category: A01_BrokenAccessControl
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Input_Validation_Cheat_Sheet.html"
  test_cases:
    - code: "path.resolve(uploadDir, req.params.filename);"
      expected: TruePositive
    - code: "path.resolve('/data', req.query.file);"
      expected: TruePositive
    - code: "path.resolve(baseDir, req.body.path);"
      expected: TruePositive
    - code: "path.resolve(__dirname, 'public', 'index.html');"
      expected: TrueNegative
    - code: "path.resolve('/data', 'config.json');"
