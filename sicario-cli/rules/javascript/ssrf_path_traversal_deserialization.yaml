# =============================================================================
# Path Traversal Rules (CWE-22, OWASP A01)
# =============================================================================

- id: "js-path-traversal-fs-readfile"
  name: "fs.readFile with User Input in Path"
  description: "Passing user-controlled input to fs.readFile enables path traversal attacks. Validate and sanitize file paths, use path.resolve with a base directory, and reject paths containing '..'."
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (member_expression object: (identifier) @obj (#eq? @obj \"fs\") property: (property_identifier) @method (#eq? @method \"readFile\")) arguments: (arguments (identifier) @path)) @traversal"
    captures:
      - "traversal"
  cwe_id: "CWE-22"
  owasp_category: A01_BrokenAccessControl
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Input_Validation_Cheat_Sheet.html"
  test_cases:
    - code: "fs.readFile(userPath, callback);"
      expected: TruePositive
    - code: "fs.readFile(filePath, 'utf8', callback);"
      expected: TruePositive
    - code: "fs.readFile(requestedFile, callback);"
      expected: TruePositive
    - code: "fs.readFile('/etc/config.json', callback);"
      expected: TrueNegative
    - code: "fs.readFile('./data/config.json', 'utf8', callback);"
      expected: TrueNegative
    - code: "console.log('fs.readFile called');"
      expected: TrueNegative

