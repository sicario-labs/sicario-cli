- id: "js-xss-document-write"
  name: "document.write with Dynamic Content"
  description: "Using document.write with dynamic content allows XSS. Use safe DOM manipulation methods like textContent or createElement instead."
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(call_expression function: (member_expression object: (identifier) @obj (#eq? @obj \"document\") property: (property_identifier) @prop (#eq? @prop \"write\")) arguments: (arguments (_) @arg)) @xss"
    captures:
      - "xss"
  cwe_id: "CWE-79"
  owasp_category: A03_Injection
  help_uri: "https://developer.mozilla.org/en-US/docs/Web/API/Document/write"
  test_cases:
    - code: "document.write(userInput);"
      expected: TruePositive
    - code: "document.write('<div>' + data + '</div>');"
      expected: TruePositive
    - code: "document.write(response.body);"
      expected: TruePositive
    - code: "document.createElement('div');"
      expected: TrueNegative
    - code: "console.log('document.write is deprecated');"
      expected: TrueNegative
    - code: "fs.writeFileSync('output.txt', data);"
      expected: TrueNegative

