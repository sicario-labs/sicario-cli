# Cross-Site Scripting (XSS) Rules for JavaScript/TypeScript
# Covers: dangerouslySetInnerHTML in React/JSX, innerHTML/outerHTML assignment,
# document.write/writeln, EJS/Handlebars/Pug unescaped output,
# Vue v-html directive, jQuery .html()/.append(), insertAdjacentHTML,
# DOMParser with user-controlled HTML, React ref.current.innerHTML
#
# CWE-79: Improper Neutralization of Input During Web Page Generation
# OWASP A03:2021 - Injection

- id: "js-xss-dangerously-set-inner-html"
  name: "dangerouslySetInnerHTML with Dynamic Content"
  description: "Using dangerouslySetInnerHTML with dynamic content in React/JSX allows XSS. Sanitize HTML with DOMPurify or use safe rendering methods instead."
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(jsx_attribute (property_identifier) @attr (#eq? @attr \"dangerouslySetInnerHTML\") (jsx_expression (object (pair key: (property_identifier) @key (#eq? @key \"__html\") value: (_) @val)))) @xss"
    captures:
      - "xss"
  cwe_id: "CWE-79"
  owasp_category: A03_Injection
  help_uri: "https://react.dev/reference/react-dom/components/common#dangerously-setting-the-inner-html"
  test_cases:
    - code: "<div dangerouslySetInnerHTML={{ __html: userContent }} />"
      expected: TruePositive
    - code: "<span dangerouslySetInnerHTML={{ __html: data.body }} />"
      expected: TruePositive
    - code: "<p dangerouslySetInnerHTML={{ __html: getMarkup() }} />"
      expected: TruePositive
    - code: "<div>{sanitizedContent}</div>"
      expected: TrueNegative
    - code: "<span>{DOMPurify.sanitize(content)}</span>"
      expected: TrueNegative
    - code: "<p className=\"content\">{text}</p>"
      expected: TrueNegative

- id: "js-xss-dangerously-set-inner-html-props"
  name: "dangerouslySetInnerHTML with Props Input"
  description: "Passing component props directly to dangerouslySetInnerHTML allows XSS if props contain user-controlled data. Sanitize before rendering."
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(jsx_attribute (property_identifier) @attr (#eq? @attr \"dangerouslySetInnerHTML\") (jsx_expression (object (pair key: (property_identifier) @key (#eq? @key \"__html\") value: (member_expression object: (identifier) @obj (#eq? @obj \"props\")))))) @xss"
    captures:
      - "xss"
  cwe_id: "CWE-79"
  owasp_category: A03_Injection
  help_uri: "https://react.dev/reference/react-dom/components/common#dangerously-setting-the-inner-html"
  test_cases:
    - code: "<div dangerouslySetInnerHTML={{ __html: props.content }} />"
      expected: TruePositive
    - code: "<span dangerouslySetInnerHTML={{ __html: props.htmlBody }} />"
      expected: TruePositive
    - code: "<article dangerouslySetInnerHTML={{ __html: props.richText }} />"
      expected: TruePositive
    - code: "<div>{props.content}</div>"
      expected: TrueNegative
    - code: "<div dangerouslySetInnerHTML={{ __html: '<b>static</b>' }} />"
      expected: TrueNegative
    - code: "<span>{props.text}</span>"
      expected: TrueNegative

- id: "js-xss-dangerously-set-inner-html-state"
  name: "dangerouslySetInnerHTML with State Variables"
  description: "Using React state variables in dangerouslySetInnerHTML can lead to XSS if state is populated from user input. Sanitize HTML before setting state."
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(jsx_attribute (property_identifier) @attr (#eq? @attr \"dangerouslySetInnerHTML\") (jsx_expression (object (pair key: (property_identifier) @key (#eq? @key \"__html\") value: (member_expression object: (member_expression object: (this) property: (property_identifier) @stateObj (#eq? @stateObj \"state\"))))))) @xss"
    captures:
      - "xss"
  cwe_id: "CWE-79"
  owasp_category: A03_Injection
  help_uri: "https://react.dev/reference/react-dom/components/common#dangerously-setting-the-inner-html"
  test_cases:
    - code: "<div dangerouslySetInnerHTML={{ __html: this.state.htmlContent }} />"
      expected: TruePositive
    - code: "<span dangerouslySetInnerHTML={{ __html: this.state.body }} />"
      expected: TruePositive
    - code: "<p dangerouslySetInnerHTML={{ __html: this.state.richText }} />"
      expected: TruePositive
    - code: "<div>{this.state.content}</div>"
      expected: TrueNegative
    - code: "<span>{this.state.text}</span>"
      expected: TrueNegative
    - code: "this.setState({ content: DOMPurify.sanitize(input) });"
      expected: TrueNegative

- id: "js-xss-innerhtml-assignment"
  name: "innerHTML Assignment with Dynamic Content"
  description: "Assigning dynamic content to innerHTML allows XSS. Use textContent for plain text or sanitize HTML with DOMPurify before assignment."
  severity: High
  languages:
    - JavaScript
    - TypeScript
  pattern:
    query: "(assignment_expression left: (member_expression property: (property_identifier) @prop (#eq? @prop \"innerHTML\")) right: (_) @val) @xss"
    captures:
      - "xss"
  cwe_id: "CWE-79"
  owasp_category: A03_Injection
  help_uri: "https://developer.mozilla.org/en-US/docs/Web/API/Element/innerHTML#security_considerations"
  test_cases:
    - code: "element.innerHTML = userInput;"
      expected: TruePositive
    - code: "document.getElementById('output').innerHTML = data;"
      expected: TruePositive
    - code: "container.innerHTML = '<div>' + message + '</div>';"
      expected: TruePositive
    - code: "element.textContent = userInput;"
      expected: TrueNegative
    - code: "element.innerHTML = '';"
      expected: TrueNegative
    - code: "element.innerText = data;"
      expected: TrueNegative

