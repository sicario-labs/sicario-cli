- id: "py-exec-injection"
  name: "Dangerous exec() Usage"
  description: "exec() executes arbitrary Python code and is an injection vector"
  severity: Critical
  languages:
    - Python
  pattern:
    query: "(call function: (identifier) @fn (#eq? @fn \"exec\")) @call"
    captures:
      - "call"
  cwe_id: "CWE-95"
  owasp_category: A03_Injection

- id: "py-eval-injection"
  name: "Dangerous eval() Usage"
  description: "eval() executes arbitrary Python expressions"
  severity: Critical
  languages:
    - Python
  pattern:
    query: "(call function: (identifier) @fn (#eq? @fn \"eval\")) @call"
    captures:
      - "call"
  cwe_id: "CWE-95"
  owasp_category: A03_Injection

- id: "py-hardcoded-password"
  name: "Hardcoded Password Assignment"
  description: "Password or secret assigned as a string literal"
  severity: High
  languages:
    - Python
  pattern:
    query: "(assignment left: (identifier) @name (#match? @name \"(password|passwd|secret|api_key|token)\") right: (string) @val) @assign"
    captures:
      - "assign"
  cwe_id: "CWE-798"
  owasp_category: A02_CryptographicFailures

- id: "py-subprocess-shell"
  name: "subprocess with shell=True"
  description: "Using shell=True in subprocess calls enables shell injection"
  severity: High
  languages:
    - Python
  pattern:
    query: "(call function: (attribute object: (identifier) @mod attribute: (identifier) @fn (#eq? @mod \"subprocess\") (#match? @fn \"(call|run|Popen|check_output)\")) arguments: (argument_list (keyword_argument name: (identifier) @kw (#eq? @kw \"shell\") value: (true) @val))) @call"
    captures:
      - "call"
  cwe_id: "CWE-78"
  owasp_category: A03_Injection

- id: "py-pickle-load"
  name: "Unsafe pickle.load() Usage"
  description: "Deserializing untrusted data with pickle can execute arbitrary code"
  severity: Critical
  languages:
    - Python
  pattern:
    query: "(call function: (attribute object: (identifier) @mod attribute: (identifier) @fn (#eq? @mod \"pickle\") (#eq? @fn \"load\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-502"
  owasp_category: A08_SoftwareDataIntegrityFailures

- id: "py-assert-security"
  name: "Security Check Using assert"
  description: "assert statements are removed with -O flag and should not be used for security checks"
  severity: Medium
  languages:
    - Python
  pattern:
    query: "(assert_statement) @assert"
    captures:
      - "assert"
  cwe_id: "CWE-617"
  owasp_category: A04_InsecureDesign
