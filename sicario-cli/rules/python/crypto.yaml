# Insecure Cryptography Rules for Python
# Covers: hashlib.md5/sha1 for passwords, random module for security, weak Fernet key derivation
#
# CWE-327: Use of a Broken or Risky Cryptographic Algorithm
# CWE-330: Use of Insufficiently Random Values
# OWASP A02:2021 - Cryptographic Failures

- id: "py-hashlib-md5"
  name: "hashlib.md5() for Password Hashing"
  description: "MD5 is cryptographically broken and should not be used for password hashing. Use bcrypt, scrypt, or argon2 instead."
  severity: High
  languages:
    - Python
  pattern:
    query: "(call function: (attribute object: (identifier) @mod (#eq? @mod \"hashlib\") attribute: (identifier) @fn (#eq? @fn \"md5\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-327"
  owasp_category: A02_CryptographicFailures
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html"
  test_cases:
    - code: "hashlib.md5(password.encode()).hexdigest()"
      expected: TruePositive
    - code: "hashlib.md5(data).digest()"
      expected: TruePositive
    - code: "h = hashlib.md5()"
      expected: TruePositive
    - code: "bcrypt.hashpw(password, bcrypt.gensalt())"
      expected: TrueNegative
    - code: "hashlib.sha256(data).hexdigest()"
      expected: TrueNegative
    - code: "hashlib.pbkdf2_hmac('sha256', password, salt, 100000)"
      expected: TrueNegative

