- id: "py-hashlib-new-md5"
  name: "hashlib.new('md5') Usage"
  description: "Creating MD5 hash via hashlib.new() is cryptographically broken. Use SHA-256 or stronger algorithms."
  severity: High
  languages:
    - Python
  pattern:
    query: "(call function: (attribute object: (identifier) @mod (#eq? @mod \"hashlib\") attribute: (identifier) @fn (#eq? @fn \"new\")) arguments: (argument_list (string) @algo (#match? @algo \"'md5'\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-327"
  owasp_category: A02_CryptographicFailures
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html"
  test_cases:
    - code: "hashlib.new('md5')"
      expected: TruePositive
    - code: "hashlib.new('md5', data)"
      expected: TruePositive
    - code: "h = hashlib.new('md5')"
      expected: TruePositive
    - code: "hashlib.new('sha256')"
      expected: TrueNegative
    - code: "hashlib.new('sha512')"
      expected: TrueNegative
    - code: "hashlib.sha256(data)"
      expected: TrueNegative

