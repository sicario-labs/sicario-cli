- id: "py-pickle-loads"
  name: "pickle.loads() Usage"
  description: "Deserializing untrusted data with pickle.loads() can execute arbitrary code. Use JSON or a safe serialization format instead."
  severity: Critical
  languages:
    - Python
  pattern:
    query: "(call function: (attribute object: (identifier) @mod (#eq? @mod \"pickle\") attribute: (identifier) @fn (#eq? @fn \"loads\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-502"
  owasp_category: A08_SoftwareDataIntegrityFailures
  help_uri: "https://docs.python.org/3/library/pickle.html"
  test_cases:
    - code: "pickle.loads(data)"
      expected: TruePositive
    - code: "pickle.loads(request.body)"
      expected: TruePositive
    - code: "pickle.loads(base64.b64decode(encoded))"
      expected: TruePositive
    - code: "json.loads(data)"
      expected: TrueNegative
    - code: "pickle.dumps(obj)"
      expected: TrueNegative
    - code: "msgpack.loads(data)"
      expected: TrueNegative

