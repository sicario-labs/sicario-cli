# Insecure Deserialization Rules for Python
# Covers: yaml.load without SafeLoader, pickle.loads, marshal.loads, shelve.open, jsonpickle.decode
#
# CWE-502: Deserialization of Untrusted Data
# OWASP A08:2021 - Software and Data Integrity Failures

- id: "py-yaml-unsafe-load"
  name: "yaml.load() without SafeLoader"
  description: "Using yaml.load() without specifying SafeLoader allows arbitrary code execution. Use yaml.safe_load() or yaml.load(data, Loader=yaml.SafeLoader)."
  severity: Critical
  languages:
    - Python
  pattern:
    query: "(call function: (attribute object: (identifier) @mod (#eq? @mod \"yaml\") attribute: (identifier) @fn (#eq? @fn \"load\")) arguments: (argument_list (_) .)) @call"
    captures:
      - "call"
  cwe_id: "CWE-502"
  owasp_category: A08_SoftwareDataIntegrityFailures
  help_uri: "https://pyyaml.org/wiki/PyYAMLDocumentation"
  test_cases:
    - code: "yaml.load(data)"
      expected: TruePositive
    - code: "yaml.load(request.body)"
      expected: TruePositive
    - code: "yaml.load(open('config.yaml').read())"
      expected: TruePositive
    - code: "yaml.safe_load(data)"
      expected: TrueNegative
    - code: "yaml.load(data, Loader=yaml.SafeLoader)"
      expected: TrueNegative
    - code: "yaml.dump(data)"
      expected: TrueNegative

- id: "py-yaml-full-loader"
  name: "yaml.load() with FullLoader"
  description: "yaml.FullLoader can still execute some Python objects. Use yaml.SafeLoader for untrusted data."
  severity: Medium
  languages:
    - Python
  pattern:
    query: "(call function: (attribute object: (identifier) @mod (#eq? @mod \"yaml\") attribute: (identifier) @fn (#eq? @fn \"load\")) arguments: (argument_list (_) (keyword_argument name: (identifier) @kw (#eq? @kw \"Loader\") value: (attribute attribute: (identifier) @loader (#eq? @loader \"FullLoader\"))))) @call"
    captures:
      - "call"
  cwe_id: "CWE-502"
  owasp_category: A08_SoftwareDataIntegrityFailures
  help_uri: "https://pyyaml.org/wiki/PyYAMLDocumentation"
  test_cases:
    - code: "yaml.load(data, Loader=yaml.FullLoader)"
      expected: TruePositive
    - code: "yaml.load(request.body, Loader=yaml.FullLoader)"
      expected: TruePositive
    - code: "yaml.load(content, Loader=yaml.FullLoader)"
      expected: TruePositive
    - code: "yaml.load(data, Loader=yaml.SafeLoader)"
      expected: TrueNegative
    - code: "yaml.safe_load(data)"
      expected: TrueNegative
    - code: "yaml.dump(data)"
      expected: TrueNegative

