- id: "py-shelve-open"
  name: "shelve.open() Usage"
  description: "shelve uses pickle internally and can execute arbitrary code when opening untrusted shelf files. Use a safe storage format instead."
  severity: High
  languages:
    - Python
  pattern:
    query: "(call function: (attribute object: (identifier) @mod (#eq? @mod \"shelve\") attribute: (identifier) @fn (#eq? @fn \"open\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-502"
  owasp_category: A08_SoftwareDataIntegrityFailures
  help_uri: "https://docs.python.org/3/library/shelve.html"
  test_cases:
    - code: "shelve.open('user_data')"
      expected: TruePositive
    - code: "shelve.open(filename)"
      expected: TruePositive
    - code: "db = shelve.open('/tmp/cache')"
      expected: TruePositive
    - code: "sqlite3.connect('data.db')"
      expected: TrueNegative
    - code: "json.load(open('data.json'))"
      expected: TrueNegative
    - code: "open('data.txt', 'r')"
      expected: TrueNegative

- id: "py-jsonpickle-decode"
