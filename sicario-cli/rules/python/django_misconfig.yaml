  description: "Setting CSRF_COOKIE_SECURE = False allows CSRF cookies to be sent over unencrypted HTTP. Set to True in production."
  severity: Medium
  languages:
    - Python
  pattern:
    query: "(assignment left: (identifier) @name (#eq? @name \"CSRF_COOKIE_SECURE\") right: (false) @val) @assign"
    captures:
      - "assign"
  cwe_id: "CWE-614"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://docs.djangoproject.com/en/4.2/ref/settings/#csrf-cookie-secure"
  test_cases:
    - code: "CSRF_COOKIE_SECURE = False"
      expected: TruePositive
    - code: "CSRF_COOKIE_SECURE=False"
      expected: TruePositive
    - code: "CSRF_COOKIE_SECURE = False  # insecure"
      expected: TruePositive
    - code: "CSRF_COOKIE_SECURE = True"
      expected: TrueNegative
    - code: "CSRF_COOKIE_SECURE = os.environ.get('SECURE', True)"
