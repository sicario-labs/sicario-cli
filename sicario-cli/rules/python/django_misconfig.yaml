- id: "py-django-secure-ssl-redirect-false"
  name: "Django SECURE_SSL_REDIRECT = False"
  description: "Setting SECURE_SSL_REDIRECT = False allows HTTP connections without redirecting to HTTPS. Set to True in production."
  severity: Medium
  languages:
    - Python
  pattern:
    query: "(assignment left: (identifier) @name (#eq? @name \"SECURE_SSL_REDIRECT\") right: (false) @val) @assign"
    captures:
      - "assign"
  cwe_id: "CWE-319"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://docs.djangoproject.com/en/4.2/ref/settings/#secure-ssl-redirect"
  test_cases:
    - code: "SECURE_SSL_REDIRECT = False"
      expected: TruePositive
    - code: "SECURE_SSL_REDIRECT=False"
      expected: TruePositive
    - code: "SECURE_SSL_REDIRECT = False  # dev only"
      expected: TruePositive
    - code: "SECURE_SSL_REDIRECT = True"
      expected: TrueNegative
    - code: "SECURE_SSL_REDIRECT = os.environ.get('SSL_REDIRECT', True)"
      expected: TrueNegative
    - code: "secure_ssl_redirect = False"
      expected: TrueNegative
