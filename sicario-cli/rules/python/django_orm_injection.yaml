- id: "py-django-cursor-execute-fstring"
  name: "Django cursor.execute() with f-string"
  description: "Using f-strings in cursor.execute() allows SQL injection. Pass parameters as the second argument instead."
  severity: High
  languages:
    - Python
  pattern:
    query: "(call function: (attribute attribute: (identifier) @method (#eq? @method \"execute\")) arguments: (argument_list (string (interpolation) @interp) .)) @call"
    captures:
      - "call"
  cwe_id: "CWE-89"
  owasp_category: A03_Injection
  help_uri: "https://docs.djangoproject.com/en/4.2/topics/db/sql/#executing-custom-sql-directly"
  test_cases:
    - code: "cursor.execute(f\"SELECT * FROM users WHERE id = {user_id}\")"
      expected: TruePositive
    - code: "cursor.execute(f\"DELETE FROM sessions WHERE token = '{token}'\")"
      expected: TruePositive
    - code: "cursor.execute(f\"UPDATE users SET name = '{name}' WHERE id = {uid}\")"
      expected: TruePositive
    - code: "cursor.execute(\"SELECT * FROM users WHERE id = %s\", [user_id])"
      expected: TrueNegative
    - code: "cursor.execute(\"SELECT * FROM users\")"
      expected: TrueNegative
    - code: "cursor.execute(\"INSERT INTO logs VALUES (%s, %s)\", [msg, ts])"
      expected: TrueNegative

