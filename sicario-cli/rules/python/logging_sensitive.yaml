- id: "py-logging-format-password"
  name: "Password in logging % Format"
  description: "Logging passwords via % formatting exposes credentials in log files. Remove sensitive data from log statements."
  severity: High
  languages:
    - Python
  pattern:
    query: "(call function: (attribute object: (identifier) @mod (#match? @mod \"^(logging|logger|log)$\") attribute: (identifier) @fn (#match? @fn \"^(info|debug|warning|error|critical)$\")) arguments: (argument_list (binary_expression left: (string) @fmt (#match? @fmt \"(?i)(password|passwd|pwd|token|api_key|secret)\") right: (_) @val operator: \"%\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-532"
  owasp_category: A09_SecurityLoggingMonitoringFailures
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Logging_Cheat_Sheet.html"
  test_cases:
    - code: "logging.info(\"Password: %s\" % password)"
      expected: TruePositive
    - code: "logger.debug(\"Token: %s\" % token)"
      expected: TruePositive
    - code: "log.info(\"API_KEY: %s\" % api_key)"
      expected: TruePositive
    - code: "logging.info(\"User %s logged in\" % username)"
      expected: TrueNegative
    - code: "logging.info(\"Request completed\")"
      expected: TrueNegative
    - code: "msg = \"password: %s\" % pwd"
      expected: TrueNegative

