# Logging Sensitive Data Rules for Python
# Covers: passwords/tokens/API keys in logging.info, logging.debug, print, logger calls
#
# CWE-532: Insertion of Sensitive Information into Log File
# OWASP A09:2021 - Security Logging and Monitoring Failures

- id: "py-logging-password"
  name: "Password Logged via logging Module"
  description: "Logging passwords exposes credentials in log files. Remove sensitive data from log statements."
  severity: High
  languages:
    - Python
  pattern:
    query: "(call function: (attribute object: (identifier) @mod (#match? @mod \"^(logging|logger|log)$\") attribute: (identifier) @fn (#match? @fn \"^(info|debug|warning|error|critical)$\")) arguments: (argument_list (string (interpolation (identifier) @var (#match? @var \"^(password|passwd|pwd|pass_word|user_password)$\"))))) @call"
    captures:
      - "call"
  cwe_id: "CWE-532"
  owasp_category: A09_SecurityLoggingMonitoringFailures
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Logging_Cheat_Sheet.html"
  test_cases:
    - code: "logging.info(f\"User login with password={password}\")"
      expected: TruePositive
    - code: "logger.debug(f\"Auth attempt: {password}\")"
      expected: TruePositive
    - code: "log.warning(f\"Failed login for {passwd}\")"
      expected: TruePositive
    - code: "logging.info(\"User logged in successfully\")"
      expected: TrueNegative
    - code: "logging.info(f\"User {username} logged in\")"
      expected: TrueNegative
    - code: "logger.debug(\"Authentication completed\")"
      expected: TrueNegative

