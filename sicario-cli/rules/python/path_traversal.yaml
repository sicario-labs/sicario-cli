  severity: Medium
  languages:
    - Python
  pattern:
    query: "(call function: (identifier) @fn (#eq? @fn \"Path\") arguments: (argument_list (string (interpolation) @interp))) @call"
    captures:
      - "call"
  cwe_id: "CWE-22"
  owasp_category: A01_BrokenAccessControl
  help_uri: "https://docs.python.org/3/library/pathlib.html"
  test_cases:
    - code: "Path(f\"/uploads/{filename}\")"
      expected: TruePositive
    - code: "Path(f\"{base_dir}/{user_file}\")"
      expected: TruePositive
    - code: "Path(f\"/data/{request.args.get('file')}\")"
      expected: TruePositive
    - code: "Path('config.yaml')"
      expected: TrueNegative
    - code: "Path('/etc/config')"
      expected: TrueNegative
    - code: "Path(__file__).parent"
      expected: TrueNegative
