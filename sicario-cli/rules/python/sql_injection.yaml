- id: "py-sqlite3-execute-fstring"
  name: "sqlite3 cursor.execute() with f-string"
  description: "Using f-strings in sqlite3 cursor.execute() allows SQL injection. Use ? placeholders instead."
  severity: High
  languages:
    - Python
  pattern:
    query: "(call function: (attribute attribute: (identifier) @method (#match? @method \"^(execute|executemany|executescript)$\")) arguments: (argument_list (string (interpolation) @interp) .)) @call"
    captures:
      - "call"
  cwe_id: "CWE-89"
  owasp_category: A03_Injection
  help_uri: "https://docs.python.org/3/library/sqlite3.html#sqlite3.Cursor.execute"
  test_cases:
    - code: "cursor.execute(f\"SELECT * FROM users WHERE id = {user_id}\")"
      expected: TruePositive
    - code: "cur.execute(f\"DELETE FROM sessions WHERE token = '{token}'\")"
      expected: TruePositive
    - code: "c.executemany(f\"INSERT INTO logs VALUES ('{msg}')\")"
      expected: TruePositive
    - code: "cursor.execute(\"SELECT * FROM users WHERE id = ?\", (user_id,))"
      expected: TrueNegative
    - code: "cursor.execute(\"SELECT * FROM users\")"
      expected: TrueNegative
    - code: "cursor.execute(\"INSERT INTO logs VALUES (?, ?)\", (msg, ts))"
      expected: TrueNegative
