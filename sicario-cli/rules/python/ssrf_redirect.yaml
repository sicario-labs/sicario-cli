- id: "py-ssl-unverified"
  name: "SSL Verification Disabled"
  description: "Disabling SSL verification with verify=False allows man-in-the-middle attacks. Always verify SSL certificates."
  severity: High
  languages:
    - Python
  pattern:
    query: "(call function: (attribute object: (identifier) @mod (#match? @mod \"^(requests|httpx|session|client)$\") attribute: (identifier) @fn (#match? @fn \"^(get|post|put|delete|patch|head|options|request)$\")) arguments: (argument_list (keyword_argument name: (identifier) @kw (#eq? @kw \"verify\") value: (false) @val))) @call"
    captures:
      - "call"
  cwe_id: "CWE-295"
  owasp_category: A07_IdentificationAuthenticationFailures
  help_uri: "https://requests.readthedocs.io/en/latest/user/advanced/#ssl-cert-verification"
  test_cases:
    - code: "requests.get(url, verify=False)"
      expected: TruePositive
    - code: "requests.post(url, data=payload, verify=False)"
      expected: TruePositive
    - code: "session.get(url, verify=False)"
      expected: TruePositive
    - code: "requests.get(url, verify=True)"
      expected: TrueNegative
    - code: "requests.get(url)"
      expected: TrueNegative
    - code: "requests.get(url, verify='/path/to/cert.pem')"
      expected: TrueNegative

- id: "py-ssl-context-no-verify"
  name: "SSL Context with Disabled Verification"
  description: "Creating an unverified SSL context disables certificate validation. Use ssl.create_default_context() instead."
  severity: High
  languages:
    - Python
  pattern:
    query: "(call function: (attribute object: (identifier) @mod (#eq? @mod \"ssl\") attribute: (identifier) @fn (#eq? @fn \"_create_unverified_context\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-295"
  owasp_category: A07_IdentificationAuthenticationFailures
  help_uri: "https://docs.python.org/3/library/ssl.html"
  test_cases:
    - code: "ssl._create_unverified_context()"
      expected: TruePositive
    - code: "ctx = ssl._create_unverified_context()"
      expected: TruePositive
    - code: "context = ssl._create_unverified_context()"
      expected: TruePositive
    - code: "ssl.create_default_context()"
      expected: TrueNegative
    - code: "ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)"
      expected: TrueNegative
    - code: "ssl.wrap_socket(sock)"
      expected: TrueNegative

- id: "py-flask-debug-true"
  name: "Flask app.run() with debug=True"
  description: "Running Flask with debug=True in production exposes the Werkzeug debugger, which allows remote code execution. Disable debug mode in production."
  severity: Critical
  languages:
    - Python
  pattern:
    query: "(call function: (attribute attribute: (identifier) @method (#eq? @method \"run\")) arguments: (argument_list (keyword_argument name: (identifier) @kw (#eq? @kw \"debug\") value: (true) @val))) @call"
    captures:
      - "call"
  cwe_id: "CWE-215"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://flask.palletsprojects.com/en/2.3.x/debugging/"
  test_cases:
    - code: "app.run(debug=True)"
      expected: TruePositive
    - code: "app.run(host='0.0.0.0', debug=True)"
      expected: TruePositive
    - code: "application.run(debug=True, port=5000)"
      expected: TruePositive
    - code: "app.run(debug=False)"
      expected: TrueNegative
    - code: "app.run()"
      expected: TrueNegative
    - code: "app.run(host='0.0.0.0', port=5000)"
      expected: TrueNegative

- id: "py-jwt-no-verify"
  name: "JWT Decode without Verification"
  description: "Decoding JWT tokens without verification allows token forgery. Always verify the signature with algorithms and key parameters."
  severity: Critical
  languages:
    - Python
  pattern:
    query: "(call function: (attribute object: (identifier) @mod (#eq? @mod \"jwt\") attribute: (identifier) @fn (#eq? @fn \"decode\")) arguments: (argument_list (_) (keyword_argument name: (identifier) @kw (#match? @kw \"^(options|verify)$\")))) @call"
    captures:
      - "call"
  cwe_id: "CWE-347"
  owasp_category: A07_IdentificationAuthenticationFailures
  help_uri: "https://pyjwt.readthedocs.io/en/stable/usage.html"
  test_cases:
    - code: "jwt.decode(token, options={\"verify_signature\": False})"
      expected: TruePositive
    - code: "jwt.decode(token, verify=False)"
      expected: TruePositive
    - code: "jwt.decode(token, options={\"verify_exp\": False})"
      expected: TruePositive
    - code: "jwt.decode(token, key, algorithms=['HS256'])"
      expected: TrueNegative
    - code: "jwt.encode(payload, key, algorithm='HS256')"
      expected: TrueNegative
    - code: "jwt.decode(token, SECRET_KEY, algorithms=['RS256'])"
      expected: TrueNegative

- id: "py-jwt-none-algorithm"
  name: "JWT with 'none' Algorithm"
  description: "Using 'none' as JWT algorithm disables signature verification entirely. Always specify a secure algorithm like HS256 or RS256."
  severity: Critical
  languages:
    - Python
  pattern:
    query: "(call function: (attribute object: (identifier) @mod (#eq? @mod \"jwt\") attribute: (identifier) @fn (#eq? @fn \"decode\")) arguments: (argument_list (_) (_) (keyword_argument name: (identifier) @kw (#eq? @kw \"algorithms\") value: (list (string) @algo (#match? @algo \"'none'\"))))) @call"
    captures:
      - "call"
  cwe_id: "CWE-347"
  owasp_category: A07_IdentificationAuthenticationFailures
  help_uri: "https://pyjwt.readthedocs.io/en/stable/usage.html"
  test_cases:
    - code: "jwt.decode(token, key, algorithms=['none'])"
      expected: TruePositive
    - code: "jwt.decode(token, '', algorithms=['none'])"
      expected: TruePositive
    - code: "jwt.decode(token, None, algorithms=['none'])"
      expected: TruePositive
    - code: "jwt.decode(token, key, algorithms=['HS256'])"
      expected: TrueNegative
    - code: "jwt.decode(token, key, algorithms=['RS256'])"
      expected: TrueNegative
    - code: "jwt.encode(payload, key, algorithm='HS256')"
      expected: TrueNegative
