# SSRF and Open Redirect Rules for Python
# Covers: unvalidated URL in requests, urllib; open redirect in Flask/Django
#
# CWE-918: Server-Side Request Forgery
# CWE-601: URL Redirection to Untrusted Site
# OWASP A10:2021 - Server-Side Request Forgery

- id: "py-requests-get-fstring"
  name: "requests.get() with f-string URL"
  description: "Using f-strings to construct URLs in requests.get() allows SSRF. Validate and allowlist URLs before making requests."
  severity: High
  languages:
    - Python
  pattern:
    query: "(call function: (attribute object: (identifier) @mod (#eq? @mod \"requests\") attribute: (identifier) @fn (#match? @fn \"^(get|post|put|delete|patch|head|options)$\")) arguments: (argument_list (string (interpolation) @interp))) @call"
    captures:
      - "call"
  cwe_id: "CWE-918"
  owasp_category: A10_SSRF
  help_uri: "https://owasp.org/Top10/A10_2021-Server-Side_Request_Forgery_%28SSRF%29/"
  test_cases:
    - code: "requests.get(f\"http://{user_host}/api\")"
      expected: TruePositive
    - code: "requests.post(f\"{base_url}/endpoint\")"
      expected: TruePositive
    - code: "requests.get(f\"https://api.example.com/{user_path}\")"
      expected: TruePositive
    - code: "requests.get('https://api.example.com/data')"
      expected: TrueNegative
    - code: "requests.get(ALLOWED_URL)"
      expected: TrueNegative
    - code: "msg = f\"requesting {url}\""
      expected: TrueNegative

- id: "py-requests-get-concat"
  name: "requests.get() with Concatenated URL"
  description: "Concatenating user input into URLs for requests allows SSRF. Validate and allowlist URLs before making requests."
  severity: High
  languages:
    - Python
  pattern:
    query: "(call function: (attribute object: (identifier) @mod (#eq? @mod \"requests\") attribute: (identifier) @fn (#match? @fn \"^(get|post|put|delete|patch|head|options)$\")) arguments: (argument_list (binary_expression left: (string) @url right: (_) @input operator: \"+\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-918"
  owasp_category: A10_SSRF
  help_uri: "https://owasp.org/Top10/A10_2021-Server-Side_Request_Forgery_%28SSRF%29/"
  test_cases:
    - code: "requests.get(\"http://\" + user_host + \"/api\")"
      expected: TruePositive
    - code: "requests.post(base_url + \"/endpoint\")"
      expected: TruePositive
    - code: "requests.get(\"https://api.example.com/\" + user_path)"
      expected: TruePositive
    - code: "requests.get('https://api.example.com/data')"
      expected: TrueNegative
    - code: "requests.get(ALLOWED_URL)"
      expected: TrueNegative
    - code: "msg = \"url: \" + url"
      expected: TrueNegative

- id: "py-urllib-open-fstring"
  name: "urllib.request.urlopen() with f-string URL"
  description: "Using f-strings to construct URLs in urllib.request.urlopen() allows SSRF. Validate and allowlist URLs."
  severity: High
  languages:
    - Python
  pattern:
    query: "(call function: (attribute object: (attribute object: (identifier) @pkg (#eq? @pkg \"urllib\") attribute: (identifier) @sub (#eq? @sub \"request\")) attribute: (identifier) @fn (#eq? @fn \"urlopen\")) arguments: (argument_list (string (interpolation) @interp))) @call"
    captures:
      - "call"
  cwe_id: "CWE-918"
  owasp_category: A10_SSRF
  help_uri: "https://docs.python.org/3/library/urllib.request.html"
  test_cases:
    - code: "urllib.request.urlopen(f\"http://{user_host}/api\")"
      expected: TruePositive
    - code: "urllib.request.urlopen(f\"{base_url}/data\")"
      expected: TruePositive
    - code: "urllib.request.urlopen(f\"https://api.example.com/{path}\")"
      expected: TruePositive
    - code: "urllib.request.urlopen('https://api.example.com/data')"
      expected: TrueNegative
    - code: "urllib.parse.urlparse(url)"
      expected: TrueNegative
    - code: "urllib.request.urlopen(ALLOWED_URL)"
      expected: TrueNegative

- id: "py-flask-redirect-user-input"
  name: "Flask redirect() with User Input"
  description: "Passing user-controlled input to redirect() allows open redirect attacks. Validate the URL against an allowlist."
  severity: Medium
  languages:
    - Python
  pattern:
    query: "(call function: (identifier) @fn (#eq? @fn \"redirect\") arguments: (argument_list (call function: (attribute object: (identifier) @req (#match? @req \"^(request|req)$\"))))) @call"
    captures:
      - "call"
  cwe_id: "CWE-601"
  owasp_category: A01_BrokenAccessControl
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Unvalidated_Redirects_and_Forwards_Cheat_Sheet.html"
  test_cases:
    - code: "redirect(request.args.get('next'))"
      expected: TruePositive
    - code: "redirect(request.form.get('redirect_url'))"
      expected: TruePositive
    - code: "redirect(request.args.get('url'))"
      expected: TruePositive
    - code: "redirect(url_for('index'))"
      expected: TrueNegative
    - code: "redirect('/dashboard')"
      expected: TrueNegative
    - code: "redirect(url_for('login'))"
      expected: TrueNegative

- id: "py-django-redirect-user-input"
  name: "Django redirect() with User Input"
  description: "Passing user-controlled input to Django's redirect() allows open redirect attacks. Validate the URL against an allowlist."
  severity: Medium
  languages:
    - Python
  pattern:
    query: "(call function: (identifier) @fn (#eq? @fn \"redirect\") arguments: (argument_list (subscript value: (attribute object: (identifier) @req (#eq? @req \"request\"))))) @call"
    captures:
      - "call"
  cwe_id: "CWE-601"
  owasp_category: A01_BrokenAccessControl
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Unvalidated_Redirects_and_Forwards_Cheat_Sheet.html"
  test_cases:
    - code: "redirect(request.GET['next'])"
      expected: TruePositive
    - code: "redirect(request.POST['redirect_url'])"
      expected: TruePositive
    - code: "redirect(request.GET['url'])"
      expected: TruePositive
    - code: "redirect('/')"
      expected: TrueNegative
    - code: "redirect(reverse('home'))"
      expected: TrueNegative
    - code: "redirect('/dashboard')"
      expected: TrueNegative

