- id: "py-xmlrpc-server"
  name: "xmlrpc.server Usage (XXE Vulnerable)"
  description: "Python's xmlrpc module uses vulnerable XML parsers. Consider using JSON-RPC or gRPC instead."
  severity: Medium
  languages:
    - Python
  pattern:
    query: "(call function: (attribute object: (identifier) @mod (#match? @mod \"^(xmlrpc|SimpleXMLRPCServer)$\") attribute: (identifier) @fn (#match? @fn \"^(SimpleXMLRPCServer|CGIXMLRPCRequestHandler)$\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-611"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://docs.python.org/3/library/xmlrpc.server.html"
  test_cases:
    - code: "xmlrpc.SimpleXMLRPCServer(('localhost', 8000))"
      expected: TruePositive
    - code: "SimpleXMLRPCServer.SimpleXMLRPCServer(addr)"
      expected: TruePositive
    - code: "xmlrpc.CGIXMLRPCRequestHandler()"
      expected: TruePositive
    - code: "grpc.server(futures.ThreadPoolExecutor())"
      expected: TrueNegative
    - code: "Flask(__name__)"
      expected: TrueNegative
    - code: "json.loads(data)"
      expected: TrueNegative
