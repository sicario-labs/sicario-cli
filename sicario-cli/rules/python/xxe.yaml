# XML External Entity (XXE) Rules for Python
# Covers: xml.etree.ElementTree.parse, lxml.etree.parse, xml.sax without disabling external entities
#
# CWE-611: Improper Restriction of XML External Entity Reference
# OWASP A05:2021 - Security Misconfiguration

- id: "py-etree-parse"
  name: "xml.etree.ElementTree.parse() with Untrusted Input"
  description: "xml.etree.ElementTree.parse() is vulnerable to XXE attacks. Use defusedxml.ElementTree instead."
  severity: High
  languages:
    - Python
  pattern:
    query: "(call function: (attribute object: (identifier) @mod (#match? @mod \"^(ET|ElementTree|etree)$\") attribute: (identifier) @fn (#eq? @fn \"parse\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-611"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://docs.python.org/3/library/xml.html#xml-vulnerabilities"
  test_cases:
    - code: "ET.parse(user_file)"
      expected: TruePositive
    - code: "ElementTree.parse(uploaded_xml)"
      expected: TruePositive
    - code: "etree.parse(request.files['xml'])"
      expected: TruePositive
    - code: "defusedxml.ElementTree.parse(user_file)"
      expected: TrueNegative
    - code: "json.loads(data)"
      expected: TrueNegative
    - code: "ET.tostring(element)"
      expected: TrueNegative

