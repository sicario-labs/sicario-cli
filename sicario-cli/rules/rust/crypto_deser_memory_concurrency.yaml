- id: "rust-box-from-raw"
  name: "Box::from_raw Usage"
  description: "Box::from_raw takes ownership of a raw pointer. If the pointer was not originally created by Box::into_raw, or if it's used after being freed, this causes undefined behavior."
  severity: High
  languages:
