- id: "rust-serde-json-from-slice-untrusted"
  name: "serde_json::from_slice with Untrusted Input"
  description: "Deserializing untrusted byte slices without size validation can lead to denial of service or memory exhaustion. Enforce maximum payload size before deserialization."
  severity: High
  languages:
    - Rust
  pattern:
    query: "(call_expression function: (scoped_identifier path: (identifier) @mod name: (identifier) @fn (#eq? @mod \"serde_json\") (#eq? @fn \"from_slice\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-502"
  owasp_category: A08_SoftwareAndDataIntegrityFailures
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Deserialization_Cheat_Sheet.html"
  test_cases:
    - code: "let msg: Message = serde_json::from_slice(&bytes).unwrap();"
      expected: TruePositive
    - code: "let event: Event = serde_json::from_slice(&raw_body).unwrap();"
      expected: TruePositive
    - code: "let payload: Payload = serde_json::from_slice(&network_data).unwrap();"
      expected: TruePositive
    - code: "let config: Config = serde_json::from_slice(include_bytes!(\"config.json\")).unwrap();"
      expected: TrueNegative
