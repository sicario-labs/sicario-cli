  severity: Critical
  languages:
    - Rust
  pattern:
    query: "(call_expression function: (scoped_identifier path: (scoped_identifier path: (identifier) @std name: (identifier) @mod (#eq? @std \"std\") (#eq? @mod \"mem\")) name: (identifier) @fn (#eq? @fn \"transmute\"))) @call"
