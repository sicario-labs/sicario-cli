    - code: "tokio::spawn(async move { let guard = mutex.lock().await; guard.push(item); });"
      expected: TrueNegative
    - code: "tokio::spawn(async move { tx.send(message).await.unwrap(); });"
      expected: TrueNegative
    - code: "tokio::spawn(async { let data = rx.recv().await; });"
      expected: TrueNegative

- id: "rust-thread-spawn-raw-pointer"
  name: "std::thread::spawn with Raw Pointer Capture"
  description: "Capturing raw pointers in thread::spawn closures can cause use-after-free and data races since raw pointers are not Send. Use Arc<T> or channels for cross-thread data sharing."
  severity: High
  languages:
    - Rust
  pattern:
    query: "(call_expression function: (scoped_identifier path: (scoped_identifier path: (identifier) @std name: (identifier) @mod (#eq? @std \"std\") (#eq? @mod \"thread\")) name: (identifier) @fn (#eq? @fn \"spawn\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-362"
  owasp_category: A04_InsecureDesign
  help_uri: "https://doc.rust-lang.org/std/thread/fn.spawn.html"
  test_cases:
    - code: "std::thread::spawn(move || unsafe { *ptr += 1; });"
      expected: TruePositive
    - code: "std::thread::spawn(move || { let val = unsafe { &*raw_ptr }; });"
      expected: TruePositive
    - code: "std::thread::spawn(|| unsafe { (*shared_ptr).process(); });"
      expected: TruePositive
    - code: "std::thread::spawn(move || { let guard = mutex.lock().unwrap(); });"
      expected: TrueNegative
    - code: "std::thread::spawn(move || { arc_data.load(Ordering::SeqCst); });"
      expected: TrueNegative
    - code: "std::thread::spawn(|| { println!(\"worker thread\"); });"
      expected: TrueNegative

- id: "rust-rc-across-threads"
  name: "Rc Used Across Thread Boundaries"
  description: "Rc is not thread-safe — it uses non-atomic reference counting. Using Rc across threads causes data races and memory corruption. Use Arc for thread-safe reference counting."
  severity: High
  languages:
    - Rust
  pattern:
    query: "(generic_type type: (type_identifier) @type (#eq? @type \"Rc\")) @rc_usage"
    captures:
