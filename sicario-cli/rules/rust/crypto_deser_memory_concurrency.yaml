- id: "rust-crossbeam-scope-raw-ptr"
  name: "Raw Pointer in Crossbeam Scoped Thread"
  description: "Using raw pointers in crossbeam scoped threads bypasses lifetime guarantees and can cause data races. Use references or Arc for safe cross-thread data sharing."
  severity: High
  languages:
    - Rust
  pattern:
    query: "(call_expression function: (scoped_identifier path: (identifier) @mod name: (identifier) @fn (#eq? @mod \"crossbeam\") (#eq? @fn \"scope\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-362"
  owasp_category: A04_InsecureDesign
  help_uri: "https://docs.rs/crossbeam/latest/crossbeam/fn.scope.html"
  test_cases:
    - code: "crossbeam::scope(|s| { s.spawn(|_| unsafe { *ptr += 1; }); });"
      expected: TruePositive
    - code: "crossbeam::scope(|s| { let raw = &data as *const _; s.spawn(move |_| { unsafe { &*raw } }); });"
      expected: TruePositive
    - code: "crossbeam::scope(|s| { s.spawn(|_| { unsafe { (*shared).update(); } }); });"
      expected: TruePositive
    - code: "crossbeam::scope(|s| { s.spawn(|_| { println!(\"{}\", &data); }); });"
      expected: TrueNegative
    - code: "std::thread::spawn(move || { let guard = mutex.lock().unwrap(); });"
      expected: TrueNegative
    - code: "rayon::iter::ParallelIterator::for_each(&items, |item| process(item));"
      expected: TrueNegative

- id: "rust-atomic-ordering-relaxed-sync"
  name: "Relaxed Ordering for Synchronization"
  description: "Using Ordering::Relaxed for atomic operations that synchronize between threads provides no ordering guarantees and can cause subtle data races. Use Acquire/Release or SeqCst for synchronization."
  severity: Medium
  languages:
    - Rust
  pattern:
    query: "(scoped_identifier path: (identifier) @mod name: (identifier) @variant (#eq? @mod \"Ordering\") (#eq? @variant \"Relaxed\")) @ordering"
    captures:
      - "ordering"
  cwe_id: "CWE-362"
  owasp_category: A04_InsecureDesign
  help_uri: "https://doc.rust-lang.org/std/sync/atomic/enum.Ordering.html"
  test_cases:
    - code: "flag.store(true, Ordering::Relaxed);"
      expected: TruePositive
    - code: "let val = counter.load(Ordering::Relaxed);"
      expected: TruePositive
    - code: "state.compare_exchange(old, new, Ordering::Relaxed, Ordering::Relaxed);"
      expected: TruePositive
    - code: "flag.store(true, Ordering::Release);"
      expected: TrueNegative
    - code: "let val = counter.load(Ordering::Acquire);"
      expected: TrueNegative
    - code: "state.compare_exchange(old, new, Ordering::SeqCst, Ordering::SeqCst);"
      expected: TrueNegative

