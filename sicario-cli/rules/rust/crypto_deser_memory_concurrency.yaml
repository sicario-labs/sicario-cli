# ============================================================================
# CONCURRENCY RULES (12 rules)
# ============================================================================

- id: "rust-static-mut"
  name: "static mut Variable Usage (Data Race)"
  description: "Accessing static mut variables is inherently unsafe and causes data races in multi-threaded programs. Use std::sync::Mutex, RwLock, or atomic types instead."
  severity: Critical
  languages:
    - Rust
  pattern:
    query: "(static_item (mutable_specifier)) @static_mut"
    captures:
      - "static_mut"
  cwe_id: "CWE-362"
  owasp_category: A04_InsecureDesign
  help_uri: "https://doc.rust-lang.org/reference/items/static-items.html#mutable-statics"
  test_cases:
    - code: "static mut COUNTER: u64 = 0;"
      expected: TruePositive
    - code: "static mut GLOBAL_STATE: Vec<String> = Vec::new();"
      expected: TruePositive
    - code: "static mut CONFIG: Option<Config> = None;"
      expected: TruePositive
    - code: "static COUNTER: AtomicU64 = AtomicU64::new(0);"
      expected: TrueNegative
    - code: "static CONFIG: Lazy<Mutex<Config>> = Lazy::new(|| Mutex::new(Config::default()));"
      expected: TrueNegative
    - code: "static INSTANCE: OnceCell<Config> = OnceCell::new();"
      expected: TrueNegative

- id: "rust-unsafe-send-impl"
  name: "Unsafe Send Impl on Types with Raw Pointers"
  description: "Implementing Send on types containing raw pointers can cause data races and use-after-free when the type is sent across threads. Only implement Send if the type truly owns the pointed-to data."
  severity: High
  languages:
    - Rust
  pattern:
    query: "(impl_item trait: (type_identifier) @trait (#eq? @trait \"Send\") (where_clause)? body: (declaration_list)?) @impl"
    captures:
      - "impl"
  cwe_id: "CWE-362"
  owasp_category: A04_InsecureDesign
  help_uri: "https://doc.rust-lang.org/nomicon/send-and-sync.html"
  test_cases:
    - code: "unsafe impl Send for RawBuffer {}"
      expected: TruePositive
    - code: "unsafe impl Send for SharedPtr {}"
      expected: TruePositive
    - code: "unsafe impl Send for FfiHandle {}"
      expected: TruePositive
    - code: "impl Clone for MyStruct {}"
      expected: TrueNegative
    - code: "impl Default for Config {}"
      expected: TrueNegative
    - code: "impl Display for Error {}"
      expected: TrueNegative

- id: "rust-unsafe-sync-impl"
  name: "Unsafe Sync Impl on Types with Interior Mutability"
  description: "Implementing Sync on types with interior mutability (UnsafeCell, Cell, RefCell) without proper synchronization causes data races. Use Mutex or RwLock for thread-safe interior mutability."
  severity: High
  languages:
    - Rust
  pattern:
    query: "(impl_item trait: (type_identifier) @trait (#eq? @trait \"Sync\") (where_clause)? body: (declaration_list)?) @impl"
    captures:
      - "impl"
  cwe_id: "CWE-362"
  owasp_category: A04_InsecureDesign
  help_uri: "https://doc.rust-lang.org/nomicon/send-and-sync.html"
  test_cases:
    - code: "unsafe impl Sync for SharedState {}"
      expected: TruePositive
    - code: "unsafe impl Sync for UnsafeCellWrapper {}"
      expected: TruePositive
    - code: "unsafe impl Sync for MutableGlobal {}"
      expected: TruePositive
    - code: "impl Iterator for MyIter {}"
      expected: TrueNegative
    - code: "impl From<String> for MyType {}"
      expected: TrueNegative
    - code: "impl Debug for Config {}"
      expected: TrueNegative

- id: "rust-unsafe-cell-shared"
  name: "UnsafeCell Shared Across Threads"
  description: "UnsafeCell provides interior mutability without synchronization. Sharing it across threads without external synchronization causes data races. Use Mutex<T> or RwLock<T> instead."
  severity: High
  languages:
    - Rust
  pattern:
    query: "(type_identifier) @type (#eq? @type \"UnsafeCell\")"
    captures:
      - "type"
  cwe_id: "CWE-362"
  owasp_category: A04_InsecureDesign
  help_uri: "https://doc.rust-lang.org/std/cell/struct.UnsafeCell.html"
  test_cases:
    - code: "struct SharedData { inner: UnsafeCell<Vec<u8>> }"
      expected: TruePositive
    - code: "let cell: UnsafeCell<i32> = UnsafeCell::new(0);"
      expected: TruePositive
    - code: "static DATA: UnsafeCell<Config> = UnsafeCell::new(Config::new());"
      expected: TruePositive
    - code: "let data: Mutex<Vec<u8>> = Mutex::new(Vec::new());"
      expected: TrueNegative
    - code: "let state: RwLock<Config> = RwLock::new(Config::default());"
      expected: TrueNegative
    - code: "let cell: Cell<i32> = Cell::new(0);"
      expected: TrueNegative

- id: "rust-arc-unsafe-cell"
  name: "Arc with UnsafeCell Without Synchronization"
  description: "Wrapping UnsafeCell in Arc allows shared access across threads without synchronization, causing data races. Use Arc<Mutex<T>> or Arc<RwLock<T>> for thread-safe shared state."
  severity: Critical
  languages:
    - Rust
  pattern:
    query: "(generic_type type: (type_identifier) @outer (#eq? @outer \"Arc\") type_arguments: (type_arguments (generic_type type: (type_identifier) @inner (#eq? @inner \"UnsafeCell\")))) @type"
    captures:
      - "type"
  cwe_id: "CWE-362"
  owasp_category: A04_InsecureDesign
  help_uri: "https://doc.rust-lang.org/std/sync/struct.Arc.html"
  test_cases:
    - code: "let shared: Arc<UnsafeCell<Data>> = Arc::new(UnsafeCell::new(Data::new()));"
      expected: TruePositive
    - code: "type SharedState = Arc<UnsafeCell<Vec<u8>>>;"
      expected: TruePositive
    - code: "let state: Arc<UnsafeCell<HashMap<String, String>>> = Arc::new(UnsafeCell::new(HashMap::new()));"
      expected: TruePositive
    - code: "let shared: Arc<Mutex<Data>> = Arc::new(Mutex::new(Data::new()));"
      expected: TrueNegative
    - code: "let state: Arc<RwLock<Vec<u8>>> = Arc::new(RwLock::new(Vec::new()));"
      expected: TrueNegative
    - code: "let data: Arc<AtomicU64> = Arc::new(AtomicU64::new(0));"
      expected: TrueNegative

- id: "rust-tokio-spawn-shared-state"
  name: "Shared Mutable State in tokio::spawn Without Mutex"
  description: "Sharing mutable state across tokio::spawn tasks without Mutex or RwLock causes data races. Wrap shared state in Arc<Mutex<T>> or use message passing with channels."
  severity: High
  languages:
