  test_cases:
    - code: "let val: u64 = unsafe { std::mem::transmute(float_val) };"
      expected: TruePositive
    - code: "let ptr: *mut u8 = unsafe { std::mem::transmute(reference) };"
      expected: TruePositive
    - code: "let obj: MyStruct = unsafe { std::mem::transmute(bytes) };"
      expected: TruePositive
    - code: "let val: u64 = f64::to_bits(float_val);"
