- id: "rust-raw-pointer-cast"
  name: "Raw Pointer Cast (as *const / as *mut)"
  description: "Casting references to raw pointers bypasses the borrow checker and can lead to aliasing violations, data races, and undefined behavior if the pointer outlives the reference."
