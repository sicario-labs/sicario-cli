- id: "rust-raw-pointer-deref"
  name: "Raw Pointer Dereference in Unsafe Block"
  description: "Dereferencing raw pointers without bounds checking can lead to buffer overflows, use-after-free, or null pointer dereferences. Validate pointer validity and bounds before dereferencing."
  severity: High
  languages:
