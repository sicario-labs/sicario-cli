  owasp_category: A04_InsecureDesign
  help_uri: "https://doc.rust-lang.org/std/rc/struct.Rc.html"
  test_cases:
    - code: "let shared: Rc<RefCell<Vec<u8>>> = Rc::new(RefCell::new(Vec::new()));"
      expected: TruePositive
    - code: "let data: Rc<Data> = Rc::new(Data::new());"
      expected: TruePositive
    - code: "let state: Rc<Mutex<Config>> = Rc::new(Mutex::new(Config::default()));"
      expected: TruePositive
    - code: "let shared: Arc<Mutex<Vec<u8>>> = Arc::new(Mutex::new(Vec::new()));"
      expected: TrueNegative
    - code: "let data: Arc<Data> = Arc::new(Data::new());"
      expected: TrueNegative
    - code: "let state: Arc<RwLock<Config>> = Arc::new(RwLock::new(Config::default()));"
      expected: TrueNegative

