# Cryptography, Deserialization, Memory Safety, and Concurrency Rules for Rust
# Covers: md5/sha1 crates, hardcoded keys, weak RNG, insecure ciphers (Crypto),
# serde_json, serde_yaml, bincode, rmp_serde, ciborium, toml (Deserialization),
# raw pointers, transmute, from_raw_parts, use-after-free (Memory Safety),
# static mut, Send/Sync misimpl, UnsafeCell, tokio::spawn races (Concurrency)
#
# CWE-327: Use of Broken Crypto Algorithm
# CWE-321: Use of Hard-coded Cryptographic Key
# CWE-330: Use of Insufficiently Random Values
# CWE-502: Deserialization of Untrusted Data
# CWE-119: Buffer Overflow / Memory Corruption
# CWE-416: Use After Free
# CWE-362: Race Condition
# OWASP A02:2021 - Cryptographic Failures
# OWASP A08:2021 - Software and Data Integrity Failures

# ============================================================================
# CRYPTOGRAPHY RULES (10 rules)
# ============================================================================

- id: "rust-md5-compute"
  name: "md5::compute Usage for Hashing"
  description: "MD5 is cryptographically broken and must not be used for password hashing or integrity verification. Use argon2, bcrypt, or sha2 crate instead."
  severity: High
  languages:
    - Rust
  pattern:
    query: "(call_expression function: (scoped_identifier path: (identifier) @mod name: (identifier) @fn (#eq? @mod \"md5\") (#eq? @fn \"compute\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-327"
  owasp_category: A02_CryptographicFailures
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html"
  test_cases:
    - code: "let hash = md5::compute(password.as_bytes());"
      expected: TruePositive
    - code: "let digest = md5::compute(&user_input);"
      expected: TruePositive
    - code: "let result = md5::compute(secret_token.as_bytes());"
      expected: TruePositive
    - code: "let hash = argon2::hash_encoded(password.as_bytes(), &salt, &config).unwrap();"
      expected: TrueNegative
    - code: "let hash = bcrypt::hash(password, bcrypt::DEFAULT_COST).unwrap();"
      expected: TrueNegative
    - code: "let mut hasher = Sha256::new(); hasher.update(data);"
      expected: TrueNegative

