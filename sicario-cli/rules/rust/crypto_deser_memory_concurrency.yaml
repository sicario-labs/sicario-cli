- id: "rust-ptr-read-write"
  name: "std::ptr::read / std::ptr::write Usage"
  description: "std::ptr::read and std::ptr::write bypass Rust's ownership and borrowing rules. Incorrect usage can cause double-free, use-after-free, or uninitialized memory reads."
  severity: High
  languages:
