# ============================================================================
# DESERIALIZATION RULES (8 rules)
# ============================================================================

- id: "rust-serde-json-from-str-untrusted"
  name: "serde_json::from_str with Untrusted Input"
  description: "Deserializing untrusted JSON input without size limits can lead to denial of service or arbitrary type instantiation. Validate input size and use strict type definitions."
  severity: High
  languages:
    - Rust
  pattern:
    query: "(call_expression function: (scoped_identifier path: (identifier) @mod name: (identifier) @fn (#eq? @mod \"serde_json\") (#eq? @fn \"from_str\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-502"
  owasp_category: A08_SoftwareAndDataIntegrityFailures
  help_uri: "https://cheatsheetseries.owasp.org/cheatsheets/Deserialization_Cheat_Sheet.html"
  test_cases:
    - code: "let data: Value = serde_json::from_str(&body).unwrap();"
      expected: TruePositive
    - code: "let user: User = serde_json::from_str(&request_body).unwrap();"
      expected: TruePositive
    - code: "let config: Config = serde_json::from_str(&payload).unwrap();"
      expected: TruePositive
    - code: "let config: AppConfig = serde_json::from_str(include_str!(\"config.json\")).unwrap();"
      expected: TrueNegative
    - code: "let manifest: Manifest = serde_json::from_str(&validated_json).unwrap();"
      expected: TrueNegative
    - code: "let settings = toml::from_str::<Settings>(&fs::read_to_string(\"config.toml\").unwrap()).unwrap();"
      expected: TrueNegative

