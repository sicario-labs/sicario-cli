- id: "rust-mem-uninitialized"
  name: "std::mem::uninitialized / std::mem::zeroed Usage"
  description: "mem::uninitialized creates uninitialized memory which is instant UB for most types. mem::zeroed is UB for types where zero is not a valid bit pattern (references, enums, bools). Use MaybeUninit instead."
  severity: Critical
