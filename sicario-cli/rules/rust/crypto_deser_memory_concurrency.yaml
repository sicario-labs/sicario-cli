  pattern:
    query: "(call_expression function: (scoped_identifier path: (scoped_identifier path: (identifier) @std name: (identifier) @mod (#eq? @std \"std\") (#eq? @mod \"ptr\")) name: (identifier) @fn (#match? @fn \"^(read|write|read_volatile|write_volatile|read_unaligned|write_unaligned)$\"))) @call"
