- id: "rust-debug-derive-secrets"
  name: "Debug Trait Derived on Type Containing Secrets"
  description: "Deriving Debug on a struct with fields named password, secret, token, api_key, or private_key will print sensitive values in logs and error messages. Implement Debug manually to redact secrets."
  severity: High
  languages:
    - Rust
  pattern:
    query: "(attribute_item (attribute (identifier) @attr (#eq? @attr \"derive\"))) @derive"
    captures:
      - "derive"
  cwe_id: "CWE-215"
  owasp_category: A02_CryptographicFailures
  help_uri: "https://owasp.org/Top10/A02_2021-Cryptographic_Failures/"
  test_cases:
    - code: "#[derive(Debug, Clone)]\nstruct UserCredentials {\n    username: String,\n    password: String,\n}"
      expected: TruePositive
    - code: "#[derive(Debug)]\nstruct ApiConfig {\n    endpoint: String,\n    api_key: String,\n}"
      expected: TruePositive
    - code: "#[derive(Debug, Serialize)]\nstruct TokenPayload {\n    user_id: u64,\n    secret_token: String,\n}"
      expected: TruePositive
    - code: "#[derive(Clone)]\nstruct UserCredentials {\n    username: String,\n    password: String,\n}\nimpl fmt::Debug for UserCredentials {\n    fn fmt(&self, f: &mut fmt::Formatter) -> fmt::Result {\n        f.debug_struct(\"UserCredentials\").field(\"username\", &self.username).field(\"password\", &\"[REDACTED]\").finish()\n    }\n}"
      expected: TrueNegative
    - code: "#[derive(Debug, Clone)]\nstruct PublicProfile {\n    username: String,\n    display_name: String,\n}"
      expected: TrueNegative
    - code: "#[derive(Debug)]\nstruct AppConfig {\n    host: String,\n    port: u16,\n    database_url: String,\n}"
      expected: TrueNegative

- id: "rust-display-impl-secrets"
  name: "Display Implementation Exposing Sensitive Fields"
  description: "Implementing Display on a type that formats secret fields (password, token, key) exposes sensitive data when the value is printed or converted to string."
  severity: High
  languages:
    - Rust
  pattern:
    query: "(impl_item trait: (type_identifier) @trait (#eq? @trait \"Display\") body: (declaration_list (function_item name: (identifier) @fn (#eq? @fn \"fmt\") body: (block (expression_statement (macro_invocation macro: (identifier) @mac (#eq? @mac \"write\"))))))) @impl"
    captures:
      - "impl"
  cwe_id: "CWE-200"
  owasp_category: A02_CryptographicFailures
  help_uri: "https://owasp.org/Top10/A02_2021-Cryptographic_Failures/"
  test_cases:
    - code: "impl fmt::Display for Credentials {\n    fn fmt(&self, f: &mut fmt::Formatter) -> fmt::Result {\n        write!(f, \"user={}, password={}\", self.username, self.password)\n    }\n}"
      expected: TruePositive
    - code: "impl fmt::Display for ApiToken {\n    fn fmt(&self, f: &mut fmt::Formatter) -> fmt::Result {\n        write!(f, \"token: {}\", self.secret_token)\n    }\n}"
      expected: TruePositive
    - code: "impl fmt::Display for Config {\n    fn fmt(&self, f: &mut fmt::Formatter) -> fmt::Result {\n        write!(f, \"endpoint={}, key={}\", self.endpoint, self.api_key)\n    }\n}"
      expected: TruePositive
    - code: "impl fmt::Display for Credentials {\n    fn fmt(&self, f: &mut fmt::Formatter) -> fmt::Result {\n        write!(f, \"user={}, password=[REDACTED]\", self.username)\n    }\n}"
      expected: TrueNegative
    - code: "impl fmt::Display for PublicUser {\n    fn fmt(&self, f: &mut fmt::Formatter) -> fmt::Result {\n        write!(f, \"User({})\", self.username)\n    }\n}"
      expected: TrueNegative
    - code: "impl fmt::Display for AppError {\n    fn fmt(&self, f: &mut fmt::Formatter) -> fmt::Result {\n        write!(f, \"Application error occurred\")\n    }\n}"
      expected: TrueNegative

- id: "rust-log-sensitive-data"
  name: "Logging Sensitive Data (Passwords/Tokens/Keys)"
  description: "Logging sensitive fields like passwords, tokens, or API keys writes secrets to log files where they may be accessed by unauthorized parties."
  severity: High
  languages:
    - Rust
  pattern:
    query: "(macro_invocation macro: (scoped_identifier name: (identifier) @mac (#match? @mac \"^(info|debug|warn|error|trace)$\"))) @log"
    captures:
      - "log"
  cwe_id: "CWE-532"
  owasp_category: A09_SecurityLoggingAndMonitoringFailures
  help_uri: "https://owasp.org/Top10/A09_2021-Security_Logging_and_Monitoring_Failures/"
  test_cases:
    - code: "log::info!(\"User login: {} with password: {}\", username, password);"
      expected: TruePositive
    - code: "log::debug!(\"API request with token: {}\", api_token);"
      expected: TruePositive
    - code: "log::warn!(\"Auth failed for key: {}\", secret_key);"
      expected: TruePositive
    - code: "log::info!(\"User {} logged in successfully\", username);"
      expected: TrueNegative
    - code: "log::debug!(\"Processing request for user_id: {}\", user_id);"
      expected: TrueNegative
    - code: "log::error!(\"Authentication failed for user: {}\", username);"
      expected: TrueNegative

