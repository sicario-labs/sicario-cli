  test_cases:
    - code: "HttpResponse::InternalServerError().body(format!(\"{:?}\", error))"
      expected: TruePositive
    - code: "(StatusCode::INTERNAL_SERVER_ERROR, format!(\"{:#?}\", err)).into_response()"
      expected: TruePositive
    - code: "HttpResponse::BadRequest().body(format!(\"Validation failed: {:?}\", errors))"
      expected: TruePositive
    - code: "tracing::debug!(\"Error details: {:?}\", error);"
