  help_uri: "https://docs.rs/axum/latest/axum/extract/struct.DefaultBodyLimit.html"
  test_cases:
    - code: "async fn upload(body: Bytes) -> impl IntoResponse {\n    save_file(&body).await\n}"
      expected: TruePositive
    - code: "async fn process(body: String) -> impl IntoResponse {\n    parse_data(&body)\n}"
      expected: TruePositive
    - code: "async fn ingest(body: Body) -> impl IntoResponse {\n    stream_to_disk(body).await\n}"
      expected: TruePositive
    - code: "async fn upload(body: Bytes) -> impl IntoResponse {\n    save_file(&body).await\n}\n// Router has .layer(DefaultBodyLimit::max(1024 * 1024))"
