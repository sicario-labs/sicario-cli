  cwe_id: "CWE-209"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://owasp.org/www-community/Improper_Error_Handling"
  test_cases:
    - code: "HttpResponse::InternalServerError().body(err.to_string())"
      expected: TruePositive
    - code: "HttpResponse::BadRequest().body(validation_error.to_string())"
      expected: TruePositive
    - code: "HttpResponse::ServiceUnavailable().body(db_error.to_string())"
