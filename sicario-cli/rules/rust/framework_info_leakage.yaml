# Actix-web/Axum Framework and Information Leakage Rules for Rust
# Covers: Actix-web (auth, CORS, XSS, CSRF, sessions, rate limiting, CSP),
# Axum (auth, CORS, rate limiting, TLS, body limits),
# Information Leakage (Debug on secrets, Display exposing secrets, logging secrets,
# verbose errors, serialization of secrets)
#
# CWE-306: Missing Authentication for Critical Function
# CWE-89: SQL Injection
# CWE-942: Overly Permissive CORS Policy
# CWE-79: Cross-Site Scripting (XSS)
# CWE-352: Cross-Site Request Forgery (CSRF)
# CWE-614: Sensitive Cookie in HTTPS Session Without 'Secure' Attribute
# CWE-770: Allocation of Resources Without Limits
# CWE-22: Path Traversal
# CWE-16: Configuration
# CWE-209: Generation of Error Message Containing Sensitive Information
# CWE-532: Insertion of Sensitive Information into Log File
# CWE-215: Insertion of Sensitive Information Into Debugging Code
# CWE-200: Exposure of Sensitive Information to an Unauthorized Actor
# OWASP A01:2021 - Broken Access Control
# OWASP A05:2021 - Security Misconfiguration
# OWASP A07:2021 - Identification and Authentication Failures

# ============================================================================
# ACTIX-WEB FRAMEWORK RULES (12 rules)
# ============================================================================

- id: "rust-actix-no-auth-extractor"
  name: "Actix-web Route Handler Without Authentication"
  description: "Route handler accepts HttpRequest or web::Json but has no Identity, Session, or custom auth extractor parameter. Sensitive endpoints should require authentication."
  severity: Medium
  languages:
    - Rust
  pattern:
    query: "(attribute_item (attribute (identifier) @attr (#match? @attr \"^(get|post|put|delete|patch)$\"))) @route"
    captures:
      - "route"
  cwe_id: "CWE-306"
  owasp_category: A07_IdentificationAndAuthenticationFailures
  help_uri: "https://actix.rs/docs/extractors/"
  test_cases:
    - code: "#[get(\"/admin/users\")]\nasync fn list_users(db: web::Data<Pool>) -> impl Responder {\n    HttpResponse::Ok().json(get_all_users(&db).await)\n}"
      expected: TruePositive
    - code: "#[post(\"/api/transfer\")]\nasync fn transfer(body: web::Json<TransferReq>) -> impl Responder {\n    HttpResponse::Ok().finish()\n}"
      expected: TruePositive
    - code: "#[delete(\"/api/account\")]\nasync fn delete_account(req: HttpRequest) -> impl Responder {\n    HttpResponse::Ok().finish()\n}"
      expected: TruePositive
    - code: "#[get(\"/health\")]\nasync fn health() -> impl Responder {\n    HttpResponse::Ok().body(\"ok\")\n}"
      expected: TrueNegative
    - code: "#[get(\"/api/profile\")]\nasync fn profile(user: Identity, db: web::Data<Pool>) -> impl Responder {\n    HttpResponse::Ok().json(user)\n}"
      expected: TrueNegative
    - code: "#[post(\"/api/data\")]\nasync fn create(auth: AuthenticatedUser, body: web::Json<Data>) -> impl Responder {\n    HttpResponse::Created().finish()\n}"
      expected: TrueNegative

- id: "rust-actix-path-param-sql"
  name: "Actix-web Path Parameter in SQL Query"
  description: "Using actix-web Path<> extractor value directly in a format! SQL string allows SQL injection. Use parameterized queries instead."
  severity: High
  languages:
    - Rust
  pattern:
    query: "(call_expression function: (field_expression field: (field_identifier) @method (#match? @method \"^(query|execute|query_one)$\")) arguments: (arguments (macro_invocation macro: (identifier) @mac (#eq? @mac \"format\")))) @call"
    captures:
      - "call"
  cwe_id: "CWE-89"
  owasp_category: A03_Injection
  help_uri: "https://actix.rs/docs/extractors/#path"
  test_cases:
    - code: "async fn get_user(path: web::Path<i32>, db: web::Data<Pool>) -> impl Responder {\n    let id = path.into_inner();\n    db.query(&format!(\"SELECT * FROM users WHERE id = {}\", id), &[]).await\n}"
      expected: TruePositive
    - code: "async fn delete_item(path: web::Path<String>, pool: web::Data<DbPool>) -> impl Responder {\n    pool.execute(&format!(\"DELETE FROM items WHERE slug = '{}'\", path.into_inner()), &[]).await\n}"
      expected: TruePositive
    - code: "async fn search(path: web::Path<String>, db: web::Data<Pool>) -> impl Responder {\n    db.query_one(&format!(\"SELECT * FROM products WHERE name LIKE '%{}%'\", path.into_inner()), &[]).await\n}"
      expected: TruePositive
    - code: "async fn get_user(path: web::Path<i32>, db: web::Data<Pool>) -> impl Responder {\n    db.query(\"SELECT * FROM users WHERE id = $1\", &[&path.into_inner()]).await\n}"
      expected: TrueNegative
    - code: "async fn get_item(path: web::Path<i32>, db: web::Data<Pool>) -> impl Responder {\n    sqlx::query!(\"SELECT * FROM items WHERE id = $1\", path.into_inner()).fetch_one(&**db).await\n}"
      expected: TrueNegative
    - code: "async fn get_user(path: web::Path<i32>, db: web::Data<Pool>) -> impl Responder {\n    let user = User::find_by_id(path.into_inner(), &db).await;\n    HttpResponse::Ok().json(user)\n}"
      expected: TrueNegative

- id: "rust-actix-missing-cors"
  name: "Actix-web App Without CORS Middleware"
  description: "Actix-web application created with App::new() without .wrap(Cors::...) middleware. APIs accessed by browsers need explicit CORS configuration."
  severity: Medium
  languages:
    - Rust
  pattern:
    query: "(call_expression function: (scoped_identifier path: (identifier) @type name: (identifier) @method (#eq? @type \"App\") (#eq? @method \"new\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-942"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://docs.rs/actix-cors/latest/actix_cors/"
  test_cases:
    - code: "App::new().service(web::resource(\"/api\").route(web::get().to(handler)))"
      expected: TruePositive
    - code: "App::new()\n    .service(api_scope)\n    .service(health_check)"
      expected: TruePositive
    - code: "let app = App::new().configure(config);"
      expected: TruePositive
    - code: "App::new()\n    .wrap(Cors::default())\n    .service(web::resource(\"/api\").route(web::get().to(handler)))"
      expected: TrueNegative
    - code: "App::new()\n    .wrap(Cors::permissive())\n    .service(api_scope)"
      expected: TrueNegative
    - code: "App::new()\n    .wrap(actix_cors::Cors::default().allowed_origin(\"https://example.com\"))\n    .service(api_scope)"
      expected: TrueNegative

- id: "rust-actix-debug-endpoint"
  name: "Actix-web Exposed Debug/Admin Endpoint"
  description: "Route registered at /debug or /admin path without authentication middleware. Debug and admin endpoints must be protected or removed in production."
  severity: High
  languages:
    - Rust
  pattern:
    query: "(call_expression function: (field_expression field: (field_identifier) @method (#eq? @method \"resource\")) arguments: (arguments (string_literal) @path (#match? @path \"(debug|admin|internal|_health_detail)\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-306"
  owasp_category: A01_BrokenAccessControl
  help_uri: "https://owasp.org/Top10/A01_2021-Broken_Access_Control/"
  test_cases:
    - code: "web::resource(\"/debug/vars\").route(web::get().to(debug_vars))"
      expected: TruePositive
    - code: "web::resource(\"/admin/users\").route(web::get().to(list_all_users))"
      expected: TruePositive
    - code: "web::resource(\"/internal/metrics\").route(web::get().to(metrics_handler))"
      expected: TruePositive
    - code: "web::resource(\"/api/users\").route(web::get().to(list_users))"
      expected: TrueNegative
    - code: "web::resource(\"/admin/users\").wrap(auth_middleware).route(web::get().to(list_all_users))"
      expected: TrueNegative
    - code: "web::resource(\"/health\").route(web::get().to(health_check))"
      expected: TrueNegative

- id: "rust-actix-format-response-xss"
  name: "Actix-web HttpResponse with format! User Input (XSS)"
  description: "Using format! to embed user input into HttpResponse body without escaping enables XSS. Use a template engine with auto-escaping or return JSON."
  severity: High
  languages:
    - Rust
  pattern:
    query: "(call_expression function: (scoped_identifier path: (identifier) @type name: (identifier) @method (#eq? @type \"HttpResponse\") (#match? @method \"^(Ok|Created|BadRequest)$\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-79"
  owasp_category: A03_Injection
  help_uri: "https://owasp.org/www-community/attacks/xss/"
  test_cases:
    - code: "HttpResponse::Ok().body(format!(\"<h1>Hello, {}</h1>\", user_name))"
      expected: TruePositive
    - code: "HttpResponse::Ok().content_type(\"text/html\").body(format!(\"<div>{}</div>\", comment))"
      expected: TruePositive
    - code: "HttpResponse::BadRequest().body(format!(\"Error: {}\", user_input))"
      expected: TruePositive
    - code: "HttpResponse::Ok().json(serde_json::json!({\"name\": user_name}))"
      expected: TrueNegative
    - code: "HttpResponse::Ok().body(\"<h1>Welcome</h1>\")"
      expected: TrueNegative
    - code: "HttpResponse::Ok().body(tera.render(\"index.html\", &context)?)"
      expected: TrueNegative

- id: "rust-actix-no-csrf"
  name: "Actix-web Missing CSRF Protection"
  description: "Actix-web application with form-handling POST routes but no CSRF middleware. State-changing endpoints accepting form data should have CSRF protection."
  severity: Medium
  languages:
    - Rust
  pattern:
    query: "(call_expression function: (field_expression field: (field_identifier) @method (#eq? @method \"post\")) arguments: (arguments)) @call"
    captures:
      - "call"
  cwe_id: "CWE-352"
  owasp_category: A01_BrokenAccessControl
  help_uri: "https://owasp.org/www-community/attacks/csrf"
  test_cases:
    - code: "web::resource(\"/login\").route(web::post().to(login_handler))"
      expected: TruePositive
    - code: "web::resource(\"/transfer\").route(web::post().to(transfer_funds))"
      expected: TruePositive
    - code: "web::resource(\"/settings\").route(web::post().to(update_settings))"
      expected: TruePositive
    - code: "web::resource(\"/login\").wrap(csrf_middleware).route(web::post().to(login_handler))"
      expected: TrueNegative
    - code: "web::resource(\"/api/data\").route(web::post().to(create_data))  // API with token auth"
      expected: TrueNegative
    - code: "web::resource(\"/webhook\").route(web::post().to(webhook_handler))  // Webhook with signature verification"
      expected: TrueNegative

- id: "rust-actix-verbose-error"
  name: "Actix-web Verbose Error Response"
  description: "Returning InternalServerError with debug-formatted error details exposes internal information to clients. Return generic error messages and log details server-side."
  severity: Medium
  languages:
    - Rust
  pattern:
    query: "(call_expression function: (scoped_identifier path: (identifier) @type name: (identifier) @method (#eq? @type \"HttpResponse\") (#eq? @method \"InternalServerError\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-209"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://owasp.org/www-community/Improper_Error_Handling"
  test_cases:
    - code: "HttpResponse::InternalServerError().body(format!(\"{:?}\", err))"
      expected: TruePositive
    - code: "HttpResponse::InternalServerError().body(format!(\"Database error: {}\", db_err))"
      expected: TruePositive
    - code: "HttpResponse::InternalServerError().json(serde_json::json!({\"error\": format!(\"{}\", e)}))"
      expected: TruePositive
    - code: "HttpResponse::InternalServerError().body(\"An internal error occurred\")"
      expected: TrueNegative
    - code: "HttpResponse::InternalServerError().json(serde_json::json!({\"error\": \"internal_error\"}))"
      expected: TrueNegative
    - code: "HttpResponse::InternalServerError().finish()"
      expected: TrueNegative

- id: "rust-actix-insecure-session"
  name: "Actix-web Session Without Secure Cookie Settings"
  description: "Session cookie configured without secure=true or http_only=true. Session cookies must be marked Secure and HttpOnly to prevent interception and XSS theft."
  severity: High
  languages:
    - Rust
  pattern:
    query: "(call_expression function: (scoped_identifier path: (identifier) @type name: (identifier) @method (#eq? @type \"CookieSession\") (#eq? @method \"signed\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-614"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://docs.rs/actix-session/latest/actix_session/"
  test_cases:
    - code: "CookieSession::signed(&[0; 32]).name(\"session\")"
      expected: TruePositive
    - code: "CookieSession::signed(key).name(\"auth\")"
      expected: TruePositive
    - code: "CookieSession::signed(&secret_key).max_age(3600)"
      expected: TruePositive
    - code: "CookieSession::signed(&[0; 32]).secure(true).http_only(true).name(\"session\")"
      expected: TrueNegative
    - code: "SessionMiddleware::builder(redis_store, secret_key.clone()).cookie_secure(true).build()"
      expected: TrueNegative
    - code: "CookieSession::signed(key).secure(true).http_only(true).same_site(SameSite::Strict)"
      expected: TrueNegative

- id: "rust-actix-no-rate-limit"
  name: "Actix-web Missing Rate Limiting"
  description: "Actix-web application without rate limiting middleware. Public-facing APIs should implement rate limiting to prevent abuse and DoS."
  severity: Medium
  languages:
    - Rust
  pattern:
    query: "(call_expression function: (scoped_identifier path: (identifier) @type name: (identifier) @method (#eq? @type \"App\") (#eq? @method \"new\"))) @app"
    captures:
      - "app"
  cwe_id: "CWE-770"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://docs.rs/actix-governor/latest/actix_governor/"
  test_cases:
    - code: "App::new()\n    .service(web::resource(\"/api/login\").route(web::post().to(login)))"
      expected: TruePositive
    - code: "App::new()\n    .wrap(Cors::default())\n    .service(api_scope)"
      expected: TruePositive
    - code: "App::new().configure(configure_routes)"
      expected: TruePositive
    - code: "App::new()\n    .wrap(Governor::new(&governor_conf))\n    .service(api_scope)"
      expected: TrueNegative
    - code: "App::new()\n    .wrap(RateLimiter::new(store.clone()))\n    .service(api_scope)"
      expected: TrueNegative
    - code: "App::new()\n    .wrap(actix_governor::Governor::new(&conf))\n    .service(api_scope)"
      expected: TrueNegative

- id: "rust-actix-static-user-path"
  name: "Actix-web Static Files from User-Controlled Path"
  description: "Serving static files using a path derived from user input enables path traversal attacks. Validate and sanitize file paths before serving."
  severity: High
  languages:
    - Rust
  pattern:
    query: "(call_expression function: (scoped_identifier path: (identifier) @type name: (identifier) @method (#eq? @type \"NamedFile\") (#eq? @method \"open\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-22"
  owasp_category: A01_BrokenAccessControl
  help_uri: "https://owasp.org/www-community/attacks/Path_Traversal"
  test_cases:
    - code: "async fn download(path: web::Path<String>) -> actix_web::Result<NamedFile> {\n    Ok(NamedFile::open(format!(\"./uploads/{}\", path.into_inner()))?)\n}"
      expected: TruePositive
    - code: "async fn serve(req: HttpRequest) -> actix_web::Result<NamedFile> {\n    let file = req.match_info().query(\"filename\");\n    Ok(NamedFile::open(file)?)\n}"
      expected: TruePositive
    - code: "async fn get_file(path: web::Path<String>) -> actix_web::Result<NamedFile> {\n    Ok(NamedFile::open(path.into_inner())?)\n}"
      expected: TruePositive
    - code: "async fn serve_static() -> actix_web::Result<NamedFile> {\n    Ok(NamedFile::open(\"static/index.html\")?)\n}"
      expected: TrueNegative
    - code: "actix_files::Files::new(\"/static\", \"./static\").show_files_listing()"
      expected: TrueNegative
    - code: "async fn download(path: web::Path<String>) -> actix_web::Result<NamedFile> {\n    let sanitized = sanitize_path(&path.into_inner())?;\n    Ok(NamedFile::open(sanitized)?)\n}"
      expected: TrueNegative

- id: "rust-actix-permissive-cors"
  name: "Actix-web Permissive CORS (allow_any_origin)"
  description: "Using Cors::permissive() or .allow_any_origin() allows any website to make authenticated requests to your API. Restrict origins to trusted domains."
  severity: High
  languages:
    - Rust
  pattern:
    query: "(call_expression function: (scoped_identifier path: (identifier) @type name: (identifier) @method (#eq? @type \"Cors\") (#eq? @method \"permissive\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-942"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://docs.rs/actix-cors/latest/actix_cors/struct.Cors.html"
  test_cases:
    - code: "App::new().wrap(Cors::permissive()).service(api_scope)"
      expected: TruePositive
    - code: "let cors = Cors::permissive();\nApp::new().wrap(cors)"
      expected: TruePositive
    - code: "App::new()\n    .wrap(Cors::permissive())\n    .service(web::resource(\"/api/sensitive\").route(web::get().to(handler)))"
      expected: TruePositive
    - code: "App::new().wrap(Cors::default().allowed_origin(\"https://myapp.com\")).service(api_scope)"
      expected: TrueNegative
    - code: "Cors::default()\n    .allowed_origin(\"https://trusted.example.com\")\n    .allowed_methods(vec![\"GET\", \"POST\"])"
      expected: TrueNegative
    - code: "Cors::default()\n    .allowed_origin_fn(|origin, _req_head| origin.as_bytes().ends_with(b\".example.com\"))"
      expected: TrueNegative

- id: "rust-actix-missing-csp"
  name: "Actix-web Missing Content-Security-Policy Header"
  description: "HttpResponse returned without Content-Security-Policy header. CSP helps prevent XSS by restricting resource loading sources."
  severity: Medium
  languages:
    - Rust
  pattern:
    query: "(call_expression function: (scoped_identifier path: (identifier) @type name: (identifier) @method (#eq? @type \"HttpResponse\") (#eq? @method \"Ok\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-16"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP"
  test_cases:
    - code: "HttpResponse::Ok().content_type(\"text/html\").body(html_content)"
      expected: TruePositive
    - code: "HttpResponse::Ok().body(rendered_template)"
      expected: TruePositive
    - code: "HttpResponse::Ok().content_type(\"text/html\").body(format!(\"<html>{}</html>\", body))"
      expected: TruePositive
    - code: "HttpResponse::Ok()\n    .insert_header((\"Content-Security-Policy\", \"default-src 'self'\"))\n    .body(html_content)"
      expected: TrueNegative
    - code: "HttpResponse::Ok().json(data)"
      expected: TrueNegative
    - code: "HttpResponse::Ok()\n    .insert_header((\"Content-Security-Policy\", \"script-src 'self'; style-src 'self'\"))\n    .content_type(\"text/html\")\n    .body(html)"
      expected: TrueNegative


# ============================================================================
# AXUM FRAMEWORK RULES (12 rules)
# ============================================================================

- id: "rust-axum-no-auth-extractor"
  name: "Axum Route Handler Without Authentication"
  description: "Axum handler function for sensitive endpoint without authentication extractor or middleware layer. Use Extension<User> or custom auth extractor."
  severity: Medium
  languages:
    - Rust
  pattern:
    query: "(call_expression function: (field_expression field: (field_identifier) @method (#match? @method \"^(get|post|put|delete|patch)$\")) arguments: (arguments (identifier) @handler)) @call"
    captures:
      - "call"
  cwe_id: "CWE-306"
  owasp_category: A07_IdentificationAndAuthenticationFailures
  help_uri: "https://docs.rs/axum/latest/axum/extract/index.html"
  test_cases:
    - code: "Router::new().route(\"/admin/users\", get(list_users))"
      expected: TruePositive
    - code: "Router::new().route(\"/api/transfer\", post(transfer_funds))"
      expected: TruePositive
    - code: "Router::new().route(\"/api/delete-account\", delete(remove_account))"
      expected: TruePositive
    - code: "Router::new().route(\"/api/profile\", get(profile)).layer(auth_layer)"
      expected: TrueNegative
    - code: "Router::new().route(\"/health\", get(health_check))"
      expected: TrueNegative
    - code: "async fn profile(Extension(user): Extension<AuthUser>) -> impl IntoResponse {\n    Json(user)\n}"
      expected: TrueNegative

- id: "rust-axum-path-param-sql"
  name: "Axum Path Parameter in SQL Query"
  description: "Using axum Path<> extractor value directly in a format! SQL string allows SQL injection. Use parameterized queries with bind parameters."
  severity: High
  languages:
    - Rust
  pattern:
    query: "(call_expression function: (field_expression field: (field_identifier) @method (#match? @method \"^(query|execute|query_one|query_opt)$\")) arguments: (arguments (macro_invocation macro: (identifier) @mac (#eq? @mac \"format\")))) @call"
    captures:
      - "call"
  cwe_id: "CWE-89"
  owasp_category: A03_Injection
  help_uri: "https://docs.rs/axum/latest/axum/extract/struct.Path.html"
  test_cases:
    - code: "async fn get_user(Path(id): Path<i32>, State(pool): State<PgPool>) -> impl IntoResponse {\n    pool.query(&format!(\"SELECT * FROM users WHERE id = {}\", id), &[]).await\n}"
      expected: TruePositive
    - code: "async fn delete_item(Path(slug): Path<String>, State(db): State<DbPool>) -> impl IntoResponse {\n    db.execute(&format!(\"DELETE FROM items WHERE slug = '{}'\", slug), &[]).await\n}"
      expected: TruePositive
    - code: "async fn search(Path(term): Path<String>, State(pool): State<PgPool>) -> impl IntoResponse {\n    pool.query_one(&format!(\"SELECT * FROM products WHERE name = '{}'\", term), &[]).await\n}"
      expected: TruePositive
    - code: "async fn get_user(Path(id): Path<i32>, State(pool): State<PgPool>) -> impl IntoResponse {\n    sqlx::query!(\"SELECT * FROM users WHERE id = $1\", id).fetch_one(&pool).await\n}"
      expected: TrueNegative
    - code: "async fn get_user(Path(id): Path<i32>, State(pool): State<PgPool>) -> impl IntoResponse {\n    pool.query(\"SELECT * FROM users WHERE id = $1\", &[&id]).await\n}"
      expected: TrueNegative
    - code: "async fn get_user(Path(id): Path<i32>, State(db): State<DbPool>) -> impl IntoResponse {\n    User::find_by_id(id, &db).await\n}"
      expected: TrueNegative

- id: "rust-axum-missing-cors-layer"
  name: "Axum Router Without CORS Layer"
  description: "Axum Router created without CorsLayer from tower-http. APIs accessed by browsers need explicit CORS configuration."
  severity: Medium
  languages:
    - Rust
  pattern:
    query: "(call_expression function: (scoped_identifier path: (identifier) @type name: (identifier) @method (#eq? @type \"Router\") (#eq? @method \"new\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-942"
  owasp_category: A05_SecurityMisconfiguration
  help_uri: "https://docs.rs/tower-http/latest/tower_http/cors/struct.CorsLayer.html"
  test_cases:
    - code: "Router::new().route(\"/api/data\", get(handler))"
      expected: TruePositive
    - code: "let app = Router::new()\n    .route(\"/api/users\", get(list_users))\n    .route(\"/api/items\", post(create_item));"
      expected: TruePositive
    - code: "Router::new().nest(\"/api\", api_routes)"
      expected: TruePositive
    - code: "Router::new()\n    .route(\"/api/data\", get(handler))\n    .layer(CorsLayer::new().allow_origin(\"https://example.com\".parse::<HeaderValue>().unwrap()))"
      expected: TrueNegative
    - code: "Router::new()\n    .route(\"/api/data\", get(handler))\n    .layer(CorsLayer::permissive())"
      expected: TrueNegative
    - code: "Router::new()\n    .route(\"/api/data\", get(handler))\n    .layer(tower_http::cors::CorsLayer::new())"
      expected: TrueNegative

- id: "rust-axum-debug-endpoint"
  name: "Axum Exposed Debug/Admin Route"
  description: "Route registered at /debug or /admin path without authentication layer. Debug and admin endpoints must be protected or removed in production."
  severity: High
  languages:
    - Rust
  pattern:
    query: "(call_expression function: (field_expression field: (field_identifier) @method (#eq? @method \"route\")) arguments: (arguments (string_literal) @path (#match? @path \"(debug|admin|internal)\"))) @call"
    captures:
      - "call"
  cwe_id: "CWE-306"
