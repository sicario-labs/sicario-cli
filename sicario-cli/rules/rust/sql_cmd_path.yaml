# PATH TRAVERSAL RULES (7 rules)
# ============================================================================

- id: "rust-fs-read-format"
  name: "std::fs::read with format! Path"
  description: "Using format! to construct file paths passed to std::fs::read allows path traversal attacks. Validate and canonicalize paths before use."
  severity: High
  languages:
    - Rust
  pattern:
    query: "(call_expression function: (scoped_identifier path: (scoped_identifier) @path name: (identifier) @fn (#eq? @fn \"read\")) arguments: (arguments (macro_invocation macro: (identifier) @mac (#eq? @mac \"format\")))) @call"
    captures:
      - "call"
  cwe_id: "CWE-22"
  owasp_category: A03_Injection
  help_uri: "https://owasp.org/Top10/A03_2021-Injection/"
  test_cases:
    - code: "let data = std::fs::read(format!(\"/uploads/{}\", user_filename)).unwrap();"
      expected: TruePositive
    - code: "let content = fs::read(format!(\"./data/{}/{}\", tenant_id, file_name)).unwrap();"
      expected: TruePositive
    - code: "let bytes = std::fs::read(format!(\"{}/{}\", base_dir, request_path)).unwrap();"
      expected: TruePositive
    - code: "let data = std::fs::read(\"config/settings.toml\").unwrap();"
      expected: TrueNegative
    - code: "let data = std::fs::read(Path::new(\"static\").join(\"index.html\")).unwrap();"
      expected: TrueNegative
    - code: "let data = std::fs::read(canonical_path).unwrap();"
